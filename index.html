// MODULE: STOCK
// ══════════════════════════════════════════════════════════════════════════════
function StockModule({ articles, setArticles, suppliers, setSuppliers, stockMoves, setStockMoves, invoices, setInvoices, onAddExpense }) {
  const [tab,setTab]                         = useState("inventario");
  const [showArticleModal,setShowArticleModal] = useState(false);
  const [showInvoiceModal,setShowInvoiceModal] = useState(false);
  const [showSupplierModal,setShowSupplierModal] = useState(false);
  const [showAdjustModal,setShowAdjustModal]   = useState(false);
  const [selectedArticle,setSelectedArticle]   = useState(null);
  const [filterAlert,setFilterAlert]           = useState(false);

  const [artForm,setArtForm]   = useState({name:"",unit:"kg",minStock:"",supplierId:"",category:"materia_prima"});
  const [filterCat,setFilterCat] = useState("todos");
  const [supForm,setSupForm] = useState({name:"",contactName:"",contact:"",email:"",location:""});
  const [adjForm,setAdjForm] = useState({qty:"",note:""});
  const [invForm,setInvForm] = useState({supplierId:"",date:today(),note:"",paid:false,lines:[]});
  const [invLine,setInvLine] = useState({articleId:"",qty:"",unitCost:""});

  const stockMap    = computeStock(stockMoves);
  const getStock    = (id) => stockMap[id] || 0;
  const isLow       = (art) => getStock(art.id) <= art.minStock;
  const getSupplier = (id)  => suppliers.find(s=>s.id===id);
  const alertCount  = articles.filter(isLow).length;
  const displayArts = articles
    .filter(a => !filterAlert || isLow(a))
    .filter(a => filterCat==="todos" || a.category===filterCat);

  const saveArticle = () => {
    if (!artForm.name||!artForm.unit) return;
    setArticles(prev=>[...prev,{id:"A"+uid(),...artForm,minStock:parseFloat(artForm.minStock||0),category:artForm.category||"materia_prima"}]);
    setArtForm({name:"",unit:"kg",minStock:"",supplierId:""}); setShowArticleModal(false);
  };
  const saveSupplier = () => {
    if (!supForm.name) return;
    setSuppliers(prev=>[...prev,{id:"S"+uid(),...supForm}]);
    setSupForm({name:"",contactName:"",contact:"",email:"",location:""}); setShowSupplierModal(false);
  };

  const addInvLine    = () => {
    if (!invLine.articleId||!invLine.qty) return;
    setInvForm(prev=>({...prev,lines:[...prev.lines,{...invLine,qty:parseFloat(invLine.qty),unitCost:parseFloat(invLine.unitCost||0)}]}));
    setInvLine({articleId:"",qty:"",unitCost:""});
  };
  const removeInvLine = (i) => setInvForm(prev=>({...prev,lines:prev.lines.filter((_,idx)=>idx!==i)}));
  const invTotal      = invForm.lines.reduce((s,l)=>s+(l.qty*(l.unitCost||0)),0);

  const saveInvoice = () => {
    if (!invForm.supplierId||invForm.lines.length===0) return;
    const invoiceId = "F"+uid();
    setInvoices(prev=>[{id:invoiceId,supplierId:invForm.supplierId,date:invForm.date,total:invTotal,paid:invForm.paid,note:invForm.note},...prev]);
    setStockMoves(prev=>[...prev,...invForm.lines.map(l=>({id:uid(),articleId:l.articleId,type:"entrada",qty:l.qty,unitCost:l.unitCost||0,invoiceId,date:invForm.date,note:invForm.note}))]);
    if (invForm.paid && invTotal>0) {
      const sup = getSupplier(invForm.supplierId);
      onAddExpense({desc:`Factura ${invoiceId} — ${sup?.name||"Proveedor"}`,amount:invTotal,category:"materia prima",date:invForm.date});
    }
    setInvForm({supplierId:"",date:today(),note:"",paid:false,lines:[]}); setShowInvoiceModal(false);
  };

  const markInvoicePaid = (inv) => {
    setInvoices(prev=>prev.map(i=>i.id===inv.id?{...i,paid:true}:i));
    const sup = getSupplier(inv.supplierId);
    onAddExpense({desc:`Pago factura ${inv.id} — ${sup?.name||"Proveedor"}`,amount:inv.total,category:"materia prima",date:today()});
  };

  const openAdjust = (art) => { setSelectedArticle(art); setAdjForm({qty:"",note:""}); setShowAdjustModal(true); };
  const saveAdjust = () => {
    if (!adjForm.qty) return;
    setStockMoves(prev=>[...prev,{id:uid(),articleId:selectedArticle.id,type:"ajuste",qty:parseFloat(adjForm.qty),invoiceId:null,date:today(),note:adjForm.note||"Ajuste manual"}]);
    setShowAdjustModal(false);
  };

  const deudaTotal = invoices.filter(i=>!i.paid).reduce((s,i)=>s+i.total,0);
  const supDebt    = {};
  invoices.filter(i=>!i.paid).forEach(i=>{ supDebt[i.supplierId]=(supDebt[i.supplierId]||0)+i.total; });

  return (
    <div className="fadeIn">
      <SectionTitle sub="Inventario, proveedores y facturas">STOCK</SectionTitle>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:24}}>
        <StatCard label="Materias primas"    value={articles.filter(a=>a.category==="materia_prima").length}  color={G.accent} />
        <StatCard label="Semielaborados"     value={articles.filter(a=>a.category==="semielaborado").length}   color={G.yellow} />
        <StatCard label="Insumos"            value={articles.filter(a=>a.category==="insumo").length}          color={"#4a90e2"} />
        <StatCard label="Alertas de stock"   value={alertCount} sub={alertCount>0?"¡Stock bajo!":"Todo OK"}    color={alertCount>0?G.red:G.green} />
        <StatCard label="Facturas pendientes"value={invoices.filter(i=>!i.paid).length}                        color={G.yellow} />
        <StatCard label="Deuda total"        value={fmt(deudaTotal)}                                           color={deudaTotal>0?G.red:G.green} />
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:20,borderBottom:`1px solid ${G.border}`}}>
        {["inventario","proveedores","facturas","movimientos"].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{padding:"8px 18px",fontFamily:G.font,fontSize:13,cursor:"pointer",background:"transparent",border:"none",borderBottom:`2px solid ${tab===t?G.accent:"transparent"}`,color:tab===t?G.accent:G.muted,transition:"all 0.15s",textTransform:"capitalize"}}>{t==="intermedios"?"Productos Intermedios":t}</button>
        ))}
      </div>

      {/* INVENTARIO */}
      {tab==="inventario" && (
        <div>
          <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
            <Btn onClick={()=>setShowArticleModal(true)}>+ Nuevo Artículo</Btn>
            <button onClick={()=>setFilterAlert(!filterAlert)} style={{padding:"6px 14px",borderRadius:20,fontSize:12,border:"1px solid",cursor:"pointer",fontFamily:G.font,borderColor:filterAlert?G.red:G.border,background:filterAlert?G.red+"22":"transparent",color:filterAlert?G.red:G.muted}}>
              {filterAlert?"Ver todos":"⚠ Solo alertas"}{alertCount>0&&!filterAlert&&<span style={{background:G.red,color:"#fff",borderRadius:"50%",padding:"0 5px",fontSize:10,marginLeft:6}}>{alertCount}</span>}
            </button>
          </div>
          {/* Category filter chips */}
          <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
            <button onClick={()=>setFilterCat("todos")} style={{padding:"4px 14px",borderRadius:20,fontSize:12,fontFamily:G.font,cursor:"pointer",border:"1px solid",borderColor:filterCat==="todos"?G.accent:G.border,background:filterCat==="todos"?G.accent+"22":"transparent",color:filterCat==="todos"?G.accent:G.muted}}>Todos</button>
            {STOCK_CATS.map(c=>(
              <button key={c.id} onClick={()=>setFilterCat(filterCat===c.id?"todos":c.id)}
                style={{padding:"4px 14px",borderRadius:20,fontSize:12,fontFamily:G.font,cursor:"pointer",border:"1px solid",
                  borderColor:filterCat===c.id?c.color:G.border,
                  background:filterCat===c.id?c.color+"22":"transparent",
                  color:filterCat===c.id?c.color:G.muted}}>
                {c.icon} {c.label}
                <span style={{marginLeft:4,fontSize:10,opacity:0.7}}>
                  ({articles.filter(a=>a.category===c.id).length})
                </span>
              </button>
            ))}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {displayArts.length===0 && <div style={{color:G.muted,textAlign:"center",padding:40}}>No hay artículos</div>}
            {displayArts.map(art=>{
              const stock = getStock(art.id);
              const low   = stock <= art.minStock;
              const pct   = art.minStock>0 ? Math.min((stock/art.minStock)*100,100) : 100;
              const sup   = getSupplier(art.supplierId);
              return (
                <Card key={art.id} style={{display:"flex",flexWrap:"wrap",gap:12,alignItems:"center",borderColor:low?G.red+"44":G.border}}>
                  {low && <div className="pulse" style={{width:8,height:8,borderRadius:"50%",background:G.red,flexShrink:0}} />}
                  <div style={{flex:1,minWidth:160}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                      <span style={{fontWeight:500,fontSize:15}}>{art.name}</span>
                      {(()=>{ const c=STOCK_CATS.find(x=>x.id===art.category); return c?<span style={{fontSize:10,padding:"1px 6px",borderRadius:3,background:c.color+"22",color:c.color,border:`1px solid ${c.color}44`}}>{c.icon} {c.label}</span>:null; })()}
                    </div>
                    <div style={{color:G.muted,fontSize:12}}>{sup?.name||"Sin proveedor"}</div>
                  </div>
                  <div style={{minWidth:160}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                      <span style={{color:G.muted}}>Stock actual</span>
                      <span style={{color:low?G.red:G.green,fontWeight:500}}>{fmtQty(stock,art.unit)}</span>
                    </div>
                    <div style={{height:6,background:G.border,borderRadius:3}}>
                      <div style={{width:`${pct}%`,height:"100%",borderRadius:3,background:low?G.red:G.green,transition:"width 0.4s"}} />
                    </div>
                    <div style={{color:G.muted,fontSize:11,marginTop:3}}>Mínimo: {fmtQty(art.minStock,art.unit)}</div>
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    {low && <Badge label="STOCK BAJO" type="red" />}
                    <Btn variant="ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>openAdjust(art)}>Ajustar</Btn>
                  </div>
                </Card>
              );
            })}
          </div>
        </div>
      )}

      {/* PROVEEDORES */}
      {tab==="proveedores" && (
        <div>
          <div style={{marginBottom:16}}><Btn onClick={()=>setShowSupplierModal(true)}>+ Nuevo Proveedor</Btn></div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {suppliers.map(sup=>{
              const debt     = supDebt[sup.id]||0;
              const artCount = articles.filter(a=>a.supplierId===sup.id).length;
              return (
                <Card key={sup.id} style={{display:"flex",flexWrap:"wrap",gap:12,alignItems:"center"}}>
                  <div style={{width:40,height:40,borderRadius:"50%",background:G.accent+"22",display:"flex",alignItems:"center",justifyContent:"center",color:G.accent,fontSize:18,flexShrink:0}}>🏭</div>
                  <div style={{flex:1,minWidth:160}}>
                    <div style={{fontWeight:500,fontSize:15}}>{sup.name}</div>
                    <div style={{color:G.muted,fontSize:12}}>{sup.contactName&&<span>{sup.contactName} · </span>}{sup.contact}{sup.email&&` · ${sup.email}`}</div>
                    {sup.location&&<div style={{color:G.muted,fontSize:11}}>📍 {sup.location}</div>}
                  </div>
                  <div style={{textAlign:"center",minWidth:80}}>
                    <div style={{color:G.muted,fontSize:11}}>Artículos</div>
                    <div style={{fontFamily:G.display,fontSize:20,color:G.accent}}>{artCount}</div>
                  </div>
                  <div style={{textAlign:"right",minWidth:130}}>
                    <div style={{color:G.muted,fontSize:11}}>Deuda pendiente</div>
                    <div style={{fontFamily:G.display,fontSize:22,color:debt>0?G.red:G.green}}>{fmt(debt)}</div>
                  </div>
                </Card>
              );
            })}
          </div>
        </div>
      )}

      {/* FACTURAS */}
      {tab==="facturas" && (
        <div>
          <div style={{marginBottom:16}}><Btn onClick={()=>setShowInvoiceModal(true)}>+ Cargar Factura</Btn></div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {invoices.length===0 && <div style={{color:G.muted,textAlign:"center",padding:40}}>No hay facturas</div>}
            {[...invoices].sort((a,b)=>b.date.localeCompare(a.date)).map(inv=>{
              const sup = getSupplier(inv.supplierId);
              return (
                <Card key={inv.id} style={{display:"flex",flexWrap:"wrap",gap:12,alignItems:"center",borderColor:!inv.paid?G.yellow+"44":G.border}}>
                  <div style={{flex:1,minWidth:180}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                      <span style={{color:G.muted,fontSize:11}}>#{inv.id}</span>
                      <Badge label={inv.paid?"PAGADA":"PENDIENTE"} type={inv.paid?"green":"yellow"} />
                    </div>
                    <div style={{fontWeight:500}}>{sup?.name||"Proveedor"}</div>
                    <div style={{color:G.muted,fontSize:12}}>{inv.date} · {inv.note}</div>
                  </div>
                  <div style={{fontFamily:G.display,fontSize:26,color:inv.paid?G.muted:G.yellow,minWidth:120,textAlign:"right"}}>{fmt(inv.total)}</div>
                  {!inv.paid && <Btn variant="success" style={{fontSize:12}} onClick={()=>markInvoicePaid(inv)}>✓ Marcar pagada</Btn>}
                </Card>
              );
            })}
          </div>
        </div>
      )}

      {/* MOVIMIENTOS */}
      {tab==="movimientos" && (
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {[...stockMoves].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,60).map(m=>{
            const art       = articles.find(a=>a.id===m.articleId);
            const typeColor = m.type==="entrada"?G.green:m.type==="salida"?G.red:G.yellow;
            const typeIcon  = m.type==="entrada"?"↑":m.type==="salida"?"↓":"⟳";
            return (
              <Card key={m.id} style={{display:"flex",flexWrap:"wrap",gap:10,alignItems:"center",padding:"12px 16px"}}>
                <div style={{width:32,height:32,borderRadius:"50%",background:typeColor+"22",color:typeColor,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{typeIcon}</div>
                <div style={{flex:1,minWidth:140}}>
                  <div style={{fontWeight:500,fontSize:13}}>{art?.name||m.articleId}</div>
                  <div style={{color:G.muted,fontSize:11}}>{m.date}{m.invoiceId&&` · Fact. ${m.invoiceId}`}{m.note&&` · ${m.note}`}</div>
                </div>
                <Badge label={m.type} type={m.type==="entrada"?"green":m.type==="salida"?"red":"yellow"} />
                <div style={{fontFamily:G.display,fontSize:20,color:typeColor,minWidth:100,textAlign:"right"}}>
                  {m.type==="entrada"?"+":m.type==="salida"?"-":""}{fmtQty(m.qty,art?.unit||"")}
                </div>
              </Card>
            );
          })}
        </div>
      )}

      {/* MODAL ARTÍCULO */}
      {showArticleModal && (
        <Modal title="NUEVO ARTÍCULO" onClose={()=>setShowArticleModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <Input label="Nombre del artículo" value={artForm.name} onChange={e=>setArtForm({...artForm,name:e.target.value})} placeholder="Ej: Mayonesa marca X" />
            <Select label="Unidad de medida"   value={artForm.unit} onChange={e=>setArtForm({...artForm,unit:e.target.value})}>
              {UNITS.map(u=><option key={u}>{u}</option>)}
            </Select>
            <Input label="Stock mínimo" type="number" value={artForm.minStock} onChange={e=>setArtForm({...artForm,minStock:e.target.value})} placeholder="Ej: 5" />
            <Select label="Categoría" value={artForm.category} onChange={e=>setArtForm({...artForm,category:e.target.value})}>
              {STOCK_CATS.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
            </Select>
            <Select label="Proveedor habitual" value={artForm.supplierId} onChange={e=>setArtForm({...artForm,supplierId:e.target.value})}>
              <option value="">— Sin asignar —</option>
              {suppliers.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
            </Select>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setShowArticleModal(false)}>Cancelar</Btn>
              <Btn onClick={saveArticle}>Guardar</Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* MODAL PROVEEDOR */}
      {showSupplierModal && (
        <Modal title="NUEVO PROVEEDOR" onClose={()=>setShowSupplierModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <Input label="Nombre del proveedor" value={supForm.name}        onChange={e=>setSupForm({...supForm,name:e.target.value})}        placeholder="Distribuidora XYZ" />
            <Input label="Nombre de contacto"   value={supForm.contactName} onChange={e=>setSupForm({...supForm,contactName:e.target.value})} placeholder="Juan García" />
            <Input label="Teléfono"             value={supForm.contact}     onChange={e=>setSupForm({...supForm,contact:e.target.value})}     placeholder="11-XXXX-XXXX" />
            <Input label="Email"                value={supForm.email}       onChange={e=>setSupForm({...supForm,email:e.target.value})}       placeholder="contacto@mail.com" />
            <Input label="Ubicación / Dirección" value={supForm.location}   onChange={e=>setSupForm({...supForm,location:e.target.value})}   placeholder="Av. Corrientes 1234, CABA" />
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setShowSupplierModal(false)}>Cancelar</Btn>
              <Btn onClick={saveSupplier}>Guardar</Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* MODAL FACTURA */}
      {showInvoiceModal && (
        <Modal title="CARGAR FACTURA" onClose={()=>setShowInvoiceModal(false)} wide>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <Select label="Proveedor" value={invForm.supplierId} onChange={e=>setInvForm({...invForm,supplierId:e.target.value})}>
                <option value="">— Seleccionar —</option>
                {suppliers.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
              </Select>
              <Input label="Fecha" type="date" value={invForm.date} onChange={e=>setInvForm({...invForm,date:e.target.value})} />
            </div>
            <Input label="Número de factura / referencia" value={invForm.note} onChange={e=>setInvForm({...invForm,note:e.target.value})} placeholder="Ej: Factura B 0001-00045821" />

            {/* Líneas */}
            <div style={{background:G.surface,borderRadius:8,padding:14}}>
              <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Artículos recibidos</div>
              <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr auto",gap:8,marginBottom:10,alignItems:"end"}}>
                <Select value={invLine.articleId} onChange={e=>setInvLine({...invLine,articleId:e.target.value})} style={{fontSize:12}}>
                  <option value="">— Artículo —</option>
                  {articles.map(a=><option key={a.id} value={a.id}>{a.name} ({a.unit})</option>)}
                </Select>
                <input placeholder={`Cant.`} type="number" value={invLine.qty} onChange={e=>setInvLine({...invLine,qty:e.target.value})}
                  style={{background:G.card,border:`1px solid ${G.border}`,borderRadius:6,padding:"8px 10px",color:G.text,fontSize:13,outline:"none"}} />
                <input placeholder="$/u" type="number" value={invLine.unitCost} onChange={e=>setInvLine({...invLine,unitCost:e.target.value})}
                  style={{background:G.card,border:`1px solid ${G.border}`,borderRadius:6,padding:"8px 10px",color:G.text,fontSize:13,outline:"none"}} />
                <Btn variant="success" style={{padding:"8px 14px"}} onClick={addInvLine}>+</Btn>
              </div>
              {invForm.lines.length===0 && <div style={{color:G.muted,fontSize:12,textAlign:"center",padding:"8px 0"}}>Agregá artículos a la factura</div>}
              {invForm.lines.map((l,i)=>{
                const art = articles.find(a=>a.id===l.articleId);
                return (
                  <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${G.border}`}}>
                    <span style={{fontSize:13}}>{art?.name} — {fmtQty(l.qty,art?.unit)}</span>
                    <div style={{display:"flex",gap:10,alignItems:"center"}}>
                      <span style={{color:G.accent,fontSize:13}}>{fmt(l.qty*l.unitCost)}</span>
                      <Btn variant="danger" style={{padding:"2px 6px",fontSize:11}} onClick={()=>removeInvLine(i)}>✕</Btn>
                    </div>
                  </div>
                );
              })}
              {invForm.lines.length>0 && (
                <div style={{display:"flex",justifyContent:"flex-end",paddingTop:10}}>
                  <span style={{fontFamily:G.display,fontSize:22,color:G.accent}}>TOTAL: {fmt(invTotal)}</span>
                </div>
              )}
            </div>

            {/* Condición de pago */}
            <div style={{background:G.surface,borderRadius:8,padding:14}}>
              <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Condición de pago</div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setInvForm({...invForm,paid:false})} style={{flex:1,padding:"12px",borderRadius:8,fontFamily:G.font,fontSize:13,cursor:"pointer",background:!invForm.paid?G.yellow+"22":"transparent",border:`1px solid ${!invForm.paid?G.yellow:G.border}`,color:!invForm.paid?G.yellow:G.muted,lineHeight:1.5}}>
                  📋 Queda pendiente<br/><span style={{fontSize:11,opacity:0.7}}>Se suma a cuenta corriente del proveedor</span>
                </button>
                <button onClick={()=>setInvForm({...invForm,paid:true})} style={{flex:1,padding:"12px",borderRadius:8,fontFamily:G.font,fontSize:13,cursor:"pointer",background:invForm.paid?G.green+"22":"transparent",border:`1px solid ${invForm.paid?G.green:G.border}`,color:invForm.paid?G.green:G.muted,lineHeight:1.5}}>
                  ✅ Pagado al contado<br/><span style={{fontSize:11,opacity:0.7}}>Se registra como egreso en finanzas</span>
                </button>
              </div>
            </div>

            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setShowInvoiceModal(false)}>Cancelar</Btn>
              <Btn onClick={saveInvoice}>Guardar Factura</Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* MODAL AJUSTE */}
      {showAdjustModal && selectedArticle && (
        <Modal title={`AJUSTAR — ${selectedArticle.name}`} onClose={()=>setShowAdjustModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:G.surface,padding:12,borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{color:G.muted}}>Stock actual</span>
              <span style={{color:G.accent,fontFamily:G.display,fontSize:22}}>{fmtQty(getStock(selectedArticle.id),selectedArticle.unit)}</span>
            </div>
            <Input label={`Nueva cantidad (${selectedArticle.unit})`} type="number" value={adjForm.qty} onChange={e=>setAdjForm({...adjForm,qty:e.target.value})} placeholder="0" />
            <Input label="Motivo"   value={adjForm.note} onChange={e=>setAdjForm({...adjForm,note:e.target.value})} placeholder="Ej: Conteo físico, merma, rotura..." />
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setShowAdjustModal(false)}>Cancelar</Btn>
              <Btn variant="warn" onClick={saveAdjust}>Aplicar Ajuste</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// COST ENGINE — resolves recursive ingredient trees
// ══════════════════════════════════════════════════════════════════════════════

// Returns the latest unit cost of an article from invoice lines
// invoices have no per-line cost stored directly, but stockMoves do via unitCost
// We'll store unitCost on stockMoves when loaded from invoices (see saveInvoice)
// For now we derive: last purchase total / qty from invoice moves
const getArticleUnitCost = (articleId, stockMoves, invoices) => {
  // find the most recent "entrada" move for this article that has a linked invoice
  const moves = [...stockMoves]
    .filter(m => m.articleId === articleId && m.type === "entrada" && m.unitCost != null)
    .sort((a,b) => b.date.localeCompare(a.date));
  if (moves.length > 0) return moves[0].unitCost;
  return 0;
};

// Recursively compute the cost of one unit of a recipe ingredient
// An ingredient can be: a raw article OR a prep (which is itself a recipe)
// preps: array of PrepRecipe { id, name, unit, yield (qty produced), ingredients:[{type:"article"|"prep", id, qty}] }
const calcIngredientCost = (ing, articles, preps, stockMoves, invoices, depth=0) => {
  if (depth > 10) return 0; // safety
  if (ing.type === "article") {
    const cost = getArticleUnitCost(ing.id, stockMoves, invoices);
    return cost * ing.qty;
  }
  if (ing.type === "prep") {
    const prep = preps.find(p => p.id === ing.id);
    if (!prep || prep.yield <= 0) return 0;
    const totalCost = prep.ingredients.reduce((s, i) =>
      s + calcIngredientCost(i, articles, preps, stockMoves, invoices, depth+1), 0);
    const unitCost = totalCost / prep.yield;
    return unitCost * ing.qty;
  }
  return 0;
};

const calcRecipeCost = (recipe, articles, preps, stockMoves, invoices) =>
  recipe.ingredients.reduce((s, ing) =>
    s + calcIngredientCost(ing, articles, preps, stockMoves, invoices), 0);

// Each prep has an articleId — the stock article that holds the finished preparation
const INITIAL_PREPS = [];

// Virtual stock articles auto-created for each prep's finished output
const INITIAL_PREP_ARTICLES = [];

// Products: final menu items with price and full recipe using articles + preps
const INITIAL_PRODUCTS = [];

// MODULE: PRODUCTOS & RECETAS
// ══════════════════════════════════════════════════════════════════════════════
const PRODUCT_CATS = ["hamburguesas","acompañamientos","bebidas","postres","otros"];

function ProductsModule({ products, setProducts, preps, setPreps, articles, setArticles, stockMoves, setStockMoves, invoices }) {
  const [tab, setTab]                   = useState("productos");
  const [showProdModal, setShowProdModal] = useState(false);
  const [showPrepModal, setShowPrepModal] = useState(false);
  const [detailItem, setDetailItem]       = useState(null);  // { type:"product"|"prep", item }
  const [editProd, setEditProd]           = useState(null);  // product being edited

  // ── Product form ──────────────────────────────────────────────────────────
  const emptyProd = { name:"", price:"", category:"hamburguesas", ingredients:[] };
  const [prodForm, setProdForm]       = useState(emptyProd);
  const [ingLine, setIngLine]         = useState({ type:"article", id:"", qty:"" });

  const addIngLine = () => {
    if (!ingLine.id || !ingLine.qty) return;
    // Check if ingredient already added — update qty instead
    const exists = prodForm.ingredients.findIndex(i=>i.id===ingLine.id && i.type===ingLine.type);
    if (exists>=0) {
      setProdForm(prev=>({...prev, ingredients:prev.ingredients.map((i,idx)=>idx===exists?{...i,qty:i.qty+parseFloat(ingLine.qty)}:i)}));
    } else {
      setProdForm(prev=>({...prev, ingredients:[...prev.ingredients, {...ingLine, qty:parseFloat(ingLine.qty)}]}));
    }
    setIngLine(prev=>({ type:prev.type, id:"", qty:"" })); // keep same type, reset id & qty
  };
  const removeIngLine = (i) => setProdForm(prev=>({...prev, ingredients:prev.ingredients.filter((_,idx)=>idx!==i)}));

  const openNewProd = () => { setEditProd(null); setProdForm(emptyProd); setIngLine({type:"article",id:"",qty:""}); setShowProdModal(true); };
  const openEditProd = (p) => { setEditProd(p); setProdForm({name:p.name,price:p.price,category:p.category,ingredients:[...p.ingredients]}); setIngLine({type:"article",id:"",qty:""}); setShowProdModal(true); };

  const saveProd = () => {
    if (!prodForm.name || !prodForm.price) return;
    const item = { ...prodForm, price: parseFloat(prodForm.price) };
    if (editProd) {
      setProducts(prev => prev.map(p => p.id===editProd.id ? {...item, id:editProd.id} : p));
    } else {
      setProducts(prev => [...prev, {...item, id:"PR"+uid()}]);
    }
    setShowProdModal(false);
  };

  const deleteProd = (id) => setProducts(prev => prev.filter(p=>p.id!==id));

  // ── Prep form ─────────────────────────────────────────────────────────────
  const emptyPrep = { name:"", unit:"kg", yield:"", ingredients:[] };
  const [prepForm, setPrepForm]     = useState(emptyPrep);
  const [prepIngLine, setPrepIngLine] = useState({ type:"article", id:"", qty:"" });
  const [editPrep, setEditPrep]     = useState(null);

  // ── Production registration ───────────────────────────────────────────────
  const [showProdRegModal, setShowProdRegModal] = useState(false);
  const [prodRegPrep, setProdRegPrep]           = useState(null);   // prep being produced
  const [prodRegQty,  setProdRegQty]            = useState("");     // how many batches
  const [prodRegNote, setProdRegNote]           = useState("");

  const openProdReg = (prep) => { setProdRegPrep(prep); setProdRegQty("1"); setProdRegNote(""); setShowProdRegModal(true); };

  const saveProdReg = () => {
    if (!prodRegPrep || !prodRegQty) return;
    const batches = parseFloat(prodRegQty);
    const moves = [];
    // 1. Descontar materia prima usada
    prodRegPrep.ingredients.forEach(ing => {
      if (ing.type === "article") {
        moves.push({ id:uid(), articleId:ing.id, type:"salida", qty:ing.qty*batches, unitCost:null, invoiceId:null, date:today(), note:`Producción: ${prodRegPrep.name} x${batches}` });
      }
    });
    // 2. Sumar el producto intermedio terminado al stock
    // Ensure the prep has a stock article
    let prepArticleId = prodRegPrep.articleId;
    if (!prepArticleId) {
      prepArticleId = "PA"+uid();
      // create the article
      setArticles(prev=>[...prev, { id:prepArticleId, name:`[PREP] ${prodRegPrep.name}`, unit:prodRegPrep.unit, minStock:0, supplierId:"", isPrepArticle:true, category:"semielaborado" }]);
      // update the prep with its articleId
      setPreps(prev=>prev.map(p=>p.id===prodRegPrep.id ? {...p, articleId:prepArticleId} : p));
    }
    const unitCostOfPrep = prodRegPrep.ingredients.reduce((s,ing)=> ing.type==="article" ? s+calcIngredientCost(ing,articles,preps,stockMoves,invoices) : s, 0) / (prodRegPrep.yield||1);
    moves.push({ id:uid(), articleId:prepArticleId, type:"entrada", qty:prodRegPrep.yield*batches, unitCost:unitCostOfPrep, invoiceId:null, date:today(), note:`Producción: ${prodRegPrep.name} x${batches}${prodRegNote?" — "+prodRegNote:""}` });
    setStockMoves(prev=>[...prev,...moves]);
    setShowProdRegModal(false);
  };

  const addPrepIngLine = () => {
    if (!prepIngLine.id || !prepIngLine.qty) return;
    setPrepForm(prev=>({...prev, ingredients:[...prev.ingredients, {...prepIngLine, qty:parseFloat(prepIngLine.qty)}]}));
    setPrepIngLine({ type:"article", id:"", qty:"" });
  };
  const removePrepIngLine = (i) => setPrepForm(prev=>({...prev, ingredients:prev.ingredients.filter((_,idx)=>idx!==i)}));

  const openNewPrep  = () => { setEditPrep(null); setPrepForm(emptyPrep); setPrepIngLine({type:"article",id:"",qty:""}); setShowPrepModal(true); };
  const openEditPrep = (p) => { setEditPrep(p); setPrepForm({name:p.name,unit:p.unit,yield:p.yield,ingredients:[...p.ingredients]}); setPrepIngLine({type:"article",id:"",qty:""}); setShowPrepModal(true); };

  const savePrep = () => {
    if (!prepForm.name || !prepForm.yield) return;
    const item = { ...prepForm, yield: parseFloat(prepForm.yield) };
    if (editPrep) {
      setPreps(prev => prev.map(p => p.id===editPrep.id ? {...item, id:editPrep.id} : p));
    } else {
      setPreps(prev => [...prev, {...item, id:"P"+uid()}]);
    }
    setShowPrepModal(false);
  };

  const deletePrep = (id) => setPreps(prev => prev.filter(p=>p.id!==id));

  // ── Cost helpers ──────────────────────────────────────────────────────────
  const prodCost  = (p) => calcRecipeCost(p, articles, preps, stockMoves, invoices);
  const prepCost  = (p) => {
    const total = p.ingredients.reduce((s,ing)=>s+calcIngredientCost(ing,articles,preps,stockMoves,invoices),0);
    return { total, unit: p.yield>0 ? total/p.yield : 0 };
  };
  const margin    = (p) => { const c=prodCost(p); return p.price>0 ? ((p.price-c)/p.price)*100 : 0; };

  const ingLabel = (ing) => {
    if (ing.type==="article") { const a=articles.find(x=>x.id===ing.id); return a ? `${a.name} (${fmtQty(ing.qty,a.unit)})` : ing.id; }
    const p=preps.find(x=>x.id===ing.id); return p ? `${p.name} — prep (${fmtQty(ing.qty,p.unit)})` : ing.id;
  };
  const ingCostLabel = (ing) => fmt(calcIngredientCost(ing,articles,preps,stockMoves,invoices));

  // ingredient selector options
  const articleOptions = articles
    .filter(a=>!a.isPrepArticle)
    .map(a=>{
      const cat = STOCK_CATS.find(c=>c.id===a.category);
      return {value:a.id, label:`${cat?cat.icon:""} ${a.name} (${a.unit})`};
    });
  const prepOptions    = preps.map(p=>({value:p.id, label:`${p.name} — prep (${p.unit})`}));

  const groupedProducts = PRODUCT_CATS.reduce((acc,cat)=>{
    const items = products.filter(p=>p.category===cat);
    if (items.length>0) acc[cat]=items;
    return acc;
  },{});

  return (
    <div className="fadeIn">
      <SectionTitle sub="Productos del menú y productos intermedios">PRODUCTOS & RECETAS</SectionTitle>

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:24}}>
        <StatCard label="Productos" value={products.length} color={G.accent} />
        <StatCard label="Productos Intermedios" value={preps.length} color={G.yellow} />
        <StatCard label="Costo prom. burger"
          value={fmt(products.filter(p=>p.category==="hamburguesas").reduce((s,p)=>s+prodCost(p),0) / Math.max(products.filter(p=>p.category==="hamburguesas").length,1))}
          color={G.muted} />
        <StatCard label="Margen prom. burger"
          value={`${Math.round(products.filter(p=>p.category==="hamburguesas").reduce((s,p)=>s+margin(p),0) / Math.max(products.filter(p=>p.category==="hamburguesas").length,1))}%`}
          color={G.green} />
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:20,borderBottom:`1px solid ${G.border}`}}>
        {["productos","intermedios"].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{padding:"8px 18px",fontFamily:G.font,fontSize:13,cursor:"pointer",background:"transparent",border:"none",borderBottom:`2px solid ${tab===t?G.accent:"transparent"}`,color:tab===t?G.accent:G.muted,transition:"all 0.15s",textTransform:"capitalize"}}>{t==="intermedios"?"Productos Intermedios":t}</button>
        ))}
      </div>

      {/* ── TAB PRODUCTOS ── */}
      {tab==="productos" && (
        <div>
          <div style={{marginBottom:16}}><Btn onClick={openNewProd}>+ Nuevo Producto</Btn></div>
          {Object.entries(groupedProducts).map(([cat,items])=>(
            <div key={cat} style={{marginBottom:28}}>
              <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:2,marginBottom:10,paddingBottom:6,borderBottom:`1px solid ${G.border}`}}>{cat}</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {items.map(prod=>{
                  const cost = prodCost(prod);
                  const mgn  = margin(prod);
                  const pct  = Math.min(Math.max(mgn,0),100);
                  return (
                    <Card key={prod.id} style={{display:"flex",flexWrap:"wrap",gap:14,alignItems:"center"}}>
                      <div style={{flex:1,minWidth:160}}>
                        <div style={{fontWeight:500,fontSize:15,marginBottom:2}}>{prod.name}</div>
                        <div style={{color:G.muted,fontSize:12}}>{prod.ingredients.length} ingrediente{prod.ingredients.length!==1?"s":""}</div>
                      </div>

                      {/* Cost & margin bar */}
                      <div style={{minWidth:200,flex:1}}>
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                          <span style={{color:G.muted}}>Costo</span>
                          <span style={{color:G.red}}>{fmt(cost)}</span>
                        </div>
                        <div style={{height:6,background:G.border,borderRadius:3,marginBottom:4}}>
                          <div style={{width:`${100-pct}%`,height:"100%",borderRadius:3,background:G.red,transition:"width 0.4s"}} />
                        </div>
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
                          <span style={{color:G.muted}}>Margen</span>
                          <span style={{color:mgn>=50?G.green:mgn>=25?G.yellow:G.red,fontWeight:500}}>{Math.round(mgn)}%</span>
                        </div>
                      </div>

                      <div style={{textAlign:"right",minWidth:90}}>
                        <div style={{color:G.muted,fontSize:11}}>Precio venta</div>
                        <div style={{fontFamily:G.display,fontSize:24,color:G.accent}}>{fmt(prod.price)}</div>
                      </div>

                      <div style={{display:"flex",gap:6}}>
                        <Btn variant="ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>setDetailItem({type:"product",item:prod})}>Ver receta</Btn>
                        <Btn variant="ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>openEditProd(prod)}>Editar</Btn>
                        <Btn variant="danger" style={{fontSize:11,padding:"4px 8px"}} onClick={()=>deleteProd(prod.id)}>✕</Btn>
                      </div>
                    </Card>
                  );
                })}
              </div>
            </div>
          ))}
          {products.length===0 && <div style={{color:G.muted,textAlign:"center",padding:40}}>No hay productos cargados</div>}
        </div>
      )}

      {/* ── TAB PREPARACIONES ── */}
      {tab==="intermedios" && (
        <div>
          <div style={{marginBottom:16}}><Btn onClick={openNewPrep}>+ Nuevo Producto Intermedio</Btn></div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {preps.length===0 && <div style={{color:G.muted,textAlign:"center",padding:40}}>No hay productos intermedios</div>}
            {preps.map(prep=>{
              const {total, unit} = prepCost(prep);
              return (
                <Card key={prep.id} style={{display:"flex",flexWrap:"wrap",gap:14,alignItems:"center"}}>
                  <div style={{flex:1,minWidth:160}}>
                    <div style={{fontWeight:500,fontSize:15,marginBottom:2}}>{prep.name}</div>
                    <div style={{color:G.muted,fontSize:12}}>Rinde: {fmtQty(prep.yield,prep.unit)} · {prep.ingredients.length} ingrediente{prep.ingredients.length!==1?"s":""}</div>
                  </div>
                  <div style={{display:"flex",gap:20,alignItems:"center",flexWrap:"wrap"}}>
                    <div style={{textAlign:"center"}}>
                      <div style={{color:G.muted,fontSize:11}}>Costo total lote</div>
                      <div style={{fontFamily:G.display,fontSize:20,color:G.red}}>{fmt(total)}</div>
                    </div>
                    <div style={{textAlign:"center"}}>
                      <div style={{color:G.muted,fontSize:11}}>Costo / {prep.unit}</div>
                      <div style={{fontFamily:G.display,fontSize:20,color:G.yellow}}>{fmt(unit)}</div>
                    </div>
                    {prep.articleId && (() => {
                      const prepStock = computeStock(stockMoves)[prep.articleId] || 0;
                      return (
                        <div style={{textAlign:"center"}}>
                          <div style={{color:G.muted,fontSize:11}}>En stock</div>
                          <div style={{fontFamily:G.display,fontSize:20,color:prepStock>0?G.green:G.muted}}>{fmtQty(prepStock,prep.unit)}</div>
                        </div>
                      );
                    })()}
                  </div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <Btn variant="success" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>openProdReg(prep)}>⚗ Producir</Btn>
                    <Btn variant="ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>setDetailItem({type:"prep",item:prep})}>Ver receta</Btn>
                    <Btn variant="ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>openEditPrep(prep)}>Editar</Btn>
                    <Btn variant="danger" style={{fontSize:11,padding:"4px 8px"}} onClick={()=>deletePrep(prep.id)}>✕</Btn>
                  </div>
                </Card>
              );
            })}
          </div>
        </div>
      )}

      {/* ── MODAL PRODUCTO ── */}
      {showProdModal && (
        <Modal title={editProd?"EDITAR PRODUCTO":"NUEVO PRODUCTO"} onClose={()=>setShowProdModal(false)} wide>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:12}}>
              <Input label="Nombre del producto" value={prodForm.name} onChange={e=>setProdForm({...prodForm,name:e.target.value})} placeholder="Ej: Hamburguesa Especial" />
              <Input label="Precio de venta ($)" type="number" value={prodForm.price} onChange={e=>setProdForm({...prodForm,price:e.target.value})} placeholder="0" />
            </div>
            <Select label="Categoría" value={prodForm.category} onChange={e=>setProdForm({...prodForm,category:e.target.value})}>
              {PRODUCT_CATS.map(c=><option key={c}>{c}</option>)}
            </Select>

            {/* Ingredients */}
            <div style={{background:G.surface,borderRadius:8,padding:14}}>
              <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Ingredientes de la receta</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 2fr 1fr auto",gap:8,marginBottom:10,alignItems:"end"}}>
                <Select value={ingLine.type} onChange={e=>setIngLine({type:e.target.value,id:"",qty:""})}>
                  <option value="article">Materia prima</option>
                  <option value="prep">Producto Intermedio</option>
                </Select>
                <Select value={ingLine.id} onChange={e=>setIngLine({...ingLine,id:e.target.value})} style={{fontSize:12}}>
                  <option value="">— Seleccionar —</option>
                  {(ingLine.type==="article" ? articleOptions : prepOptions).map(o=>(
                    <option key={o.value} value={o.value}>{o.label}</option>
                  ))}
                </Select>
                <input placeholder="Cant." type="number" value={ingLine.qty} onChange={e=>setIngLine({...ingLine,qty:e.target.value})}
                  style={{background:G.card,border:`1px solid ${G.border}`,borderRadius:6,padding:"8px 10px",color:G.text,fontSize:13,outline:"none"}} />
                <Btn variant="success" style={{padding:"8px 14px"}} onClick={addIngLine}>+</Btn>
              </div>

              {prodForm.ingredients.length===0 && <div style={{color:G.muted,fontSize:12,textAlign:"center",padding:"8px 0"}}>Agregá ingredientes a la receta</div>}
              {prodForm.ingredients.map((ing,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${G.border}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:10,padding:"1px 5px",borderRadius:3,background:ing.type==="prep"?G.yellow+"22":G.accent+"22",color:ing.type==="prep"?G.yellow:G.accent,border:`1px solid ${ing.type==="prep"?G.yellow+"44":G.accent+"44"}`}}>
                      {ing.type==="prep"?"PREP":"MP"}
                    </span>
                    <span style={{fontSize:13}}>{ingLabel(ing)}</span>
                  </div>
                  <div style={{display:"flex",gap:10,alignItems:"center"}}>
                    <span style={{color:G.red,fontSize:13}}>{ingCostLabel(ing)}</span>
                    <Btn variant="danger" style={{padding:"2px 6px",fontSize:11}} onClick={()=>removeIngLine(i)}>✕</Btn>
                  </div>
                </div>
              ))}
              {prodForm.ingredients.length>0 && (
                <div style={{display:"flex",justifyContent:"space-between",paddingTop:10,alignItems:"center"}}>
                  <span style={{color:G.muted,fontSize:12}}>Costo total de la receta</span>
                  <span style={{fontFamily:G.display,fontSize:20,color:G.red}}>
                    {fmt(prodForm.ingredients.reduce((s,ing)=>s+calcIngredientCost(ing,articles,preps,stockMoves,invoices),0))}
                  </span>
                </div>
              )}
            </div>

            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setShowProdModal(false)}>Cancelar</Btn>
              <Btn onClick={saveProd}>{editProd?"Guardar cambios":"Crear Producto"}</Btn>
            </div>
          </div>
        </Modal>
      )}

        <Modal title={editPrep?"EDITAR PRODUCTO INTERMEDIO":"NUEVO PRODUCTO INTERMEDIO"} onClose={()=>setShowPrepModal(false)} wide>

                {UNITS.map(u=><option key={u}>{u}</option>)}
              </Select>
              <Input label="Rendimiento (cant. que produce)" type="number" value={prepForm.yield} onChange={e=>setPrepForm({...prepForm,yield:e.target.value})} placeholder="Ej: 0.8" />
            </div>

            <div style={{background:G.surface,borderRadius:8,padding:14}}>
              <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Ingredientes</div>
              <div style={{display:"grid",gridTemplateColumns:"2fr 1fr auto",gap:8,marginBottom:10,alignItems:"end"}}>
                <Select value={prepIngLine.id} onChange={e=>setPrepIngLine({...prepIngLine,id:e.target.value})} style={{fontSize:12}}>
                  <option value="">— Materia prima —</option>
                  {articleOptions.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
                </Select>
                <input placeholder="Cantidad" type="number" value={prepIngLine.qty} onChange={e=>setPrepIngLine({...prepIngLine,qty:e.target.value})}
                  style={{background:G.card,border:`1px solid ${G.border}`,borderRadius:6,padding:"8px 10px",color:G.text,fontSize:13,outline:"none"}} />
                <Btn variant="success" style={{padding:"8px 14px"}} onClick={addPrepIngLine}>+</Btn>
              </div>
              {prepForm.ingredients.length===0 && <div style={{color:G.muted,fontSize:12,textAlign:"center",padding:"8px 0"}}>Agregá ingredientes</div>}
              {prepForm.ingredients.map((ing,i)=>{
                const a = articles.find(x=>x.id===ing.id);
                const c = calcIngredientCost({...ing,type:"article"},articles,preps,stockMoves,invoices);
                return (
                  <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${G.border}`}}>
                    <span style={{fontSize:13}}>{a?.name} ({fmtQty(ing.qty,a?.unit)})</span>
                    <div style={{display:"flex",gap:10,alignItems:"center"}}>
                      <span style={{color:G.red,fontSize:13}}>{fmt(c)}</span>
                      <Btn variant="danger" style={{padding:"2px 6px",fontSize:11}} onClick={()=>removePrepIngLine(i)}>✕</Btn>
                    </div>
                  </div>
                );
              })}
              {prepForm.ingredients.length>0 && prepForm.yield>0 && (
                <div style={{display:"flex",justifyContent:"space-between",paddingTop:10}}>
                  <div>
                    <div style={{color:G.muted,fontSize:11}}>Costo total</div>
                    <div style={{fontFamily:G.display,fontSize:18,color:G.red}}>
                      {fmt(prepForm.ingredients.reduce((s,ing)=>s+calcIngredientCost({...ing,type:"article"},articles,preps,stockMoves,invoices),0))}
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{color:G.muted,fontSize:11}}>Costo por {prepForm.unit}</div>
                    <div style={{fontFamily:G.display,fontSize:18,color:G.yellow}}>
                      {fmt(prepForm.ingredients.reduce((s,ing)=>s+calcIngredientCost({...ing,type:"article"},articles,preps,stockMoves,invoices),0) / parseFloat(prepForm.yield||1))}
                    </div>
                  </div>
                </div>
              )}
            </div>

            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setShowPrepModal(false)}>Cancelar</Btn>
              <Btn onClick={savePrep}>{editPrep?"Guardar cambios":"Crear Producto Intermedio"}</Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* ── DETAIL MODAL ── */}
      {detailItem && (
        <Modal title={detailItem.type==="product"?"RECETA DEL PRODUCTO":"FICHA DE PREPARACIÓN"} onClose={()=>setDetailItem(null)} wide>
          {detailItem.type==="product" && (() => {
            const prod = detailItem.item;
            const cost = prodCost(prod);
            const mgn  = margin(prod);
            return (
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
                  <div style={{background:G.surface,padding:12,borderRadius:8,textAlign:"center"}}>
                    <div style={{color:G.muted,fontSize:11}}>Precio venta</div>
                    <div style={{fontFamily:G.display,fontSize:24,color:G.accent}}>{fmt(prod.price)}</div>
                  </div>
                  <div style={{background:G.surface,padding:12,borderRadius:8,textAlign:"center"}}>
                    <div style={{color:G.muted,fontSize:11}}>Costo receta</div>
                    <div style={{fontFamily:G.display,fontSize:24,color:G.red}}>{fmt(cost)}</div>
                  </div>
                  <div style={{background:G.surface,padding:12,borderRadius:8,textAlign:"center"}}>
                    <div style={{color:G.muted,fontSize:11}}>Margen</div>
                    <div style={{fontFamily:G.display,fontSize:24,color:mgn>=50?G.green:mgn>=25?G.yellow:G.red}}>{Math.round(mgn)}%</div>
                  </div>
                </div>
                <div style={{background:G.surface,borderRadius:8,padding:14}}>
                  <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Ingredientes</div>
                  {prod.ingredients.map((ing,i)=>{
                    const c = calcIngredientCost(ing,articles,preps,stockMoves,invoices);
                    const pct = cost>0 ? Math.round((c/cost)*100) : 0;
                    return (
                      <div key={i} style={{padding:"8px 0",borderBottom:`1px solid ${G.border}`}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{fontSize:10,padding:"1px 5px",borderRadius:3,background:ing.type==="prep"?G.yellow+"22":G.accent+"22",color:ing.type==="prep"?G.yellow:G.accent,border:`1px solid ${ing.type==="prep"?G.yellow+"44":G.accent+"44"}`}}>
                              {ing.type==="prep"?"PREP":"MP"}
                            </span>
                            <span style={{fontSize:13}}>{ingLabel(ing)}</span>
                          </div>
                          <div style={{display:"flex",gap:12,alignItems:"center"}}>
                            <span style={{color:G.muted,fontSize:11}}>{pct}%</span>
                            <span style={{color:G.red,fontWeight:500}}>{fmt(c)}</span>
                          </div>
                        </div>
                        <div style={{height:3,background:G.border,borderRadius:2}}>
                          <div style={{width:`${pct}%`,height:"100%",borderRadius:2,background:ing.type==="prep"?G.yellow:G.accent}} />
                        </div>
                      </div>
                    );
                  })}
                  <div style={{display:"flex",justifyContent:"space-between",paddingTop:10}}>
                    <span style={{color:G.muted}}>Ganancia por unidad</span>
                    <span style={{fontFamily:G.display,fontSize:20,color:G.green}}>{fmt(prod.price - cost)}</span>
                  </div>
                </div>
              </div>
            );
          })()}

          {detailItem.type==="prep" && (() => {
            const prep = detailItem.item;
            const {total, unit} = prepCost(prep);
            return (
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <div style={{background:G.surface,padding:12,borderRadius:8,textAlign:"center"}}>
                    <div style={{color:G.muted,fontSize:11}}>Costo total (lote)</div>
                    <div style={{fontFamily:G.display,fontSize:24,color:G.red}}>{fmt(total)}</div>
                  </div>
                  <div style={{background:G.surface,padding:12,borderRadius:8,textAlign:"center"}}>
                    <div style={{color:G.muted,fontSize:11}}>Costo por {prep.unit} (rinde {fmtQty(prep.yield,prep.unit)})</div>
                    <div style={{fontFamily:G.display,fontSize:24,color:G.yellow}}>{fmt(unit)}</div>
                  </div>
                </div>
                <div style={{background:G.surface,borderRadius:8,padding:14}}>
                  <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Ingredientes</div>
                  {prep.ingredients.map((ing,i)=>{
                    const c   = calcIngredientCost({...ing,type:"article"},articles,preps,stockMoves,invoices);
                    const pct = total>0 ? Math.round((c/total)*100) : 0;
                    const a   = articles.find(x=>x.id===ing.id);
                    return (
                      <div key={i} style={{padding:"8px 0",borderBottom:`1px solid ${G.border}`}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                          <span style={{fontSize:13}}>{a?.name} — {fmtQty(ing.qty,a?.unit)}</span>
                          <div style={{display:"flex",gap:12,alignItems:"center"}}>
                            <span style={{color:G.muted,fontSize:11}}>{pct}%</span>
                            <span style={{color:G.red,fontWeight:500}}>{fmt(c)}</span>
                          </div>
                        </div>
                        <div style={{height:3,background:G.border,borderRadius:2}}>
                          <div style={{width:`${pct}%`,height:"100%",borderRadius:2,background:G.yellow}} />
                        </div>
                      </div>
                    );
                  })}
                </div>
                <div style={{background:G.surface,borderRadius:8,padding:12}}>
                  <div style={{color:G.muted,fontSize:11,marginBottom:4}}>Este producto intermedio se usa en:</div>
                  {products.filter(p=>p.ingredients.some(i=>i.type==="prep"&&i.id===prep.id)).map(p=>(
                    <div key={p.id} style={{fontSize:13,color:G.accent,padding:"2px 0"}}>→ {p.name}</div>
                  ))}
                  {products.filter(p=>p.ingredients.some(i=>i.type==="prep"&&i.id===prep.id)).length===0 &&
                    <div style={{color:G.muted,fontSize:12}}>No está en ninguna receta todavía</div>}
                </div>
              </div>
            );
          })()}
        </Modal>
      )}

      {/* ── MODAL: REGISTRAR PRODUCCIÓN ── */}
      {showProdRegModal && prodRegPrep && (
        <Modal title={`PRODUCIR — ${prodRegPrep.name}`} onClose={()=>setShowProdRegModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>

            {/* Resumen del producto intermedio */}
            <div style={{background:G.surface,borderRadius:8,padding:14}}>
              <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Receta (por lote)</div>
              {prodRegPrep.ingredients.map((ing,i)=>{
                const a = articles.find(x=>x.id===ing.id);
                const stockNow = computeStock(stockMoves)[ing.id] || 0;
                const needed = ing.qty * parseFloat(prodRegQty||1);
                const ok = stockNow >= needed;
                return (
                  <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:`1px solid ${G.border}`}}>
                    <span style={{fontSize:13}}>{a?.name}</span>
                    <div style={{display:"flex",gap:12,alignItems:"center"}}>
                      <span style={{color:G.muted,fontSize:11}}>Stock: {fmtQty(stockNow,a?.unit)}</span>
                      <span style={{color:ok?G.green:G.red,fontSize:13,fontWeight:500}}>Usa: {fmtQty(needed,a?.unit)}</span>
                    </div>
                  </div>
                );
              })}
            </div>

            <Input
              label="Cantidad de lotes a producir"
              type="number" min="0.1" step="0.1"
              value={prodRegQty}
              onChange={e=>setProdRegQty(e.target.value)}
              placeholder="1"
            />

            {/* Preview del resultado */}
            {prodRegQty && parseFloat(prodRegQty) > 0 && (
              <div style={{background:G.surface,borderRadius:8,padding:14}}>
                <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Resultado de la producción</div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <span style={{color:G.muted,fontSize:13}}>Ingredientes consumidos</span>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}}>
                    {prodRegPrep.ingredients.map((ing,i)=>{
                      const a = articles.find(x=>x.id===ing.id);
                      return <span key={i} style={{color:G.red,fontSize:12}}>− {fmtQty(ing.qty*parseFloat(prodRegQty),a?.unit)} {a?.name}</span>;
                    })}
                  </div>
                </div>
                <div style={{borderTop:`1px solid ${G.border}`,paddingTop:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{color:G.green,fontSize:13}}>Se agrega al stock</span>
                  <span style={{fontFamily:G.display,fontSize:22,color:G.green}}>+ {fmtQty(prodRegPrep.yield * parseFloat(prodRegQty), prodRegPrep.unit)} {prodRegPrep.name}</span>
                </div>
              </div>
            )}

            <Input label="Nota (opcional)" value={prodRegNote} onChange={e=>setProdRegNote(e.target.value)} placeholder="Ej: Tanda del mediodía" />

            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setShowProdRegModal(false)}>Cancelar</Btn>
              <Btn variant="success" onClick={saveProdReg}>✓ Registrar Producción</Btn>
            </div>
          </div>
        </Modal>
      )}

    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// MODULE: COMING SOON
// ══════════════════════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════════════════════
// MODULE: CAJA DIARIA
// ══════════════════════════════════════════════════════════════════════════════

// Billetes y monedas ARG
const DENOMINATIONS = [
  { val:10000, label:"$10.000" },
  { val:2000,  label:"$2.000"  },
  { val:1000,  label:"$1.000"  },
  { val:500,   label:"$500"    },
  { val:200,   label:"$200"    },
  { val:100,   label:"$100"    },
  { val:50,    label:"$50"     },
  { val:20,    label:"$20"     },
  { val:10,    label:"$10"     },
  { val:5,     label:"$5"      },
  { val:1,     label:"$1"      },
];

const emptyCount = () => Object.fromEntries(DENOMINATIONS.map(d=>[d.val, ""]));
const countTotal = (counts) => DENOMINATIONS.reduce((s,d)=>s+(parseFloat(counts[d.val]||0)*d.val),0);

function CajaDiariaModule({ extraTx, addExpense, addIncome }) {
  const [cajas, setCajas]           = useState([]);
  const [view, setView]             = useState("hoy"); // hoy | historial
  const [showAperturaModal, setShowAperturaModal] = useState(false);
  const [showCierreModal, setShowCierreModal]     = useState(false);
  const [selectedCaja, setSelectedCaja]           = useState(null);

  // Apertura form
  const [aperturaCount, setAperturaCount] = useState(emptyCount());
  const [aperturaExpected, setAperturaExpected] = useState("");
  const [aperturaNota, setAperturaNota]   = useState("");

  // Cierre form
  const [cierreCount, setCierreCount]   = useState(emptyCount());
  const [cierreNota, setCierreNota]     = useState("");

  const todayCaja = cajas.find(c=>c.date===today());
  const isOpen    = todayCaja && !todayCaja.closed;
  const isClosed  = todayCaja && todayCaja.closed;

  // Ventas en efectivo del día (de extraTx)
  const ventasEfectivoDia = extraTx
    .filter(t=>t.type==="ingreso" && t.accountId==="AC1" && t.date===today())
    .reduce((s,t)=>s+t.amount,0);
  const egresosEfectivoDia = extraTx
    .filter(t=>t.type==="egreso" && t.accountId==="AC1" && t.date===today())
    .reduce((s,t)=>s+t.amount,0);

  const expectedAtClose = (caja) => {
    const ventas  = extraTx.filter(t=>t.type==="ingreso"&&t.accountId==="AC1"&&t.date===caja.date).reduce((s,t)=>s+t.amount,0);
    const egresos = extraTx.filter(t=>t.type==="egreso" &&t.accountId==="AC1"&&t.date===caja.date).reduce((s,t)=>s+t.amount,0);
    return caja.aperturaContado + ventas - egresos;
  };

  const aperturaTotal = countTotal(aperturaCount);
  const cierreTotal   = countTotal(cierreCount);
  const diff          = selectedCaja ? cierreTotal - expectedAtClose(selectedCaja) : 0;

  const openApertura = () => { setAperturaCount(emptyCount()); setAperturaExpected(""); setAperturaNota(""); setShowAperturaModal(true); };

  const saveApertura = () => {
    const contado  = aperturaTotal;
    const esperado = parseFloat(aperturaExpected||0);
    const dif      = contado - esperado;
    const nueva = {
      id: uid(), date: today(),
      aperturaContado: contado,
      aperturaEsperado: esperado,
      aperturaDiff: dif,
      aperturaNota,
      aperturaDetalle: {...aperturaCount},
      aperturaHora: new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"}),
      closed: false,
    };
    setCajas(prev=>[nueva, ...prev.filter(c=>c.date!==today())]);
    setShowAperturaModal(false);
  };

  const openCierre = (caja) => { setSelectedCaja(caja); setCierreCount(emptyCount()); setCierreNota(""); setShowCierreModal(true); };

  const saveCierre = () => {
    if (!selectedCaja) return;
    const contado  = cierreTotal;
    const esperado = expectedAtClose(selectedCaja);
    const dif      = contado - esperado;
    setCajas(prev=>prev.map(c=>c.id===selectedCaja.id ? {
      ...c, closed:true,
      cierreContado: contado,
      cierreEsperado: esperado,
      cierreDiff: dif,
      cierreNota,
      cierreDetalle: {...cierreCount},
      cierreHora: new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"}),
    } : c));
    setShowCierreModal(false);
  };

  const DiffBadge = ({val}) => (
    <span style={{
      fontSize:12, padding:"2px 8px", borderRadius:4, fontWeight:500,
      background: val===0?G.green+"22":val>0?G.yellow+"22":G.red+"22",
      color: val===0?G.green:val>0?G.yellow:G.red,
      border: `1px solid ${val===0?G.green:val>0?G.yellow:G.red}44`,
    }}>
      {val===0?"✓ Exacto":val>0?`+${fmt(val)} sobrante`:`${fmt(val)} faltante`}
    </span>
  );

  const CountGrid = ({counts, setCounts, label}) => (
    <div style={{background:G.surface,borderRadius:8,padding:14}}>
      <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>{label}</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:8}}>
        {DENOMINATIONS.map(d=>(
          <div key={d.val} style={{display:"flex",alignItems:"center",gap:8,background:G.card,borderRadius:6,padding:"8px 10px"}}>
            <span style={{color:G.accent,fontFamily:G.display,fontSize:16,minWidth:60}}>{d.label}</span>
            <span style={{color:G.muted,fontSize:12}}>×</span>
            <input type="number" min="0" value={counts[d.val]} placeholder="0"
              onChange={e=>setCounts(prev=>({...prev,[d.val]:e.target.value}))}
              style={{flex:1,width:50,background:G.surface,border:`1px solid ${G.border}`,borderRadius:4,padding:"4px 8px",color:G.text,fontSize:14,outline:"none",textAlign:"right"}} />
            {parseFloat(counts[d.val]||0)>0 && (
              <span style={{color:G.muted,fontSize:11,minWidth:60,textAlign:"right"}}>{fmt(parseFloat(counts[d.val]||0)*d.val)}</span>
            )}
          </div>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",paddingTop:12,borderTop:`1px solid ${G.border}`,marginTop:12}}>
        <div style={{textAlign:"right"}}>
          <div style={{color:G.muted,fontSize:11}}>Total contado</div>
          <div style={{fontFamily:G.display,fontSize:28,color:G.accent}}>{fmt(countTotal(counts))}</div>
        </div>
      </div>
    </div>
  );

  return (
    <div className="fadeIn">
      <SectionTitle sub="Apertura, cierre y arqueo de caja en efectivo">CAJA DIARIA</SectionTitle>

      {/* Estado de hoy */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:24}}>
        <StatCard label="Estado hoy"
          value={!todayCaja?"Sin abrir":isOpen?"Abierta":"Cerrada"}
          color={!todayCaja?G.muted:isOpen?G.green:G.accent} />
        {todayCaja && <StatCard label="Apertura" value={fmt(todayCaja.aperturaContado)} color={G.accent} />}
        {isOpen && <StatCard label="Ventas efectivo hoy" value={fmt(ventasEfectivoDia)} color={G.green} />}
        {isOpen && <StatCard label="Egresos efectivo hoy" value={fmt(egresosEfectivoDia)} color={G.red} />}
        {isOpen && <StatCard label="Esperado en caja" value={fmt(todayCaja.aperturaContado+ventasEfectivoDia-egresosEfectivoDia)} color={G.yellow} />}
        {isClosed && <StatCard label="Diferencia cierre" value={fmt(todayCaja.cierreDiff)} color={todayCaja.cierreDiff===0?G.green:todayCaja.cierreDiff>0?G.yellow:G.red} />}
      </div>

      {/* Acciones */}
      <div style={{display:"flex",gap:10,marginBottom:24,flexWrap:"wrap"}}>
        {!todayCaja && <Btn onClick={openApertura}>🔓 Abrir Caja</Btn>}
        {isOpen && <Btn variant="warn" onClick={()=>openCierre(todayCaja)}>🔒 Cerrar Caja</Btn>}
        {isClosed && <div style={{color:G.green,fontSize:13,display:"flex",alignItems:"center",gap:6}}>✓ Caja cerrada hoy a las {todayCaja.cierreHora}</div>}
        <button onClick={()=>setView(view==="hoy"?"historial":"hoy")} style={{padding:"8px 16px",borderRadius:6,fontSize:13,fontFamily:G.font,cursor:"pointer",background:"transparent",border:`1px solid ${G.border}`,color:G.muted}}>
          {view==="hoy"?"Ver historial":"Ver hoy"}
        </button>
      </div>

      {/* Detalle del día */}
      {view==="hoy" && todayCaja && (
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {/* Apertura */}
          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontFamily:G.display,fontSize:20,letterSpacing:1}}>APERTURA · {todayCaja.aperturaHora}</div>
              <DiffBadge val={todayCaja.aperturaDiff} />
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
              <div><div style={{color:G.muted,fontSize:11}}>Esperado</div><div style={{fontFamily:G.display,fontSize:20,color:G.muted}}>{fmt(todayCaja.aperturaEsperado)}</div></div>
              <div><div style={{color:G.muted,fontSize:11}}>Contado</div><div style={{fontFamily:G.display,fontSize:20,color:G.accent}}>{fmt(todayCaja.aperturaContado)}</div></div>
              <div><div style={{color:G.muted,fontSize:11}}>Diferencia</div><div style={{fontFamily:G.display,fontSize:20,color:todayCaja.aperturaDiff===0?G.green:todayCaja.aperturaDiff>0?G.yellow:G.red}}>{fmt(todayCaja.aperturaDiff)}</div></div>
            </div>
            {todayCaja.aperturaNota && <div style={{marginTop:10,color:G.muted,fontSize:12}}>📝 {todayCaja.aperturaNota}</div>}
          </Card>

          {/* Cierre */}
          {isClosed && (
            <Card>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{fontFamily:G.display,fontSize:20,letterSpacing:1}}>CIERRE · {todayCaja.cierreHora}</div>
                <DiffBadge val={todayCaja.cierreDiff} />
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
                <div><div style={{color:G.muted,fontSize:11}}>Esperado</div><div style={{fontFamily:G.display,fontSize:20,color:G.muted}}>{fmt(todayCaja.cierreEsperado)}</div></div>
                <div><div style={{color:G.muted,fontSize:11}}>Contado</div><div style={{fontFamily:G.display,fontSize:20,color:G.accent}}>{fmt(todayCaja.cierreContado)}</div></div>
                <div><div style={{color:G.muted,fontSize:11}}>Diferencia</div><div style={{fontFamily:G.display,fontSize:20,color:todayCaja.cierreDiff===0?G.green:todayCaja.cierreDiff>0?G.yellow:G.red}}>{fmt(todayCaja.cierreDiff)}</div></div>
              </div>
              {todayCaja.cierreNota && <div style={{marginTop:10,color:G.muted,fontSize:12}}>📝 {todayCaja.cierreNota}</div>}
            </Card>
          )}
        </div>
      )}

      {/* Historial */}
      {view==="historial" && (

// MODULE: GASTOS FIJOS
// ══════════════════════════════════════════════════════════════════════════════
const GASTOS_FREQ = ["mensual","semanal","anual"];
const INITIAL_GASTOS_FIJOS = [];

function GastosFijosModule({ accounts, addExpense, extraTx }) {
  const [gastos, setGastos]         = useState(INITIAL_GASTOS_FIJOS);
  const [showModal, setShowModal]   = useState(false);
  const [editGasto, setEditGasto]   = useState(null);
  const [form, setForm]             = useState({name:"",amount:"",freq:"mensual",category:"alquiler",accountId:"AC1",active:true});
  const thisMonth = new Date().toISOString().slice(0,7);

  // Check if a gasto was paid this month (has a matching tx)
  const paidThisMonth = (g) => extraTx.some(t=>t.gastoFijoId===g.id && t.date.startsWith(thisMonth));
  const totalMensual  = gastos.filter(g=>g.active&&g.freq==="mensual").reduce((s,g)=>s+g.amount,0);
  const totalPagado   = gastos.filter(g=>g.active&&paidThisMonth(g)).reduce((s,g)=>s+g.amount,0);
  const pendientesMes = gastos.filter(g=>g.active&&!paidThisMonth(g)).length;

  const openNew  = () => { setEditGasto(null); setForm({name:"",amount:"",freq:"mensual",category:"alquiler",accountId:"AC1",active:true}); setShowModal(true); };
  const openEdit = (g) => { setEditGasto(g); setForm({name:g.name,amount:String(g.amount),freq:g.freq,category:g.category,accountId:g.accountId,active:g.active}); setShowModal(true); };

  const save = () => {
    if (!form.name||!form.amount) return;
    const item = {...form, amount:parseFloat(form.amount)};
    if (editGasto) setGastos(prev=>prev.map(g=>g.id===editGasto.id?{...g,...item}:g));
    else           setGastos(prev=>[...prev,{id:"GF"+uid(),...item,lastPaid:null}]);
    setShowModal(false);
  };

  const pagarGasto = (g) => {
    const acc = accounts.find(a=>a.id===g.accountId);
    addExpense({
      desc: `${g.name} — ${thisMonth}`,
      amount: g.amount,
      category: g.category,
      date: today(),
      accountId: g.accountId,
      gastoFijoId: g.id,
    });
    setGastos(prev=>prev.map(x=>x.id===g.id?{...x,lastPaid:today()}:x));
  };

  const toggleActive = (id) => setGastos(prev=>prev.map(g=>g.id===id?{...g,active:!g.active}:g));

  return (
    <div className="fadeIn">
      <SectionTitle sub="Gastos que se repiten cada mes, semana o año">GASTOS FIJOS</SectionTitle>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:24}}>
        <StatCard label="Total mensual"    value={fmt(totalMensual)}  color={G.red}    />
        <StatCard label="Pagado este mes"  value={fmt(totalPagado)}   color={G.green}  />
        <StatCard label="Pendientes"       value={pendientesMes}      color={pendientesMes>0?G.yellow:G.green} sub={pendientesMes>0?"Por pagar este mes":"Al día"} />
      </div>

      <div style={{marginBottom:16}}><Btn onClick={openNew}>+ Nuevo Gasto Fijo</Btn></div>

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {gastos.length===0 && <div style={{color:G.muted,textAlign:"center",padding:40}}>No hay gastos fijos cargados</div>}
        {gastos.map(g=>{
          const paid = paidThisMonth(g);
          const acc  = accounts.find(a=>a.id===g.accountId);
          return (
            <Card key={g.id} style={{display:"flex",flexWrap:"wrap",gap:12,alignItems:"center",opacity:g.active?1:0.5,borderColor:!g.active?G.border:paid?G.green+"44":G.yellow+"33"}}>
              <div style={{flex:1,minWidth:160}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <span style={{fontWeight:500,fontSize:15}}>{g.name}</span>
                  <Badge label={g.freq} type="accent" />
                  {!g.active && <Badge label="INACTIVO" type="red" />}
                </div>
                <div style={{color:G.muted,fontSize:12}}>
                  {acc?`${acc.icon} ${acc.name}`:"—"} · {g.category}
                </div>
              </div>
              <div style={{fontFamily:G.display,fontSize:24,color:G.red,minWidth:120,textAlign:"right"}}>{fmt(g.amount)}</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                {g.active && !paid && <Btn variant="success" style={{fontSize:12}} onClick={()=>pagarGasto(g)}>✓ Pagar</Btn>}
                {g.active && paid  && <span style={{color:G.green,fontSize:12}}>✓ Pagado este mes</span>}
                <Btn variant="ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>openEdit(g)}>Editar</Btn>
                <Btn variant={g.active?"danger":"ghost"} style={{fontSize:11,padding:"4px 10px"}} onClick={()=>toggleActive(g.id)}>
                  {g.active?"Pausar":"Activar"}
                </Btn>
              </div>
            </Card>
          );
        })}
      </div>

      {showModal && (
        <Modal title={editGasto?"EDITAR GASTO FIJO":"NUEVO GASTO FIJO"} onClose={()=>setShowModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <Input label="Nombre" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Ej: Alquiler, Sueldo, Gas..." />
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <Input label="Monto ($)" type="number" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})} placeholder="0" />
              <Select label="Frecuencia" value={form.freq} onChange={e=>setForm({...form,freq:e.target.value})}>
                {GASTOS_FREQ.map(f=><option key={f}>{f}</option>)}
              </Select>
            </div>
            <Select label="Categoría" value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>
              {["alquiler","sueldos","servicios","marketing","packaging","otros gastos"].map(c=><option key={c}>{c}</option>)}
            </Select>
            <Select label="Cuenta de pago" value={form.accountId} onChange={e=>setForm({...form,accountId:e.target.value})}>
              {accounts.map(a=><option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}
            </Select>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setShowModal(false)}>Cancelar</Btn>
              <Btn onClick={save}>{editGasto?"Guardar cambios":"Crear Gasto Fijo"}</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}
