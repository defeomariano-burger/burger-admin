const FB_PROJECT = "burger-admin-d1397";
const FB_API_KEY = "AIzaSyDMh2QVKZa_Yynon-8lHhpV3X8cqMHbvSE";
const FB_BASE    = `https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents`;

// Convert JS object → Firestore REST format
const toFS = (val) => {
  if (val === null || val === undefined) return { nullValue: null };
  if (typeof val === "boolean") return { booleanValue: val };
  if (typeof val === "number")  return Number.isInteger(val) ? { integerValue: String(val) } : { doubleValue: val };
  if (typeof val === "string")  return { stringValue: val };
  if (Array.isArray(val))       return { arrayValue: { values: val.map(toFS) } };
  if (typeof val === "object")  return { mapValue: { fields: Object.fromEntries(Object.entries(val).map(([k,v])=>[k,toFS(v)])) } };
  return { stringValue: String(val) };
};

// Convert Firestore REST format → JS object
const fromFS = (field) => {
  if (!field) return null;
  if ("nullValue"    in field) return null;
  if ("booleanValue" in field) return field.booleanValue;
  if ("integerValue" in field) return Number(field.integerValue);
  if ("doubleValue"  in field) return field.doubleValue;
  if ("stringValue"  in field) return field.stringValue;
  if ("arrayValue"   in field) return (field.arrayValue.values||[]).map(fromFS);
  if ("mapValue"     in field) return Object.fromEntries(Object.entries(field.mapValue.fields||{}).map(([k,v])=>[k,fromFS(v)]));
  return null;
};

const fsSet = async (col, id, data) => {
  try {
    const fields = Object.fromEntries(Object.entries(data).map(([k,v])=>[k,toFS(v)]));
    await fetch(`${FB_BASE}/${col}/${id}?key=${FB_API_KEY}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ fields }),
    });
  } catch(e) { console.error("fsSet error:", e); }
};

const fsGet = async (col, id) => {
  try {
    const res = await fetch(`${FB_BASE}/${col}/${id}?key=${FB_API_KEY}`);
    if (!res.ok) return null;
    const doc = await res.json();
    if (!doc.fields) return null;
    return Object.fromEntries(Object.entries(doc.fields).map(([k,v])=>[k,fromFS(v)]));
  } catch(e) { return null; }
};

const computeStock = (moves) => {
  const s = {};
  moves.forEach(m => {
    if (!s[m.articleId]) s[m.articleId] = 0;
    if (m.type==="entrada")     s[m.articleId] += m.qty;
    else if (m.type==="salida") s[m.articleId] -= m.qty;
    else if (m.type==="ajuste") s[m.articleId]  = m.qty;
  });
  return s;
};

  // Build menu from products catalog (what was loaded in Productos module)

  const menuItems = products && products.length > 0
    ? products.filter(p=>p.available!==false).map(p=>({ id:p.id, name:p.name, price:parseFloat(p.price||0) }))
    : recipes.map(r => ({ id:r.id, name:r.productName, price:parseFloat(r.price||0) }));

  const [filter,setFilter]           = useState("todos");
  const [showModal,setShowModal]     = useState(false);
  const [detail,setDetail]           = useState(null);
  const [payModal,setPayModal]       = useState(null); // order pending payment decision
  const [suppliesModal,setSuppliesModal] = useState(null); // order pending supply registration
  const [supplyCounts,setSupplyCounts]   = useState({}); // {articleId: qty}
  const [payForm,setPayForm]         = useState({accountId:"AC1",isPaid:true});
  const [selectedDiscount, setSelectedDiscount] = useState(null);

  const applyDiscount = (subtot, delivery) => {
    if (!selectedDiscount) return 0;
    const d = selectedDiscount;
    if (d.type==="porcentaje")  return subtot * (d.value/100);
    if (d.type==="monto fijo")  return Math.min(d.value, subtot);
    if (d.type==="envío gratis") return delivery;
    return 0;
  };
  const [cart,setCart]               = useState([]);
  const [cartQty,setCartQty]         = useState({});
  const emptyForm = {client:"",phone:"",clientId:"",notes:"",accountId:"AC1",delivery:"local",deliveryCost:"0"};
  const [form,setForm]               = useState(emptyForm);
  const [clientSearch, setClientSearch] = useState("");
  const [showClientDrop, setShowClientDrop] = useState(false);
  const [showInlineNew, setShowInlineNew]   = useState(false);
  const [inlineNewPhone, setInlineNewPhone] = useState("");

  const filtered  = filter==="todos" ? orders : orders.filter(o=>o.status===filter);
  const subtotal  = cart.reduce((s,i)=>s+i.qty*i.price,0);
  const deliveryCostNum = parseFloat(form.deliveryCost||0);
  const discountAmt  = applyDiscount(subtotal, deliveryCostNum);
  const cartTotal    = subtotal + deliveryCostNum - discountAmt;

  const addToCart = (item) => {
    const qty = parseInt(cartQty[item.id]||1);
    setCart(prev=>{ const ex=prev.find(c=>c.name===item.name); if(ex) return prev.map(c=>c.name===item.name?{...c,qty:c.qty+qty}:c); return [...prev,{name:item.name,qty,price:item.price}]; });
  };
  const removeFromCart = (name) => setCart(prev=>prev.filter(c=>c.name!==name));

  const saveOrder = () => {
    if (!form.client||cart.length===0) return;
    const delCost = parseFloat(form.deliveryCost||0);
    const sub = cart.reduce((s,i)=>s+i.qty*i.price,0);
    // ensure client exists
    let cid = form.clientId;
    if (!cid) {
      cid = "C"+uid();
      setClients(prev=>[...prev,{id:cid,name:form.client,phone:form.phone,debt:0,orders:[]}]);
    }
    const discAmt = applyDiscount(sub, delCost);
    setOrders(prev=>[{id:uid(),...form,clientId:cid,date:today(),status:"pendiente",items:cart,subtotal:sub,deliveryCost:delCost,discountId:selectedDiscount?.id||null,discountAmt:discAmt,total:sub+delCost-discAmt,paid:false,debt:false},...prev]);
    setSelectedDiscount(null);
    setCart([]); setCartQty({}); setForm(emptyForm); setClientSearch(''); setShowClientDrop(false); setShowInlineNew(false); setInlineNewPhone(''); setSelectedDiscount(null); setShowModal(false);
  };

  // When status changes to "entregado" open payment decision modal
  const updateStatus = (id, status) => {
    const ord = orders.find(o=>o.id===id);
    if (!ord) return;
    // When going from "en preparación" → "listo": show variable supplies popup
    if (status==="listo" && ord.status==="en preparación") {
      setOrders(prev=>prev.map(o=>o.id===id?{...o,status}:o));
      const initCounts = {};
      VARIABLE_SUPPLIES_CONFIG.forEach(s=>{ initCounts[s.articleId]=s.defaultQty; });
      setSupplyCounts(initCounts);
      setSuppliesModal(ord);
      return;
    }
    // When going to "entregado": show payment decision
    if (status==="entregado" && !ord.paid && !ord.debt) {
      setOrders(prev=>prev.map(o=>o.id===id?{...o,status}:o));
      setPayModal(ord);
      setPayForm({accountId:"AC1", isPaid:true});
      return;
    }
    setOrders(prev=>prev.map(o=>o.id===id?{...o,status}:o));

    if (!suppliesModal) return;
    // Deduct variable supplies from stock
    const moves = VARIABLE_SUPPLIES_CONFIG
      .filter(s=>parseFloat(supplyCounts[s.articleId]||0)>0)
      .map(s=>({
        id:uid(), articleId:s.articleId, type:"salida",
        qty:parseFloat(supplyCounts[s.articleId]||0),
        unitCost:null, invoiceId:null, date:today(),
        note:`Pedido #${suppliesModal.id} — ${suppliesModal.client}`,
      }));
    // moves are set directly here — onConsumeStock reserved for recipe-based deductions
    if (moves.length>0) {
      // call parent via a direct stock move injection
      onConsumeStock({productName:"__supplies__",ingredients:[]}, 0, moves);
    }
    setSuppliesModal(null);
  };

  const confirmPayment = () => {
    if (!payModal) return;
    const ord = payModal;
    if (payForm.isPaid) {
      // paid now → income to selected account
      onAddIncome({desc:`Pedido #${ord.id} — ${ord.client}`,amount:ord.subtotal,category:"ventas",date:today(),accountId:payForm.accountId});
      setOrders(prev=>prev.map(o=>o.id===ord.id?{...o,paid:true,debt:false,accountId:payForm.accountId}:o));
    } else {
      // debt → register as client debt
      onRegisterDebt({orderId:ord.id,clientId:ord.clientId,client:ord.client,amount:ord.subtotal,date:today()});
      setOrders(prev=>prev.map(o=>o.id===ord.id?{...o,paid:false,debt:true}:o));
    }
    // consume stock on delivery
    ord.items.forEach(item => {
      const recipe = recipes.find(r=>r.productName===item.name);
      if (recipe) onConsumeStock(recipe, item.qty);
    });
    setPayModal(null);
  };

  const stats = {
    hoy:       orders.filter(o=>o.date===today()).length,
    pendientes:orders.filter(o=>["pendiente","en preparación"].includes(o.status)).length,
    entregados:orders.filter(o=>o.status==="entregado").length,
    ventas:    orders.filter(o=>o.date===today()&&o.paid).reduce((s,o)=>s+o.subtotal,0),
    deudas:    orders.filter(o=>o.debt).length,
  };

  const dmLabel = (id) => { const d=DELIVERY_METHODS.find(m=>m.id===id); return d?`${d.icon} ${d.label}`:""; };
  const acLabel = (id) => { const a=accounts.find(a=>a.id===id); return a?`${a.icon} ${a.name}`:""; };

  return (
    <div className="fadeIn">
      <SectionTitle sub="Gestión de pedidos en tiempo real">PEDIDOS</SectionTitle>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:24}}>
        <StatCard label="Pedidos hoy"    value={stats.hoy}         color={G.accent} />
        <StatCard label="En curso"       value={stats.pendientes}  color={G.yellow} />
        <StatCard label="Entregados"     value={stats.entregados}  color={G.green}  />
        <StatCard label="Ventas del día" value={fmt(stats.ventas)} color={G.green}  />
        <StatCard label="Deudas activas" value={stats.deudas}      color={stats.deudas>0?G.red:G.muted} />
      </div>
      <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
        <Btn onClick={()=>setShowModal(true)}>+ Nuevo Pedido</Btn>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {["todos",...ORDER_STATUS].map(s=>(
            <button key={s} onClick={()=>setFilter(s)} style={{padding:"5px 12px",borderRadius:20,fontSize:12,border:"1px solid",borderColor:filter===s?G.accent:G.border,background:filter===s?G.accent+"22":"transparent",color:filter===s?G.accent:G.muted,fontFamily:G.font,cursor:"pointer"}}>{s}</button>
          ))}
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {filtered.length===0 && <div style={{color:G.muted,textAlign:"center",padding:40}}>No hay pedidos</div>}
        {filtered.map(order=>{
          const dm = DELIVERY_METHODS.find(m=>m.id===order.delivery);
          return (
            <Card key={order.id} style={{display:"flex",flexWrap:"wrap",gap:12,alignItems:"center",borderColor:order.debt?G.red+"44":G.border}}>
              <div style={{flex:1,minWidth:180}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                  <span style={{color:G.muted,fontSize:11}}>#{order.id}</span>
                  <Badge label={order.status} type={STATUS_COLOR[order.status]} />
                  {order.paid && <Badge label="PAGADO" type="green" />}
                  {order.debt && <Badge label="DEUDA" type="red" />}
                  {dm && <span style={{fontSize:11,color:G.muted}}>{dm.icon}</span>}
                </div>
                <div style={{fontWeight:500,fontSize:15}}>{order.client}</div>
                <div style={{color:G.muted,fontSize:12}}>{order.phone} · {order.date}</div>
              </div>
              <div style={{flex:1,minWidth:160}}>
                {order.items.slice(0,2).map((it,i)=><div key={i} style={{fontSize:13}}>{it.qty}x {it.name}</div>)}
                {order.items.length>2 && <div style={{color:G.muted,fontSize:12}}>+{order.items.length-2} más</div>}
                {order.deliveryCost>0 && <div style={{color:G.yellow,fontSize:12}}>+ envío {fmt(order.deliveryCost)}</div>}
                {order.discountAmt>0 && <div style={{color:G.green,fontSize:12}}>🏷 −{fmt(order.discountAmt)}</div>}
              </div>
              <div style={{textAlign:"right",minWidth:100}}>
                <div style={{fontFamily:G.display,fontSize:22,color:G.accent}}>{fmt(order.total)}</div>
                {order.deliveryCost>0 && <div style={{color:G.muted,fontSize:11}}>sub {fmt(order.subtotal)}</div>}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6,minWidth:120}}>
                <Select value={order.status} onChange={e=>updateStatus(order.id,e.target.value)} style={{fontSize:12,padding:"4px 8px"}}>
                  {ORDER_STATUS.map(s=><option key={s}>{s}</option>)}
                </Select>
                <Btn variant="ghost" style={{fontSize:11,padding:"4px 8px"}} onClick={()=>setDetail(order)}>Ver detalle</Btn>
              </div>
            </Card>
          );
        })}
      </div>

      {/* ── VARIABLE SUPPLIES MODAL ── */}
      {suppliesModal && (
        <Modal title="INSUMOS DEL PEDIDO" onClose={()=>setSuppliesModal(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:G.surface,borderRadius:8,padding:12}}>
              <div style={{color:G.muted,fontSize:11,marginBottom:4}}>Pedido #{suppliesModal.id} · {suppliesModal.client}</div>
              <div style={{fontSize:13,color:G.muted}}>El pedido está listo. Registrá los insumos variables que se usaron.</div>
            </div>
            {VARIABLE_SUPPLIES_CONFIG.map(s=>{
              const art    = articles.find(a=>a.id===s.articleId);
              const stock  = computeStock(stockMoves)[s.articleId]||0;
              const qty    = supplyCounts[s.articleId]||0;
              const low    = stock < qty;
              return (
                <div key={s.articleId} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:G.surface,borderRadius:8,padding:"14px 16px"}}>
                  <div>
                    <div style={{fontWeight:500,fontSize:15}}>{art?.name||s.articleId}</div>
                    <div style={{color:low?G.red:G.muted,fontSize:12}}>
                      Stock disponible: {stock} {art?.unit}
                      {low&&" ⚠ insuficiente"}
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <button
                      onClick={()=>setSupplyCounts(p=>({...p,[s.articleId]:Math.max(0, parseFloat(p[s.articleId]||0)-s.step)}))}
                      style={{width:36,height:36,borderRadius:8,background:G.card,border:`1px solid ${G.border}`,color:G.text,fontSize:20,cursor:"pointer",fontFamily:G.font,lineHeight:1}}>−</button>
                    <span style={{fontFamily:G.display,fontSize:28,color:qty>0?G.accent:G.muted,minWidth:40,textAlign:"center"}}>{qty}</span>
                    <button
                      onClick={()=>setSupplyCounts(p=>({...p,[s.articleId]:parseFloat(p[s.articleId]||0)+s.step}))}
                      style={{width:36,height:36,borderRadius:8,background:G.card,border:`1px solid ${G.border}`,color:G.text,fontSize:20,cursor:"pointer",fontFamily:G.font,lineHeight:1}}>+</button>
                  </div>
                </div>
              );
            })}
            <div style={{color:G.muted,fontSize:11,textAlign:"center"}}>Si no usaste alguno dejalo en 0 — no se descuenta nada</div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setSuppliesModal(null)}>Omitir</Btn>
              <Btn variant="success" onClick={confirmSupplies}>✓ Confirmar</Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* ── PAYMENT DECISION MODAL ── */}
      {payModal && (
        <Modal title="COBRO DEL PEDIDO" onClose={()=>setPayModal(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:G.surface,borderRadius:8,padding:14}}>
              <div style={{color:G.muted,fontSize:11,marginBottom:4}}>Cliente</div>
              <div style={{fontWeight:500,fontSize:16}}>{payModal.client}</div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:10}}>
                <div><div style={{color:G.muted,fontSize:11}}>Subtotal</div><div style={{fontFamily:G.display,fontSize:20,color:G.text}}>{fmt(payModal.subtotal)}</div></div>
                {payModal.deliveryCost>0 && <div><div style={{color:G.muted,fontSize:11}}>Envío</div><div style={{fontFamily:G.display,fontSize:20,color:G.yellow}}>{fmt(payModal.deliveryCost)}</div></div>}
                <div><div style={{color:G.muted,fontSize:11}}>Total</div><div style={{fontFamily:G.display,fontSize:24,color:G.accent}}>{fmt(payModal.total)}</div></div>
              </div>
            </div>

            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setPayForm({...payForm,isPaid:true})} style={{flex:1,padding:"12px",borderRadius:8,fontFamily:G.font,fontSize:13,cursor:"pointer",lineHeight:1.5,background:payForm.isPaid?G.green+"22":"transparent",border:`1px solid ${payForm.isPaid?G.green:G.border}`,color:payForm.isPaid?G.green:G.muted}}>
                ✅ Pagado ahora<br/><span style={{fontSize:11,opacity:0.7}}>Se registra como ingreso</span>
              </button>
              <button onClick={()=>setPayForm({...payForm,isPaid:false})} style={{flex:1,padding:"12px",borderRadius:8,fontFamily:G.font,fontSize:13,cursor:"pointer",lineHeight:1.5,background:!payForm.isPaid?G.red+"22":"transparent",border:`1px solid ${!payForm.isPaid?G.red:G.border}`,color:!payForm.isPaid?G.red:G.muted}}>
                📋 Queda pendiente<br/><span style={{fontSize:11,opacity:0.7}}>Se registra como deuda</span>
              </button>
            </div>

            {payForm.isPaid && (
              <Select label="Cuenta / Medio de cobro" value={payForm.accountId} onChange={e=>setPayForm({...payForm,accountId:e.target.value})}>
                {accounts.map(a=><option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}
              </Select>
            )}

            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setPayModal(null)}>Cancelar</Btn>
              <Btn variant={payForm.isPaid?"success":"danger"} onClick={confirmPayment}>
                {payForm.isPaid?"Confirmar cobro":"Registrar deuda"}
              </Btn>
            </div>
          </div>
        </Modal>
      )}

      {showModal && (
        <Modal title="NUEVO PEDIDO" onClose={()=>{setShowModal(false);setClientSearch('');setShowClientDrop(false);setShowInlineNew(false);setInlineNewPhone('');}} wide>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {/* ── Smart client picker ── */}
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <label style={{color:G.muted,fontSize:11,letterSpacing:1,textTransform:"uppercase"}}>Cliente</label>
              <div style={{position:"relative"}}>
                <div style={{display:"flex",gap:8}}>
                  <div style={{flex:1,position:"relative"}}>
                    <input
                      value={form.clientId ? form.client : clientSearch}
                      onChange={e=>{
                        setClientSearch(e.target.value);
                        setForm({...form,clientId:"",client:e.target.value,phone:""});
                        setShowClientDrop(true);
                        setShowInlineNew(false);
                      }}
                      onFocus={()=>setShowClientDrop(true)}
                      placeholder="Buscar cliente..."
                      style={{width:"100%",background:G.surface,border:`1px solid ${form.clientId?G.green:G.border}`,borderRadius:6,padding:"8px 12px",color:G.text,fontSize:14,outline:"none"}}
                    />
                    {form.clientId && (
                      <button onClick={()=>{setForm({...form,clientId:"",client:"",phone:""});setClientSearch("");setShowInlineNew(false);}}
                        style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"transparent",color:G.muted,fontSize:14,cursor:"pointer"}}>✕</button>
                    )}
                  </div>
                  <Btn variant="ghost" style={{whiteSpace:"nowrap",fontSize:12,padding:"6px 12px"}} onClick={()=>{setShowInlineNew(!showInlineNew);setShowClientDrop(false);}}>
                    {showInlineNew?"Cancelar":"+ Nuevo"}
                  </Btn>
                </div>

                {/* Dropdown */}
                {showClientDrop && !form.clientId && clientSearch.length>0 && (()=>{
                  const filtered = clients.filter(c=>c.name.toLowerCase().includes(clientSearch.toLowerCase())).slice(0,6);
                  return filtered.length>0 ? (
                    <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:50,background:G.card,border:`1px solid ${G.border}`,borderRadius:8,marginTop:4,overflow:"hidden",boxShadow:"0 8px 24px #0006"}}>
                      {filtered.map(c=>(
                        <button key={c.id} onClick={()=>{setForm({...form,clientId:c.id,client:c.name,phone:c.phone||""});setClientSearch("");setShowClientDrop(false);setShowInlineNew(false);}}
                          style={{width:"100%",padding:"10px 14px",textAlign:"left",fontFamily:G.font,fontSize:13,background:"transparent",color:G.text,borderBottom:`1px solid ${G.border}`,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}
                          onMouseEnter={e=>e.currentTarget.style.background=G.surface}
                          onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                          <span>{c.name}</span>
                          <span style={{color:G.muted,fontSize:11}}>{c.phone}</span>
                        </button>
                      ))}
                    </div>
                  ) : (
                    <div style={{position:"absolute",top:"100%",left:0,right:60,zIndex:50,background:G.card,border:`1px solid ${G.border}`,borderRadius:8,marginTop:4,padding:"10px 14px"}}>
                      <span style={{color:G.muted,fontSize:13}}>No encontrado — usá "+ Nuevo"</span>
                    </div>
                  );
                })()}
              </div>

              {/* Selected client info */}
              {form.clientId && (
                <div style={{background:G.green+"11",border:`1px solid ${G.green}33`,borderRadius:6,padding:"8px 12px",fontSize:12,color:G.green,display:"flex",gap:8}}>
                  <span>✓</span><span>{form.client}</span>{form.phone&&<span style={{color:G.muted}}>· {form.phone}</span>}
                </div>
              )}

              {/* Inline new client form */}
              {showInlineNew && (
                <div style={{background:G.surface,border:`1px solid ${G.border}`,borderRadius:8,padding:12,display:"flex",flexDirection:"column",gap:10}}>
                  <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1}}>Nuevo cliente</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    <input value={form.client} onChange={e=>setForm({...form,client:e.target.value})} placeholder="Nombre *"
                      style={{background:G.card,border:`1px solid ${G.border}`,borderRadius:6,padding:"7px 10px",color:G.text,fontSize:13,outline:"none"}} />
                    <input value={inlineNewPhone} onChange={e=>setInlineNewPhone(e.target.value)} placeholder="Teléfono (opcional)"
                      style={{background:G.card,border:`1px solid ${G.border}`,borderRadius:6,padding:"7px 10px",color:G.text,fontSize:13,outline:"none"}} />
                  </div>
                  <Btn variant="success" style={{fontSize:12,alignSelf:"flex-end"}} onClick={()=>{
                    if (!form.client) return;
                    const newId = "C"+uid();
                    setClients(prev=>[...prev,{id:newId,name:form.client,phone:inlineNewPhone,debt:0,orders:[]}]);
                    setForm({...form,clientId:newId,phone:inlineNewPhone});
                    setInlineNewPhone(""); setShowInlineNew(false);
                  }}>✓ Agregar cliente</Btn>
                </div>
              )}
            </div>

            {/* Delivery */}
            <div style={{background:G.surface,borderRadius:8,padding:14}}>
              <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Método de entrega</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:form.delivery!=="local"?10:0}}>
                {DELIVERY_METHODS.map(dm=>(
                  <button key={dm.id} onClick={()=>setForm({...form,delivery:dm.id,deliveryCost:dm.id==="local"?"0":form.deliveryCost})}
                    style={{padding:"10px",borderRadius:8,fontFamily:G.font,fontSize:13,cursor:"pointer",background:form.delivery===dm.id?G.accent+"22":"transparent",border:`1px solid ${form.delivery===dm.id?G.accent:G.border}`,color:form.delivery===dm.id?G.accent:G.muted}}>
                    {dm.icon} {dm.label}
                  </button>
                ))}
              </div>
              {form.delivery!=="local" && (
                <Input label="Costo de envío ($) — podés completarlo después" type="number" value={form.deliveryCost} onChange={e=>setForm({...form,deliveryCost:e.target.value})} placeholder="0 (opcional)" />
              )}
            </div>

            <Input label="Notas" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Sin cebolla, extra queso..." />

            {/* Discount selector */}
            {discounts.filter(d=>d.active).length>0 && (
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                <label style={{color:G.muted,fontSize:11,letterSpacing:1,textTransform:"uppercase"}}>Descuento / Promoción</label>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <button onClick={()=>setSelectedDiscount(null)}
                    style={{padding:"5px 12px",borderRadius:20,fontSize:12,fontFamily:G.font,cursor:"pointer",border:"1px solid",borderColor:!selectedDiscount?G.accent:G.border,background:!selectedDiscount?G.accent+"22":"transparent",color:!selectedDiscount?G.accent:G.muted}}>
                    Sin descuento
                  </button>
                  {discounts.filter(d=>d.active).map(d=>(
                    <button key={d.id} onClick={()=>setSelectedDiscount(selectedDiscount?.id===d.id?null:d)}
                      style={{padding:"5px 12px",borderRadius:20,fontSize:12,fontFamily:G.font,cursor:"pointer",border:"1px solid",borderColor:selectedDiscount?.id===d.id?G.green:G.border,background:selectedDiscount?.id===d.id?G.green+"22":"transparent",color:selectedDiscount?.id===d.id?G.green:G.muted}}>
                      🏷 {d.name} {d.type==="porcentaje"?`(${d.value}%)`:d.type==="monto fijo"?`(${fmt(d.value)})`:d.type==="envío gratis"?"(env. gratis)":""}
                    </button>
                  ))}
                </div>
              </div>
            )}

            <div style={{borderTop:`1px solid ${G.border}`,paddingTop:14}}>
              <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Menú</div>
              {allMenu.map(item=>(
                <div key={item.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${G.border}`}}>
                  <div><div style={{fontSize:13}}>{item.name}</div><div style={{color:G.accent,fontSize:12}}>{fmt(item.price)}</div></div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <input type="number" min="1" max="20" value={cartQty[item.id]||1} onChange={e=>setCartQty({...cartQty,[item.id]:e.target.value})}
                      style={{width:48,background:G.surface,border:`1px solid ${G.border}`,borderRadius:4,padding:"4px 6px",color:G.text,fontFamily:G.font,textAlign:"center"}} />
                    <Btn variant="success" style={{padding:"4px 10px",fontSize:12}} onClick={()=>addToCart(item)}>+</Btn>
                  </div>
                </div>
              ))}
            </div>
            {cart.length>0 && (
              <div style={{background:G.surface,borderRadius:8,padding:12}}>
                <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Carrito</div>
                {cart.map((c,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <span>{c.qty}x {c.name}</span>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <span style={{color:G.accent}}>{fmt(c.qty*c.price)}</span>
                      <Btn variant="danger" style={{padding:"2px 6px",fontSize:11}} onClick={()=>removeFromCart(c.name)}>✕</Btn>
                    </div>
                  </div>
                ))}
                <div style={{borderTop:`1px solid ${G.border}`,marginTop:8,paddingTop:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{color:G.muted}}>Subtotal</span><span>{fmt(subtotal)}</span></div>
                  {deliveryCostNum>0 && <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{color:G.muted}}>Envío</span><span style={{color:G.yellow}}>{fmt(deliveryCostNum)}</span></div>}
                  {discountAmt>0 && <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{color:G.green}}>🏷 {selectedDiscount?.name}</span><span style={{color:G.green}}>−{fmt(discountAmt)}</span></div>}
                  <div style={{display:"flex",justifyContent:"space-between",paddingTop:6,borderTop:`1px solid ${G.border}`,marginTop:6}}>
                    <span style={{fontWeight:500}}>TOTAL</span><span style={{fontFamily:G.display,fontSize:20,color:G.accent}}>{fmt(cartTotal)}</span>
                  </div>
                </div>
              </div>
            )}
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setShowModal(false)}>Cancelar</Btn>
              <Btn onClick={saveOrder}>Guardar Pedido</Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* DETAIL MODAL */}
      {detail && (
        <Modal title={`PEDIDO #${detail.id}`} onClose={()=>setDetail(null)} wide>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><div style={{color:G.muted,fontSize:11}}>CLIENTE</div><div>{detail.client}</div></div>
              <div><div style={{color:G.muted,fontSize:11}}>TELÉFONO</div><div>{detail.phone}</div></div>
              <div><div style={{color:G.muted,fontSize:11}}>FECHA</div><div>{detail.date}</div></div>
              <div><div style={{color:G.muted,fontSize:11}}>ENTREGA</div><div>{dmLabel(detail.delivery)}</div></div>
            </div>
            {detail.notes && <div style={{background:G.surface,padding:10,borderRadius:6,color:G.muted}}><b>Notas:</b> {detail.notes}</div>}
            {detail.items.map((it,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${G.border}`}}>
                <span>{it.qty}x {it.name}</span><span style={{color:G.accent}}>{fmt(it.qty*it.price)}</span>
              </div>
            ))}
            <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0"}}><span style={{color:G.muted}}>Subtotal</span><span>{fmt(detail.subtotal)}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",alignItems:"center"}}>
                  <span style={{color:G.muted}}>Envío ({dmLabel(detail.delivery)})</span>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{color:G.yellow}}>{fmt(detail.deliveryCost||0)}</span>
                    {detail.status!=="entregado" && <button onClick={()=>{const v=prompt("Nuevo costo de envío:",detail.deliveryCost||0);if(v!==null)setOrders(prev=>prev.map(o=>o.id===detail.id?{...o,deliveryCost:parseFloat(v||0),total:o.subtotal+parseFloat(v||0)-(o.discountAmt||0)}:o));}} style={{fontSize:10,color:G.accent,background:"transparent",fontFamily:G.font,cursor:"pointer"}}>editar</button>}
                  </div>
                </div>
            <div style={{display:"flex",justifyContent:"space-between",paddingTop:8,borderTop:`1px solid ${G.border}`,fontWeight:500}}>
              <span>TOTAL</span><span style={{fontFamily:G.display,fontSize:22,color:G.accent}}>{fmt(detail.total)}</span>
            </div>
            {detail.accountId && <div style={{color:G.muted,fontSize:12,textAlign:"right"}}>Cobrado en: {acLabel(detail.accountId)}</div>}
            <div style={{display:"flex",gap:8,justifyContent:"center"}}>
              <Badge label={detail.status} type={STATUS_COLOR[detail.status]} />
              {detail.paid && <Badge label="PAGADO" type="green" />}
              {detail.debt && <Badge label="DEUDA PENDIENTE" type="red" />}
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// MODULE: CLIENTES
// ══════════════════════════════════════════════════════════════════════════════
const INITIAL_CLIENTS = [];

function ClientsModule({ clients, setClients, accounts, onAddIncome, debts, setDebts }) {
  const [detail, setDetail]             = useState(null);
  const [payDebtModal, setPayDebtModal] = useState(null);
  const [payDebtForm, setPayDebtForm]   = useState({accountId:"AC1", amount:""});
  const [showNewClient, setShowNewClient] = useState(false);
  const [newForm, setNewForm]           = useState({name:"",phone:""});

  const clientDebts = (cid) => debts.filter(d=>d.clientId===cid && !d.paid);
  const totalDebt   = (cid) => clientDebts(cid).reduce((s,d)=>s+d.amount,0);
  const totalDebtAll = debts.filter(d=>!d.paid).reduce((s,d)=>s+d.amount,0);

  const saveClient = () => {
    if (!newForm.name) return;
    setClients(prev=>[...prev,{id:"C"+uid(),name:newForm.name,phone:newForm.phone,debt:0}]);
    setNewForm({name:"",phone:""}); setShowNewClient(false);
  };

  const openPayDebt = (debt) => { setPayDebtModal(debt); setPayDebtForm({accountId:"AC1",amount:String(debt.amount)}); };

  const confirmPayDebt = () => {
    if (!payDebtModal) return;
    const amount = parseFloat(payDebtForm.amount||0);
    setDebts(prev=>prev.map(d=>d.id===payDebtModal.id?{...d,paid:true,paidDate:today(),paidAccount:payDebtForm.accountId}:d));
    onAddIncome({desc:`Cobro deuda — ${payDebtModal.client} (Pedido #${payDebtModal.orderId})`,amount,category:"ventas",date:today(),accountId:payDebtForm.accountId});
    setPayDebtModal(null);
  };

  return (
    <div className="fadeIn">
      <SectionTitle sub="Clientes y deudas pendientes">CLIENTES</SectionTitle>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:24}}>
        <StatCard label="Clientes"        value={clients.length}                          color={G.accent} />
        <StatCard label="Con deuda"       value={clients.filter(c=>totalDebt(c.id)>0).length} color={G.red} />
        <StatCard label="Deuda total"     value={fmt(totalDebtAll)}                        color={totalDebtAll>0?G.red:G.green} />
      </div>

      <div style={{marginBottom:16}}><Btn onClick={()=>setShowNewClient(true)}>+ Nuevo Cliente</Btn></div>

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {clients.length===0 && <div style={{color:G.muted,textAlign:"center",padding:40}}>No hay clientes</div>}
        {clients.map(c=>{
          const debt = totalDebt(c.id);
          const pending = clientDebts(c.id);
          return (
            <Card key={c.id} style={{display:"flex",flexWrap:"wrap",gap:12,alignItems:"center",borderColor:debt>0?G.red+"44":G.border}}>
              <div style={{width:38,height:38,borderRadius:"50%",background:G.accent+"22",display:"flex",alignItems:"center",justifyContent:"center",color:G.accent,fontSize:18,flexShrink:0}}>👤</div>
              <div style={{flex:1,minWidth:160}}>
                <div style={{fontWeight:500,fontSize:15}}>{c.name}</div>
                <div style={{color:G.muted,fontSize:12}}>{c.phone}</div>
              </div>
              <div style={{minWidth:120,textAlign:"right"}}>
                <div style={{color:G.muted,fontSize:11}}>Deuda pendiente</div>
                <div style={{fontFamily:G.display,fontSize:22,color:debt>0?G.red:G.green}}>{fmt(debt)}</div>
                {pending.length>0 && <div style={{color:G.muted,fontSize:11}}>{pending.length} pedido{pending.length!==1?"s":""} sin cobrar</div>}
              </div>
              <Btn variant="ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>setDetail(c)}>Ver ficha</Btn>
            </Card>
          );
        })}
      </div>

      {/* CLIENT DETAIL */}
      {detail && (
        <Modal title={`FICHA — ${detail.name}`} onClose={()=>setDetail(null)} wide>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><div style={{color:G.muted,fontSize:11}}>TELÉFONO</div><div>{detail.phone||"—"}</div></div>
              <div><div style={{color:G.muted,fontSize:11}}>DEUDA TOTAL</div><div style={{color:totalDebt(detail.id)>0?G.red:G.green,fontWeight:500}}>{fmt(totalDebt(detail.id))}</div></div>
            </div>

            {clientDebts(detail.id).length>0 && (
              <div style={{background:G.surface,borderRadius:8,padding:14}}>
                <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Deudas pendientes</div>
                {clientDebts(detail.id).map(d=>(
                  <div key={d.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${G.border}`}}>
                    <div>
                      <div style={{fontSize:13}}>Pedido #{d.orderId}</div>
                      <div style={{color:G.muted,fontSize:11}}>{d.date}</div>
                    </div>
                    <div style={{display:"flex",gap:10,alignItems:"center"}}>
                      <span style={{fontFamily:G.display,fontSize:18,color:G.red}}>{fmt(d.amount)}</span>
                      <Btn variant="success" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>openPayDebt(d)}>Cobrar</Btn>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {debts.filter(d=>d.clientId===detail.id&&d.paid).length>0 && (
              <div style={{background:G.surface,borderRadius:8,padding:14}}>
                <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Historial cobrado</div>
                {debts.filter(d=>d.clientId===detail.id&&d.paid).map(d=>{
                  const acc = accounts.find(a=>a.id===d.paidAccount);
                  return (
                    <div key={d.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${G.border}`,fontSize:13}}>
                      <span style={{color:G.muted}}>Pedido #{d.orderId} · {d.paidDate}</span>
                      <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        {acc && <span style={{fontSize:11,color:G.muted}}>{acc.icon} {acc.name}</span>}
                        <span style={{color:G.green}}>{fmt(d.amount)}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {clientDebts(detail.id).length===0 && debts.filter(d=>d.clientId===detail.id).length===0 &&
              <div style={{color:G.muted,textAlign:"center",padding:20}}>Sin historial de deudas</div>}
          </div>
        </Modal>
      )}

      {/* PAY DEBT MODAL */}
      {payDebtModal && (
        <Modal title="REGISTRAR COBRO" onClose={()=>setPayDebtModal(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:G.surface,padding:12,borderRadius:8}}>
              <div style={{color:G.muted,fontSize:11}}>Cliente · Pedido #{payDebtModal.orderId}</div>
              <div style={{fontWeight:500,fontSize:15,marginTop:4}}>{payDebtModal.client}</div>
              <div style={{fontFamily:G.display,fontSize:24,color:G.red,marginTop:4}}>{fmt(payDebtModal.amount)}</div>
            </div>
            <Input label="Monto cobrado ($)" type="number" value={payDebtForm.amount} onChange={e=>setPayDebtForm({...payDebtForm,amount:e.target.value})} />
            <Select label="Cuenta / Medio de pago" value={payDebtForm.accountId} onChange={e=>setPayDebtForm({...payDebtForm,accountId:e.target.value})}>
              {accounts.map(a=><option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}
            </Select>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setPayDebtModal(null)}>Cancelar</Btn>
              <Btn variant="success" onClick={confirmPayDebt}>✓ Confirmar cobro</Btn>
            </div>
          </div>
        </Modal>
      )}

      {showNewClient && (
        <Modal title="NUEVO CLIENTE" onClose={()=>setShowNewClient(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <Input label="Nombre" value={newForm.name} onChange={e=>setNewForm({...newForm,name:e.target.value})} placeholder="Nombre completo" />
            <Input label="Teléfono" value={newForm.phone} onChange={e=>setNewForm({...newForm,phone:e.target.value})} placeholder="11-XXXX-XXXX" />
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setShowNewClient(false)}>Cancelar</Btn>
              <Btn onClick={saveClient}>Guardar</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// MODULE: CUENTAS (Accounts/Cajas)
// ══════════════════════════════════════════════════════════════════════════════
function AccountsModule({ accounts, setAccounts, transactions }) {
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({name:"",type:"banco",icon:"🏦"});
  const ACCOUNT_TYPES = ["efectivo","banco","billetera","tarjeta"];
  const ACCOUNT_ICONS = ["💵","🏦","📱","💳","💰","🏧"];

  const balance = (acId) => {
    const ins  = transactions.filter(t=>t.type==="ingreso"&&t.accountId===acId).reduce((s,t)=>s+t.amount,0);
    const outs = transactions.filter(t=>t.type==="egreso" &&t.accountId===acId).reduce((s,t)=>s+t.amount,0);
    return ins - outs;
  };

  const save = () => {
    if (!form.name) return;
    setAccounts(prev=>[...prev,{id:"AC"+uid(),...form}]);
    setForm({name:"",type:"banco",icon:"🏦"}); setShowModal(false);
  };

  return (
    <div className="fadeIn">
      <SectionTitle sub="Saldo por cuenta y medio de pago">CUENTAS</SectionTitle>
      <div style={{marginBottom:16}}><Btn onClick={()=>setShowModal(true)}>+ Nueva Cuenta</Btn></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:12}}>
        {accounts.map(ac=>{
          const bal = balance(ac.id);
          return (
            <Card key={ac.id} style={{borderTop:`3px solid ${ac.color||G.accent}`}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                <span style={{fontSize:24}}>{ac.icon}</span>
                <div>
                  <div style={{fontWeight:500}}>{ac.name}</div>
                  <div style={{color:G.muted,fontSize:11,textTransform:"capitalize"}}>{ac.type}</div>
                </div>
              </div>
              <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1}}>Saldo</div>
              <div style={{fontFamily:G.display,fontSize:32,color:bal>=0?G.green:G.red,lineHeight:1.1}}>{fmt(bal)}</div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:10,fontSize:12,color:G.muted}}>
                <span>↑ {fmt(transactions.filter(t=>t.type==="ingreso"&&t.accountId===ac.id).reduce((s,t)=>s+t.amount,0))}</span>
                <span>↓ {fmt(transactions.filter(t=>t.type==="egreso"&&t.accountId===ac.id).reduce((s,t)=>s+t.amount,0))}</span>
              </div>
            </Card>
          );
        })}
      </div>
      {showModal && (
        <Modal title="NUEVA CUENTA" onClose={()=>setShowModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <Input label="Nombre" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Ej: Banco Nación" />
            <Select label="Tipo" value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
              {ACCOUNT_TYPES.map(t=><option key={t}>{t}</option>)}
            </Select>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <label style={{color:G.muted,fontSize:11,letterSpacing:1,textTransform:"uppercase"}}>Ícono</label>
              <div style={{display:"flex",gap:8}}>
                {ACCOUNT_ICONS.map(ic=>(
                  <button key={ic} onClick={()=>setForm({...form,icon:ic})} style={{width:36,height:36,borderRadius:8,fontSize:20,border:`2px solid ${form.icon===ic?G.accent:G.border}`,background:form.icon===ic?G.accent+"22":"transparent",cursor:"pointer"}}>{ic}</button>
                ))}
              </div>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setShowModal(false)}>Cancelar</Btn>
              <Btn onClick={save}>Guardar</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// MODULE: FINANZAS
// ══════════════════════════════════════════════════════════════════════════════
const INCOME_CATS  = ["ventas","otros ingresos"];
const EXPENSE_CATS = ["materia prima","sueldos","alquiler","servicios","packaging","marketing","otros gastos"];
const INITIAL_TRANSACTIONS = [];

function FinanceModule({ extraTransactions, accounts }) {
  const [transactions,setTransactions] = useState(INITIAL_TRANSACTIONS);
  const [showModal,setShowModal]       = useState(false);
  const [modalType,setModalType]       = useState("ingreso");
  const [filter,setFilter]             = useState("todos");
  const [form,setForm]                 = useState({desc:"",amount:"",category:"",date:today()});

  const allTx     = [...transactions,...extraTransactions];
  const filtered  = filter==="todos" ? allTx : allTx.filter(t=>t.type===filter);
  const sorted    = [...filtered].sort((a,b)=>b.date.localeCompare(a.date));
  const thisMonth = new Date().toISOString().slice(0,7);
  const totalIngresos = allTx.filter(t=>t.type==="ingreso").reduce((s,t)=>s+t.amount,0);
  const totalEgresos  = allTx.filter(t=>t.type==="egreso" ).reduce((s,t)=>s+t.amount,0);
  const mesIngresos   = allTx.filter(t=>t.type==="ingreso"&&t.date.startsWith(thisMonth)).reduce((s,t)=>s+t.amount,0);
  const mesEgresos    = allTx.filter(t=>t.type==="egreso" &&t.date.startsWith(thisMonth)).reduce((s,t)=>s+t.amount,0);
  const byCategory    = {};
  allTx.filter(t=>t.type==="egreso").forEach(t=>{ byCategory[t.category]=(byCategory[t.category]||0)+t.amount; });

  const openModal = (type) => { setModalType(type); setForm({desc:"",amount:"",category:type==="ingreso"?INCOME_CATS[0]:EXPENSE_CATS[0],date:today()}); setShowModal(true); };
  const saveTx = () => { if(!form.desc||!form.amount) return; setTransactions(prev=>[{id:uid(),type:modalType,...form,amount:parseFloat(form.amount),accountId:form.accountId||'AC1'},...prev]); setShowModal(false); };

  return (
    <div className="fadeIn">
      <SectionTitle sub="Control de ingresos y egresos">FINANZAS</SectionTitle>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:24}}>
        <StatCard label="Balance total"     value={fmt(totalIngresos-totalEgresos)} color={(totalIngresos-totalEgresos)>=0?G.green:G.red} />
        <StatCard label="Ingresos del mes"  value={fmt(mesIngresos)}  color={G.green} />
        <StatCard label="Egresos del mes"   value={fmt(mesEgresos)}   color={G.red}   />
        <StatCard label="Resultado del mes" value={fmt(mesIngresos-mesEgresos)} color={(mesIngresos-mesEgresos)>=0?G.green:G.red} />
      </div>
      {Object.keys(byCategory).length>0 && (
        <Card style={{marginBottom:20}}>
          <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Distribución de egresos</div>
          {Object.entries(byCategory).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>{
            const pct=Math.round((val/totalEgresos)*100);
            return (
              <div key={cat} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,fontSize:12}}>
                  <span style={{textTransform:"capitalize"}}>{cat}</span>
                  <span style={{color:G.muted}}>{fmt(val)} <span style={{color:G.red}}>({pct}%)</span></span>
                </div>
                <div style={{height:4,background:G.border,borderRadius:2}}>
                  <div style={{width:`${pct}%`,height:"100%",background:G.red,borderRadius:2,transition:"width 0.5s"}} />
                </div>
              </div>
            );
          })}
        </Card>
      )}
      <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
        <Btn variant="success" onClick={()=>openModal("ingreso")}>+ Ingreso</Btn>
        <Btn variant="danger"  onClick={()=>openModal("egreso")}>+ Egreso</Btn>
        <div style={{display:"flex",gap:6,marginLeft:"auto"}}>
          {["todos","ingreso","egreso"].map(f=>(
            <button key={f} onClick={()=>setFilter(f)} style={{padding:"5px 14px",borderRadius:20,fontSize:12,border:"1px solid",borderColor:filter===f?G.accent:G.border,background:filter===f?G.accent+"22":"transparent",color:filter===f?G.accent:G.muted,fontFamily:G.font,cursor:"pointer"}}>{f}</button>
          ))}
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {sorted.length===0 && <div style={{color:G.muted,textAlign:"center",padding:40}}>No hay movimientos</div>}
        {sorted.map(tx=>(
          <Card key={tx.id} style={{display:"flex",flexWrap:"wrap",gap:10,alignItems:"center"}}>
            <div style={{width:36,height:36,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:tx.type==="ingreso"?G.green+"22":G.red+"22",color:tx.type==="ingreso"?G.green:G.red,fontSize:18,flexShrink:0}}>
              {tx.type==="ingreso"?"↑":"↓"}
            </div>
            <div style={{flex:1,minWidth:140}}><div style={{fontWeight:500}}>{tx.desc}</div><div style={{color:G.muted,fontSize:12}}>{tx.date}</div></div>
            <Badge label={tx.category} type={tx.type==="ingreso"?"green":"red"} />
            {tx.accountId && (() => { const a=(accounts||[]).find(x=>x.id===tx.accountId); return a?<span style={{fontSize:11,color:G.muted}}>{a.icon} {a.name}</span>:null; })()}
            <div style={{fontFamily:G.display,fontSize:22,letterSpacing:1,minWidth:120,textAlign:"right",color:tx.type==="ingreso"?G.green:G.red}}>
              {tx.type==="ingreso"?"+":"-"}{fmt(tx.amount)}
            </div>
          </Card>
        ))}
      </div>
      {showModal && (
        <Modal title={`NUEVO ${modalType.toUpperCase()}`} onClose={()=>setShowModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <Input label="Descripción" value={form.desc}   onChange={e=>setForm({...form,desc:e.target.value})}   placeholder={modalType==="ingreso"?"Ej: Ventas del día":"Ej: Compra de carne"} />
            <Input label="Monto ($)"   type="number" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})} placeholder="0.00" />
            <Select label="Categoría"  value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>
              {(modalType==="ingreso"?INCOME_CATS:EXPENSE_CATS).map(c=><option key={c}>{c}</option>)}
            </Select>
            <Input label="Fecha" type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} />
            <Select label="Cuenta" value={form.accountId||"AC1"} onChange={e=>setForm({...form,accountId:e.target.value})}>
              {(accounts||[]).map(a=><option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}
            </Select>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setShowModal(false)}>Cancelar</Btn>
              <Btn variant={modalType==="ingreso"?"success":"danger"} onClick={saveTx}>Guardar</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}
