// MODULE: REPORTES / DASHBOARD
// ══════════════════════════════════════════════════════════════════════════════
function ReportesModule({ extraTx, orders=[], clients=[], accounts=[] }) {
  const [period, setPeriod] = useState("semana"); // hoy | semana | mes

  const now   = new Date();
  const dateFrom = period==="hoy"
    ? today()
    : period==="semana"
      ? new Date(now - 7*86400000).toISOString().slice(0,10)
      : new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);

  const txInPeriod = extraTx.filter(t=>t.date>=dateFrom);
  const ingresos   = txInPeriod.filter(t=>t.type==="ingreso").reduce((s,t)=>s+t.amount,0);
  const egresos    = txInPeriod.filter(t=>t.type==="egreso" ).reduce((s,t)=>s+t.amount,0);
  const resultado  = ingresos - egresos;

  // Ingresos by day (last 7 days)
  const last7 = Array.from({length:7},(_,i)=>{
    const d = new Date(now - (6-i)*86400000);
    const ds = d.toISOString().slice(0,10);
    const label = d.toLocaleDateString("es-AR",{weekday:"short",day:"numeric"});
    const ing = extraTx.filter(t=>t.date===ds&&t.type==="ingreso").reduce((s,t)=>s+t.amount,0);
    const eg  = extraTx.filter(t=>t.date===ds&&t.type==="egreso" ).reduce((s,t)=>s+t.amount,0);
    return {ds,label,ing,eg};
  });
  const maxVal = Math.max(...last7.map(d=>Math.max(d.ing,d.eg)),1);

  // By account
  const byAccount = accounts.map(ac=>({
    ...ac,
    ing: txInPeriod.filter(t=>t.type==="ingreso"&&t.accountId===ac.id).reduce((s,t)=>s+t.amount,0),
    eg:  txInPeriod.filter(t=>t.type==="egreso" &&t.accountId===ac.id).reduce((s,t)=>s+t.amount,0),
  })).filter(ac=>ac.ing>0||ac.eg>0);

  return (
    <div className="fadeIn">
      <SectionTitle sub="Resumen de tu negocio">REPORTES</SectionTitle>

      {/* Period selector */}
      <div style={{display:"flex",gap:6,marginBottom:24}}>
        {["hoy","semana","mes"].map(p=>(
          <button key={p} onClick={()=>setPeriod(p)} style={{padding:"6px 18px",borderRadius:20,fontSize:12,fontFamily:G.font,cursor:"pointer",border:"1px solid",borderColor:period===p?G.accent:G.border,background:period===p?G.accent+"22":"transparent",color:period===p?G.accent:G.muted,textTransform:"capitalize"}}>{p==="semana"?"Última semana":p==="mes"?"Este mes":"Hoy"}</button>
        ))}
      </div>

      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:24}}>
        <StatCard label="Ingresos" value={fmt(ingresos)} color={G.green} />
        <StatCard label="Egresos"  value={fmt(egresos)}  color={G.red}   />
        <StatCard label="Resultado" value={fmt(resultado)} color={resultado>=0?G.green:G.red} />
        <StatCard label="Deudas clientes" value={fmt(clients.reduce((s,c)=>s+( c.debt||0),0))} color={G.yellow} />
      </div>

      {/* Bar chart — últimos 7 días */}
      <Card style={{marginBottom:20}}>
        <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:16}}>Últimos 7 días</div>
        <div style={{display:"flex",gap:8,alignItems:"flex-end",height:140}}>
          {last7.map((d,i)=>(
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{width:"100%",display:"flex",gap:2,alignItems:"flex-end",height:110}}>
                <div style={{flex:1,background:G.green+"88",borderRadius:"3px 3px 0 0",height:`${(d.ing/maxVal)*100}%`,minHeight:d.ing>0?4:0,transition:"height 0.4s"}} title={fmt(d.ing)} />
                <div style={{flex:1,background:G.red+"88",borderRadius:"3px 3px 0 0",height:`${(d.eg/maxVal)*100}%`,minHeight:d.eg>0?4:0,transition:"height 0.4s"}} title={fmt(d.eg)} />
              </div>
              <div style={{color:G.muted,fontSize:10,textAlign:"center"}}>{d.label}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:16,marginTop:8,justifyContent:"center"}}>
          <span style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:G.muted}}><span style={{width:10,height:10,borderRadius:2,background:G.green+"88",display:"inline-block"}}/>Ingresos</span>
          <span style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:G.muted}}><span style={{width:10,height:10,borderRadius:2,background:G.red+"88",display:"inline-block"}}/>Egresos</span>
        </div>
      </Card>

      {/* Por cuenta */}
      {byAccount.length>0 && (
        <Card style={{marginBottom:20}}>
          <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Por cuenta</div>
          {byAccount.map(ac=>(
            <div key={ac.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${G.border}`}}>
              <span style={{fontSize:13}}>{ac.icon} {ac.name}</span>
              <div style={{display:"flex",gap:20}}>
                <span style={{color:G.green,fontSize:13}}>+{fmt(ac.ing)}</span>
                <span style={{color:G.red,fontSize:13}}>-{fmt(ac.eg)}</span>
                <span style={{fontWeight:500,color:(ac.ing-ac.eg)>=0?G.green:G.red,fontSize:13}}>{fmt(ac.ing-ac.eg)}</span>
              </div>
            </div>
          ))}
        </Card>
      )}
    </div>
  );
}

// MODULE: HISTORIAL DE PRECIOS
// ══════════════════════════════════════════════════════════════════════════════
function HistorialPreciosModule({ articles, stockMoves }) {
  const [selectedArt, setSelectedArt] = useState(null);

  // For each article get all "entrada" moves with unitCost
  const getHistory = (artId) => [...stockMoves]
    .filter(m=>m.articleId===artId && m.type==="entrada" && m.unitCost!=null && m.unitCost>0)
    .sort((a,b)=>a.date.localeCompare(b.date));

  const rawArticles = articles.filter(a=>!a.isPrepArticle);

  return (
    <div className="fadeIn">
      <SectionTitle sub="Evolución del costo de tus ingredientes">HISTORIAL DE PRECIOS</SectionTitle>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:10,marginBottom:24}}>
        {rawArticles.map(art=>{
          const hist = getHistory(art.id);
          const last = hist[hist.length-1];
          const prev = hist[hist.length-2];
          const change = last&&prev ? ((last.unitCost-prev.unitCost)/prev.unitCost)*100 : null;
          return (
            <Card key={art.id} style={{cursor:"pointer",borderColor:selectedArt?.id===art.id?G.accent:G.border}} onClick={()=>setSelectedArt(selectedArt?.id===art.id?null:art)}>
              <div style={{fontWeight:500,marginBottom:4}}>{art.name}</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
                <div>
                  <div style={{color:G.muted,fontSize:11}}>Último precio</div>
                  <div style={{fontFamily:G.display,fontSize:22,color:G.accent}}>{last?fmt(last.unitCost):"—"}</div>
                  <div style={{color:G.muted,fontSize:11}}>por {art.unit}</div>
                </div>
                {change!==null && (
                  <div style={{textAlign:"right"}}>
                    <div style={{color:G.muted,fontSize:11}}>vs anterior</div>
                    <div style={{fontFamily:G.display,fontSize:18,color:change>0?G.red:G.green}}>
                      {change>0?"+":""}{Math.round(change)}%
                    </div>
                  </div>
                )}
              </div>
            </Card>
          );
        })}
      </div>

      {selectedArt && (() => {
        const hist = getHistory(selectedArt.id);
        const maxP = Math.max(...hist.map(h=>h.unitCost),1);
        return (
          <Card>
            <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:16}}>{selectedArt.name} — Evolución de precios</div>
            {hist.length===0 && <div style={{color:G.muted,textAlign:"center",padding:20}}>Sin historial de compras registrado</div>}
            {hist.length>0 && (
              <>
                <div style={{display:"flex",gap:4,alignItems:"flex-end",height:100,marginBottom:8}}>
                  {hist.map((h,i)=>(
                    <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                      <div style={{width:"100%",background:G.accent+"88",borderRadius:"3px 3px 0 0",height:`${(h.unitCost/maxP)*100}%`,minHeight:4,transition:"height 0.4s"}} title={fmt(h.unitCost)} />
                      <div style={{color:G.muted,fontSize:9,textAlign:"center"}}>{h.date.slice(5)}</div>
                    </div>
                  ))}
                </div>
                {hist.map((h,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${G.border}`,fontSize:13}}>
                    <span style={{color:G.muted}}>{h.date}{h.invoiceId&&` · Fact.${h.invoiceId}`}</span>
                    <div style={{display:"flex",gap:12,alignItems:"center"}}>
                      {i>0 && (() => {
                        const pct = ((h.unitCost-hist[i-1].unitCost)/hist[i-1].unitCost)*100;
                        return <span style={{fontSize:11,color:pct>0?G.red:G.green}}>{pct>0?"+":""}{Math.round(pct)}%</span>;
                      })()}
                      <span style={{fontWeight:500,color:G.accent}}>{fmt(h.unitCost)}/{selectedArt.unit}</span>
                    </div>
                  </div>
                ))}
              </>
            )}
          </Card>
        );
      })()}
    </div>
  );
}

// MODULE: DESCUENTOS & PROMOCIONES  
// (Se integra en el flujo de pedidos — este módulo gestiona las reglas)
// ══════════════════════════════════════════════════════════════════════════════
const DISCOUNT_TYPES = ["porcentaje","monto fijo","2x1","envío gratis"];

function DescuentosModule({ discounts, setDiscounts }) {
  const [showModal, setShowModal] = useState(false);
  const [form, setForm]           = useState({name:"",type:"porcentaje",value:"",active:true,desc:""});

  const save = () => {
    if (!form.name) return;
    setDiscounts(prev=>[...prev,{id:"D"+uid(),...form,value:parseFloat(form.value||0)}]);
    setForm({name:"",type:"porcentaje",value:"",active:true,desc:""}); setShowModal(false);
  };
  const toggle = (id) => setDiscounts(prev=>prev.map(d=>d.id===id?{...d,active:!d.active}:d));
  const remove = (id) => setDiscounts(prev=>prev.filter(d=>d.id!==id));

  const activeCount = discounts.filter(d=>d.active).length;

  return (
    <div className="fadeIn">
      <SectionTitle sub="Promociones y descuentos aplicables a pedidos">DESCUENTOS</SectionTitle>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:24}}>
        <StatCard label="Total"    value={discounts.length} color={G.accent} />
        <StatCard label="Activos"  value={activeCount}      color={G.green}  />
        <StatCard label="Inactivos" value={discounts.length-activeCount} color={G.muted} />
      </div>
      <div style={{marginBottom:16}}><Btn onClick={()=>setShowModal(true)}>+ Nueva Promoción</Btn></div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {discounts.length===0 && <div style={{color:G.muted,textAlign:"center",padding:40}}>No hay descuentos configurados</div>}
        {discounts.map(d=>(
          <Card key={d.id} style={{display:"flex",flexWrap:"wrap",gap:12,alignItems:"center",opacity:d.active?1:0.5}}>
            <div style={{flex:1,minWidth:160}}>
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}>
                <span style={{fontWeight:500,fontSize:15}}>{d.name}</span>
                <Badge label={d.type} type={d.active?"green":"red"} />
              </div>
              {d.desc && <div style={{color:G.muted,fontSize:12}}>{d.desc}</div>}
            </div>
            <div style={{fontFamily:G.display,fontSize:24,color:G.accent}}>
              {d.type==="porcentaje"?`${d.value}%`:d.type==="monto fijo"?fmt(d.value):d.type}
            </div>
            <div style={{display:"flex",gap:6}}>
              <Btn variant={d.active?"warn":"success"} style={{fontSize:11,padding:"4px 10px"}} onClick={()=>toggle(d.id)}>{d.active?"Pausar":"Activar"}</Btn>
              <Btn variant="danger" style={{fontSize:11,padding:"4px 8px"}} onClick={()=>remove(d.id)}>✕</Btn>
            </div>
          </Card>
        ))}
      </div>
      {showModal && (
        <Modal title="NUEVA PROMOCIÓN" onClose={()=>setShowModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <Input label="Nombre" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Ej: Descuento martes, 2x1 burger..." />
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <Select label="Tipo" value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
                {DISCOUNT_TYPES.map(t=><option key={t}>{t}</option>)}
              </Select>
              {(form.type==="porcentaje"||form.type==="monto fijo") && (
                <Input label={form.type==="porcentaje"?"Porcentaje (%)":"Monto ($)"} type="number" value={form.value} onChange={e=>setForm({...form,value:e.target.value})} placeholder="0" />
              )}
            </div>
            <Input label="Descripción (opcional)" value={form.desc} onChange={e=>setForm({...form,desc:e.target.value})} placeholder="Ej: Válido solo los martes" />
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setShowModal(false)}>Cancelar</Btn>
              <Btn onClick={save}>Crear Promoción</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}


// ══════════════════════════════════════════════════════════════════════════════
// MODULE: FÓRMULAS DE SEMIELABORADOS
// ══════════════════════════════════════════════════════════════════════════════
function FormulasModule({ preps, setPreps, articles, setArticles, stockMoves, setStockMoves, invoices }) {

  const [selected, setSelected]           = useState(null);   // prep being viewed
  const [showProdModal, setShowProdModal]  = useState(false);  // orden de producción
  const [prodPrep, setProdPrep]            = useState(null);
  const [prodLotes, setProdLotes]          = useState("1");
  const [prodNota, setProdNota]            = useState("");
  const [showEditMin, setShowEditMin]      = useState(false);  // edit minStock
  const [editMinPrep, setEditMinPrep]      = useState(null);
  const [editMinVal, setEditMinVal]        = useState("");
  const [prodHistory, setProdHistory]      = useState([]);     // orden de producción history

  // ── Cost helpers ────────────────────────────────────────────────────────
  const artCost = (artId) => {
    const moves = [...stockMoves]
      .filter(m=>m.articleId===artId && m.type==="entrada" && m.unitCost!=null && m.unitCost>0)
      .sort((a,b)=>b.date.localeCompare(a.date));
    return moves.length>0 ? moves[0].unitCost : 0;
  };

  const prepIngCost = (ing) => artCost(ing.id) * ing.qty;

  const prepTotalCost = (prep) =>
    prep.ingredients.filter(i=>i.type==="article").reduce((s,i)=>s+prepIngCost(i),0);

  const prepUnitCost = (prep) =>
    prep.yield>0 ? prepTotalCost(prep)/prep.yield : 0;

  // ── Stock helpers ───────────────────────────────────────────────────────
  const stockMap   = computeStock(stockMoves);
  const prepStock  = (prep) => prep.articleId ? (stockMap[prep.articleId]||0) : 0;
  const isLow      = (prep) => {
    const minS = prep.minStock||0;
    return minS>0 && prepStock(prep) <= minS;
  };

  // ── How many batches can I make with current MP stock ──────────────────
  const maxLotes = (prep) => {
    if (!prep.ingredients || prep.ingredients.length===0) return 0;
    const limits = prep.ingredients
      .filter(i=>i.type==="article" && i.qty>0)
      .map(i=>{
        const avail = stockMap[i.id]||0;
        return Math.floor(avail/i.qty);
      });
    return limits.length>0 ? Math.min(...limits) : 0;
  };

  // ── Production order ───────────────────────────────────────────────────
  const openProd = (prep) => { setProdPrep(prep); setProdLotes("1"); setProdNota(""); setShowProdModal(true); };

  const confirmProd = () => {
    if (!prodPrep || !prodLotes) return;
    const lotes = parseFloat(prodLotes);
    const moves = [];

    // Consume MP
    prodPrep.ingredients.filter(i=>i.type==="article").forEach(ing=>{
      moves.push({
        id:uid(), articleId:ing.id, type:"salida",
        qty:ing.qty*lotes, unitCost:null, invoiceId:null, date:today(),
        note:`Orden prod. — ${prodPrep.name} x${lotes} lote${lotes!==1?"s":""}`,
      });
    });

    // Add semielaborado to stock
    let paId = prodPrep.articleId;
    if (!paId) {
      paId = "PA"+uid();
      setArticles(prev=>[...prev,{id:paId,name:`[PREP] ${prodPrep.name}`,unit:prodPrep.unit,minStock:0,supplierId:"",isPrepArticle:true,category:"semielaborado"}]);
      setPreps(prev=>prev.map(p=>p.id===prodPrep.id?{...p,articleId:paId}:p));
    }
    const unitCost = prepUnitCost(prodPrep);
    moves.push({
      id:uid(), articleId:paId, type:"entrada",
      qty:prodPrep.yield*lotes, unitCost, invoiceId:null, date:today(),
      note:`Orden prod. — ${prodPrep.name} x${lotes} lote${lotes!==1?"s":""}${prodNota?" | "+prodNota:""}`,
    });

    setStockMoves(prev=>[...prev,...moves]);
    setProdHistory(prev=>[{
      id:uid(), prepId:prodPrep.id, prepName:prodPrep.name,
      lotes, qty:prodPrep.yield*lotes, unit:prodPrep.unit,
      unitCost, totalCost:prepTotalCost(prodPrep)*lotes,
      date:today(), nota:prodNota,
    },...prev]);
    setShowProdModal(false);
  };

  // ── Edit minStock ──────────────────────────────────────────────────────
  const openEditMin = (prep) => { setEditMinPrep(prep); setEditMinVal(String(prep.minStock||0)); setShowEditMin(true); };
  const saveEditMin = () => {
    setPreps(prev=>prev.map(p=>p.id===editMinPrep.id?{...p,minStock:parseFloat(editMinVal||0)}:p));
    // also update the prep article minStock
    if (editMinPrep.articleId) {
      setArticles(prev=>prev.map(a=>a.id===editMinPrep.articleId?{...a,minStock:parseFloat(editMinVal||0)}:a));
    }
    setShowEditMin(false);
  };

  const alertCount = preps.filter(isLow).length;

  return (
    <div className="fadeIn">
      <SectionTitle sub="Fórmulas de producción de semielaborados">FÓRMULAS</SectionTitle>

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:24}}>
        <StatCard label="Semielaborados"   value={preps.length}   color={G.accent} />
        <StatCard label="Alertas stock"    value={alertCount}     color={alertCount>0?G.red:G.green} sub={alertCount>0?"Stock bajo":"Todo OK"} />
        <StatCard label="Órdenes hoy"      value={prodHistory.filter(h=>h.date===today()).length} color={G.yellow} />
        <StatCard label="Costo total hoy"  value={fmt(prodHistory.filter(h=>h.date===today()).reduce((s,h)=>s+h.totalCost,0))} color={G.muted} />
      </div>

      {/* Formula cards */}
      <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:32}}>
        {preps.length===0 && <div style={{color:G.muted,textAlign:"center",padding:40}}>No hay semielaborados cargados. Creálos desde Productos → Productos Intermedios.</div>}
        {preps.map(prep=>{
          const stock    = prepStock(prep);
          const low      = isLow(prep);
          const unitCost = prepUnitCost(prep);
          const totCost  = prepTotalCost(prep);
          const maxL     = maxLotes(prep);
          const isOpen   = selected?.id===prep.id;
          const minS     = prep.minStock||0;
          const pct      = minS>0 ? Math.min((stock/minS)*100,100) : 100;

          return (
            <Card key={prep.id} style={{borderColor:low?G.red+"55":G.border}}>
              {/* Header row */}
              <div style={{display:"flex",flexWrap:"wrap",gap:12,alignItems:"center",cursor:"pointer"}} onClick={()=>setSelected(isOpen?null:prep)}>
                {low && <div className="pulse" style={{width:8,height:8,borderRadius:"50%",background:G.red,flexShrink:0}}/>}
                <div style={{flex:1,minWidth:180}}>
                  <div style={{fontWeight:500,fontSize:16}}>{prep.name}</div>
                  <div style={{color:G.muted,fontSize:12}}>Rinde {fmtQty(prep.yield,prep.unit)} por lote · {prep.ingredients.filter(i=>i.type==="article").length} ingredientes</div>
                </div>

                {/* Stock gauge */}
                <div style={{minWidth:160}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                    <span style={{color:G.muted}}>Stock</span>
                    <span style={{color:low?G.red:G.green,fontWeight:500}}>{fmtQty(stock,prep.unit)}</span>
                  </div>
                  <div style={{height:6,background:G.border,borderRadius:3}}>
                    <div style={{width:`${pct}%`,height:"100%",borderRadius:3,background:low?G.red:G.green,transition:"width 0.4s"}}/>
                  </div>
                  <div style={{color:G.muted,fontSize:11,marginTop:2}}>
                    Mínimo: {fmtQty(minS,prep.unit)}
                    <button onClick={e=>{e.stopPropagation();openEditMin(prep);}} style={{marginLeft:6,fontSize:10,color:G.accent,background:"transparent",cursor:"pointer",fontFamily:G.font}}>editar</button>
                  </div>
                </div>

                {/* Costs */}
                <div style={{textAlign:"center",minWidth:100}}>
                  <div style={{color:G.muted,fontSize:11}}>Costo / {prep.unit}</div>
                  <div style={{fontFamily:G.display,fontSize:22,color:G.yellow}}>{fmt(unitCost)}</div>
                </div>

                {/* Max lotes */}
                <div style={{textAlign:"center",minWidth:90}}>
                  <div style={{color:G.muted,fontSize:11}}>Lotes posibles</div>
                  <div style={{fontFamily:G.display,fontSize:22,color:maxL>0?G.green:G.red}}>{maxL}</div>
                </div>

                {/* Actions */}
                <div style={{display:"flex",gap:6}} onClick={e=>e.stopPropagation()}>
                  <Btn variant="success" style={{fontSize:12,padding:"6px 12px"}} onClick={()=>openProd(prep)}>⚙ Producir</Btn>
                  <Btn variant="ghost"   style={{fontSize:11,padding:"6px 10px"}} onClick={()=>setSelected(isOpen?null:prep)}>{isOpen?"▲":"▼"}</Btn>
                </div>
              </div>

              {/* Expanded formula detail */}
              {isOpen && (
                <div style={{marginTop:16,paddingTop:16,borderTop:`1px solid ${G.border}`}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>

                    {/* Ingredients table */}
                    <div style={{background:G.surface,borderRadius:8,padding:14}}>
                      <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Fórmula (1 lote)</div>
                      {prep.ingredients.filter(i=>i.type==="article").map((ing,idx)=>{
                        const art  = articles.find(a=>a.id===ing.id);
                        const cost = prepIngCost(ing);
                        const pctC = totCost>0 ? Math.round((cost/totCost)*100) : 0;
                        const avail = stockMap[ing.id]||0;
                        const ok   = avail >= ing.qty;
                        return (
                          <div key={idx} style={{padding:"6px 0",borderBottom:`1px solid ${G.border}`}}>
                            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                              <span style={{fontSize:13}}>{art?.name||ing.id}</span>
                              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                                <span style={{color:G.muted,fontSize:11}}>{pctC}%</span>
                                <span style={{color:G.red,fontSize:13,fontWeight:500}}>{fmt(cost)}</span>
                              </div>
                            </div>
                            <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
                              <span style={{color:G.muted}}>Usa: {fmtQty(ing.qty,art?.unit)}</span>
                              <span style={{color:ok?G.green:G.red}}>Stock: {fmtQty(avail,art?.unit)} {!ok&&"⚠"}</span>
                            </div>
                            <div style={{height:3,background:G.border,borderRadius:2,marginTop:4}}>
                              <div style={{width:`${pctC}%`,height:"100%",borderRadius:2,background:G.accent}}/>
                            </div>
                          </div>
                        );
                      })}
                      <div style={{display:"flex",justifyContent:"space-between",paddingTop:10}}>
                        <div><div style={{color:G.muted,fontSize:11}}>Costo total lote</div><div style={{fontFamily:G.display,fontSize:18,color:G.red}}>{fmt(totCost)}</div></div>
                        <div style={{textAlign:"right"}}><div style={{color:G.muted,fontSize:11}}>Costo por {prep.unit}</div><div style={{fontFamily:G.display,fontSize:18,color:G.yellow}}>{fmt(unitCost)}</div></div>
                      </div>
                    </div>

                    {/* Production capacity & history */}
                    <div style={{display:"flex",flexDirection:"column",gap:10}}>
                      {/* Capacity */}
                      <div style={{background:G.surface,borderRadius:8,padding:14}}>
                        <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Capacidad de producción</div>
                        {prep.ingredients.filter(i=>i.type==="article").map((ing,idx)=>{
                          const art   = articles.find(a=>a.id===ing.id);
                          const avail = stockMap[ing.id]||0;
                          const lotes = ing.qty>0 ? Math.floor(avail/ing.qty) : 999;
                          const isBottleneck = lotes===maxL && maxL<999;
                          return (
                            <div key={idx} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:`1px solid ${G.border}`,fontSize:12}}>
                              <span style={{color:isBottleneck?G.red:G.muted}}>{art?.name} {isBottleneck&&"🔴"}</span>
                              <span style={{color:isBottleneck?G.red:G.text}}>{lotes===999?"∞":lotes} lote{lotes!==1?"s":""}</span>
                            </div>
                          );
                        })}
                        <div style={{paddingTop:8,display:"flex",justifyContent:"space-between"}}>
                          <span style={{color:G.muted,fontSize:12}}>Podés hacer</span>
                          <span style={{fontFamily:G.display,fontSize:22,color:maxL>0?G.green:G.red}}>{maxL} lote{maxL!==1?"s":""} → {fmtQty(maxL*prep.yield,prep.unit)}</span>
                        </div>
                      </div>

                      {/* Recent production history */}
                      <div style={{background:G.surface,borderRadius:8,padding:14,flex:1}}>
                        <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Últimas órdenes</div>
                        {prodHistory.filter(h=>h.prepId===prep.id).slice(0,4).length===0 &&
                          <div style={{color:G.muted,fontSize:12}}>Sin órdenes aún</div>}
                        {prodHistory.filter(h=>h.prepId===prep.id).slice(0,4).map(h=>(
                          <div key={h.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${G.border}`,fontSize:12}}>
                            <div>
                              <span style={{color:G.text}}>{h.lotes} lote{h.lotes!==1?"s":""} → {fmtQty(h.qty,h.unit)}</span>
                              {h.nota&&<div style={{color:G.muted,fontSize:11}}>{h.nota}</div>}
                            </div>
                            <div style={{textAlign:"right"}}>
                              <div style={{color:G.muted}}>{h.date}</div>
                              <div style={{color:G.red,fontSize:11}}>{fmt(h.totalCost)}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </Card>
          );
        })}
      </div>

      {/* ── ORDEN DE PRODUCCIÓN MODAL ── */}
      {showProdModal && prodPrep && (
        <Modal title={`ORDEN DE PRODUCCIÓN`} onClose={()=>setShowProdModal(false)} wide>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:G.surface,borderRadius:8,padding:14}}>
              <div style={{fontFamily:G.display,fontSize:22,color:G.accent,marginBottom:4}}>{prodPrep.name}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
                <div><div style={{color:G.muted,fontSize:11}}>Stock actual</div><div style={{fontFamily:G.display,fontSize:18,color:G.green}}>{fmtQty(prepStock(prodPrep),prodPrep.unit)}</div></div>
                <div><div style={{color:G.muted,fontSize:11}}>Mínimo</div><div style={{fontFamily:G.display,fontSize:18,color:G.muted}}>{fmtQty(prodPrep.minStock||0,prodPrep.unit)}</div></div>
                <div><div style={{color:G.muted,fontSize:11}}>Máx lotes posibles</div><div style={{fontFamily:G.display,fontSize:18,color:maxLotes(prodPrep)>0?G.green:G.red}}>{maxLotes(prodPrep)}</div></div>
              </div>
            </div>

            <Input label="Cantidad de lotes a producir" type="number" min="0.1" step="0.1"
              value={prodLotes} onChange={e=>setProdLotes(e.target.value)} placeholder="1" />

            {/* Preview */}
            {prodLotes && parseFloat(prodLotes)>0 && (
              <div style={{background:G.surface,borderRadius:8,padding:14}}>
                <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Resumen de la orden</div>

                {/* MP to consume */}
                <div style={{marginBottom:10}}>
                  <div style={{color:G.muted,fontSize:11,marginBottom:6}}>Materia prima a consumir</div>
                  {prodPrep.ingredients.filter(i=>i.type==="article").map((ing,idx)=>{
                    const art    = articles.find(a=>a.id===ing.id);
                    const needed = ing.qty*parseFloat(prodLotes);
                    const avail  = stockMap[ing.id]||0;
                    const ok     = avail>=needed;
                    return (
                      <div key={idx} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:`1px solid ${G.border}`,fontSize:13}}>
                        <span>{art?.name}</span>
                        <div style={{display:"flex",gap:12}}>
                          <span style={{color:G.muted,fontSize:11}}>Stock: {fmtQty(avail,art?.unit)}</span>
                          <span style={{color:ok?G.red:G.red,fontWeight:500}}>−{fmtQty(needed,art?.unit)}</span>
                          {!ok&&<span style={{color:G.red,fontSize:11}}>⚠ insuficiente</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Output */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:8,borderTop:`1px solid ${G.border}`}}>
                  <div>
                    <div style={{color:G.muted,fontSize:11}}>Se produce</div>
                    <div style={{fontFamily:G.display,fontSize:22,color:G.green}}>+{fmtQty(prodPrep.yield*parseFloat(prodLotes),prodPrep.unit)} {prodPrep.name}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{color:G.muted,fontSize:11}}>Costo total orden</div>
                    <div style={{fontFamily:G.display,fontSize:22,color:G.red}}>{fmt(prepTotalCost(prodPrep)*parseFloat(prodLotes))}</div>
                  </div>
                </div>
              </div>
            )}

            <Input label="Nota (opcional)" value={prodNota} onChange={e=>setProdNota(e.target.value)} placeholder="Ej: Tanda matutina, lote especial..." />

            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setShowProdModal(false)}>Cancelar</Btn>
              <Btn variant="success" onClick={confirmProd}>⚙ Confirmar Orden</Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* ── EDIT MIN STOCK MODAL ── */}
      {showEditMin && editMinPrep && (
        <Modal title={`STOCK MÍNIMO — ${editMinPrep.name}`} onClose={()=>setShowEditMin(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:G.surface,padding:12,borderRadius:8,display:"flex",justifyContent:"space-between"}}>
              <span style={{color:G.muted}}>Stock actual</span>
              <span style={{color:G.accent,fontFamily:G.display,fontSize:20}}>{fmtQty(prepStock(editMinPrep),editMinPrep.unit)}</span>
            </div>
            <Input label={`Mínimo (${editMinPrep.unit})`} type="number" value={editMinVal}
              onChange={e=>setEditMinVal(e.target.value)} placeholder="0" />
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setShowEditMin(false)}>Cancelar</Btn>
              <Btn variant="warn" onClick={saveEditMin}>Guardar mínimo</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// LOGIN SCREEN
// ══════════════════════════════════════════════════════════════════════════════
function LoginScreen({ users, roles, onLogin }) {
  const [pin, setPin]         = useState("");
  const [error, setError]     = useState("");
  const [shake, setShake]     = useState(false);

  const tryLogin = (p) => {
    const user = users.find(u=>u.pin===p && u.active);
    if (user) { onLogin(user); }
    else {
      setShake(true); setError("PIN incorrecto");
      setTimeout(()=>{ setShake(false); setError(""); setPin(""); },1000);
    }
  };

  const addDigit = (d) => {
    const next = pin + d;
    if (next.length <= 6) {
      setPin(next);
      if (next.length >= 4) tryLogin(next);
    }
  };

  const PAD = ["1","2","3","4","5","6","7","8","9","","0","⌫"];

  return (
    <div style={{minHeight:"100vh",background:G.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{fontFamily:G.display,fontSize:48,letterSpacing:4,color:G.accent,marginBottom:4}}>BURGER</div>
      <div style={{fontFamily:G.display,fontSize:16,letterSpacing:6,color:G.muted,marginBottom:48}}>ADMIN</div>

      <div className="fadeIn" style={{background:G.surface,border:`1px solid ${G.border}`,borderRadius:16,padding:32,width:"100%",maxWidth:320,textAlign:"center"}}>
        <div style={{color:G.muted,fontSize:13,marginBottom:24,letterSpacing:1}}>INGRESÁ TU PIN</div>

        {/* PIN dots */}
        <div style={{display:"flex",justifyContent:"center",gap:12,marginBottom:32,
          animation:shake?"shake 0.3s ease":"none"}}>
          {[0,1,2,3,4,5].map(i=>(
            <div key={i} style={{width:14,height:14,borderRadius:"50%",border:`2px solid ${G.border}`,
              background:i<pin.length?G.accent:"transparent",
              transition:"background 0.1s",
              ...(i<4?{}:{opacity:0.4}),
            }}/>
          ))}
        </div>

        {error && <div style={{color:G.red,fontSize:12,marginBottom:12}}>{error}</div>}

        {/* Numpad */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {PAD.map((d,i)=>(
            <button key={i} onClick={()=>{ if(d==="⌫") setPin(p=>p.slice(0,-1)); else if(d) addDigit(d); }}
              style={{
                height:56, borderRadius:10, fontSize:d==="⌫"?20:22,
                fontFamily:G.font, fontWeight:500, cursor:d?"pointer":"default",
                background:d?G.card:"transparent",
                border:`1px solid ${d?G.border:"transparent"}`,
                color:d==="⌫"?G.muted:G.text,
                transition:"all 0.1s",
              }}
              onMouseEnter={e=>{ if(d) e.currentTarget.style.background=G.border; }}
              onMouseLeave={e=>{ if(d) e.currentTarget.style.background=G.card; }}
            >{d}</button>
          ))}
        </div>
      </div>

      <div style={{marginTop:24,color:G.muted,fontSize:11}}>
        {users.filter(u=>u.active).map(u=>{
          const r=roles.find(x=>x.id===u.roleId);
          return <span key={u.id} style={{marginRight:12}}>{u.name} <span style={{color:r?.color}}>[{r?.name}]</span></span>;
        })}
      </div>
      <style>{`@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}`}</style>
    </div>
  );
}

// DASHBOARD MODULE
// ══════════════════════════════════════════════════════════════════════════════
function DashboardModule({ extraTx, articles, stockMoves, preps, debts, clients, accounts, setActive }) {
  const stockMap    = computeStock(stockMoves);
  const thisMonth   = new Date().toISOString().slice(0,7);

  // Ventas del día
  const ventasHoy   = extraTx.filter(t=>t.type==="ingreso"&&t.date===today()&&t.category==="ventas").reduce((s,t)=>s+t.amount,0);
  // Caja efectivo
  const cajaEfectivo = extraTx.filter(t=>t.accountId==="AC1").reduce((s,t)=>t.type==="ingreso"?s+t.amount:s-t.amount,0);
  // Alertas stock MP
  const alertasMP   = articles.filter(a=>!a.isPrepArticle&&a.minStock>0&&(stockMap[a.id]||0)<=a.minStock);
  // Alertas semielaborados
  const alertasSemi = preps.filter(p=>{ const minS=p.minStock||0; return minS>0&&(p.articleId?(stockMap[p.articleId]||0):0)<=minS; });
  // Deudas clientes
  const deudaTotal  = debts.filter(d=>!d.paid).reduce((s,d)=>s+d.amount,0);
  // Resultado del mes
  const mesIng = extraTx.filter(t=>t.type==="ingreso"&&t.date.startsWith(thisMonth)).reduce((s,t)=>s+t.amount,0);
  const mesEgr = extraTx.filter(t=>t.type==="egreso" &&t.date.startsWith(thisMonth)).reduce((s,t)=>s+t.amount,0);

  // Last 7 days chart
  const now  = new Date();
  const last7 = Array.from({length:7},(_,i)=>{
    const d  = new Date(now-(6-i)*86400000);
    const ds = d.toISOString().slice(0,10);
    const label = d.toLocaleDateString("es-AR",{weekday:"short",day:"numeric"});
    const ing = extraTx.filter(t=>t.date===ds&&t.type==="ingreso").reduce((s,t)=>s+t.amount,0);
    return {ds,label,ing};
  });
  const maxIng = Math.max(...last7.map(d=>d.ing),1);

  const QuickBtn = ({icon,label,to,color=G.accent}) => (
    <button onClick={()=>setActive(to)} style={{background:G.card,border:`1px solid ${G.border}`,borderRadius:10,padding:"14px 12px",cursor:"pointer",fontFamily:G.font,textAlign:"center",transition:"border-color 0.15s"}}
      onMouseEnter={e=>e.currentTarget.style.borderColor=color}
      onMouseLeave={e=>e.currentTarget.style.borderColor=G.border}>
      <div style={{fontSize:24,marginBottom:6}}>{icon}</div>
      <div style={{fontSize:12,color:G.muted}}>{label}</div>
    </button>
  );

  return (
    <div className="fadeIn">
      <div style={{marginBottom:24}}>
        <h2 style={{fontFamily:G.display,fontSize:36,letterSpacing:2,lineHeight:1}}>BUENOS DÍAS 👋</h2>
        <p style={{color:G.muted,fontSize:13,marginTop:4}}>{new Date().toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</p>
      </div>

      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:24}}>
        <StatCard label="Ventas hoy"       value={fmt(ventasHoy)}   color={G.green}  />
        <StatCard label="Caja efectivo"    value={fmt(cajaEfectivo)} color={cajaEfectivo>=0?G.accent:G.red} />
        <StatCard label="Resultado del mes" value={fmt(mesIng-mesEgr)} color={(mesIng-mesEgr)>=0?G.green:G.red} />
        <StatCard label="Deudas clientes"  value={fmt(deudaTotal)}  color={deudaTotal>0?G.yellow:G.green} />
      </div>

      {/* Mini bar chart */}
      <Card style={{marginBottom:20}}>
        <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:14}}>Ventas — últimos 7 días</div>
        <div style={{display:"flex",gap:6,alignItems:"flex-end",height:80}}>
          {last7.map((d,i)=>(
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <div style={{width:"100%",borderRadius:"3px 3px 0 0",background:d.ds===today()?G.accent:G.green+"66",height:`${(d.ing/maxIng)*100}%`,minHeight:d.ing>0?3:0,transition:"height 0.4s"}} title={fmt(d.ing)}/>
              <div style={{color:G.muted,fontSize:9,textAlign:"center"}}>{d.label}</div>
            </div>
          ))}
        </div>
      </Card>

      {/* Alerts */}
      {(alertasMP.length>0||alertasSemi.length>0) && (
        <Card style={{marginBottom:20,borderColor:G.red+"44"}}>
          <div style={{color:G.red,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>⚠ Alertas de stock</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {alertasMP.map(a=>(
              <div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13}}>
                <span>🥩 {a.name}</span>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{color:G.red,fontWeight:500}}>{fmtQty(stockMap[a.id]||0,a.unit)}</span>
                  <span style={{color:G.muted,fontSize:11}}>mín {fmtQty(a.minStock,a.unit)}</span>
                </div>
              </div>
            ))}
            {alertasSemi.map(p=>{
              const stk = p.articleId?(stockMap[p.articleId]||0):0;
              return (
                <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13}}>
                  <span>🧪 {p.name}</span>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{color:G.red,fontWeight:500}}>{fmtQty(stk,p.unit)}</span>
                    <span style={{color:G.muted,fontSize:11}}>mín {fmtQty(p.minStock||0,p.unit)}</span>
                  </div>
                </div>
              );
            })}
          </div>
          <Btn variant="danger" style={{fontSize:12,marginTop:12}} onClick={()=>setActive("stock")}>Ver stock →</Btn>
        </Card>
      )}

      {/* Quick actions */}
      <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Acceso rápido</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:10}}>
        <QuickBtn icon="🍔" label="Nuevo pedido"  to="pedidos"  color={G.accent} />
        <QuickBtn icon="📦" label="Ver stock"     to="stock"    color={G.yellow} />
        <QuickBtn icon="⚗️" label="Producir"      to="formulas" color={G.green}  />
        <QuickBtn icon="👥" label="Clientes"      to="clientes" color={G.accent} />
        <QuickBtn icon="📊" label="Reportes"      to="reportes" color={G.green}  />
        <QuickBtn icon="🏧" label="Caja"          to="caja"     color={G.yellow} />
      </div>
    </div>
  );
}

// USUARIOS & ROLES MODULE
// ══════════════════════════════════════════════════════════════════════════════
function UsuariosModule({ users, setUsers, roles, setRoles, currentUser }) {
  const [tab, setTab]                   = useState("usuarios");
  const [showUserModal, setShowUserModal] = useState(false);
  const [showRoleModal, setShowRoleModal] = useState(false);
  const [editUser, setEditUser]           = useState(null);
  const [editRole, setEditRole]           = useState(null);
  const [userForm, setUserForm]           = useState({name:"",pin:"",roleId:"R2",active:true});
  const [roleForm, setRoleForm]           = useState({name:"",color:"#4caf7d",permissions:[]});

  const openNewUser  = () => { setEditUser(null); setUserForm({name:"",pin:"",roleId:roles[0]?.id||"",active:true}); setShowUserModal(true); };
  const openEditUser = (u) => { setEditUser(u); setUserForm({name:u.name,pin:u.pin,roleId:u.roleId,active:u.active}); setShowUserModal(true); };
  const saveUser = () => {
    if (!userForm.name||!userForm.pin) return;
    if (editUser) setUsers(prev=>prev.map(u=>u.id===editUser.id?{...u,...userForm}:u));
    else          setUsers(prev=>[...prev,{id:"U"+uid(),...userForm}]);
    setShowUserModal(false);
  };
  const toggleUser = (id) => setUsers(prev=>prev.map(u=>u.id===id?{...u,active:!u.active}:u));

  const openNewRole  = () => { setEditRole(null); setRoleForm({name:"",color:"#4a90e2",permissions:[]}); setShowRoleModal(true); };
  const openEditRole = (r) => { setEditRole(r); setRoleForm({name:r.name,color:r.color,permissions:[...r.permissions]}); setShowRoleModal(true); };
  const saveRole = () => {
    if (!roleForm.name) return;
    if (editRole) setRoles(prev=>prev.map(r=>r.id===editRole.id?{...r,...roleForm}:r));
    else          setRoles(prev=>[...prev,{id:"R"+uid(),...roleForm}]);
    setShowRoleModal(false);
  };
  const togglePerm = (permId) => setRoleForm(prev=>({...prev,
    permissions: prev.permissions.includes(permId)
      ? prev.permissions.filter(p=>p!==permId)
      : [...prev.permissions, permId]
  }));

  // Group permissions by group
  const permGroups = ALL_PERMISSIONS.reduce((acc,p)=>{ if(!acc[p.group])acc[p.group]=[]; acc[p.group].push(p); return acc; },{});

  const ROLE_COLORS = ["#e8854a","#4caf7d","#4a90e2","#f0c040","#e05252","#9b59b6"];

  return (
    <div className="fadeIn">
      <SectionTitle sub="Gestión de usuarios y roles">USUARIOS & ROLES</SectionTitle>

      <div style={{display:"flex",gap:4,marginBottom:20,borderBottom:`1px solid ${G.border}`}}>
        {["usuarios","roles"].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{padding:"8px 18px",fontFamily:G.font,fontSize:13,cursor:"pointer",background:"transparent",border:"none",borderBottom:`2px solid ${tab===t?G.accent:"transparent"}`,color:tab===t?G.accent:G.muted,transition:"all 0.15s",textTransform:"capitalize"}}>{t}</button>
        ))}
      </div>

      {/* USUARIOS TAB */}
      {tab==="usuarios" && (
        <div>
          <div style={{marginBottom:16}}><Btn onClick={openNewUser}>+ Nuevo Usuario</Btn></div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {users.map(u=>{
              const role = roles.find(r=>r.id===u.roleId);
              const isMe = u.id===currentUser?.id;
              return (
                <Card key={u.id} style={{display:"flex",flexWrap:"wrap",gap:12,alignItems:"center",opacity:u.active?1:0.5}}>
                  <div style={{width:40,height:40,borderRadius:"50%",background:(role?.color||G.accent)+"33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>👤</div>
                  <div style={{flex:1,minWidth:140}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                      <span style={{fontWeight:500,fontSize:15}}>{u.name}</span>
                      {isMe && <Badge label="TÚ" type="accent" />}
                      {!u.active && <Badge label="INACTIVO" type="red" />}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:11,padding:"2px 8px",borderRadius:4,background:(role?.color||G.accent)+"22",color:role?.color||G.accent,border:`1px solid ${(role?.color||G.accent)}44`}}>{role?.name||"Sin rol"}</span>
                      <span style={{color:G.muted,fontSize:11}}>PIN: {"•".repeat(u.pin.length)}</span>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <Btn variant="ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>openEditUser(u)}>Editar</Btn>
                    {!isMe && <Btn variant={u.active?"danger":"success"} style={{fontSize:11,padding:"4px 10px"}} onClick={()=>toggleUser(u.id)}>{u.active?"Desactivar":"Activar"}</Btn>}
                  </div>
                </Card>
              );
            })}
          </div>
        </div>
      )}

      {/* ROLES TAB */}
      {tab==="roles" && (
        <div>
          <div style={{marginBottom:16}}><Btn onClick={openNewRole}>+ Nuevo Rol</Btn></div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {roles.map(role=>(
              <Card key={role.id} style={{borderLeft:`4px solid ${role.color}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div>
                    <div style={{fontWeight:500,fontSize:16,color:role.color}}>{role.name}</div>
                    <div style={{color:G.muted,fontSize:12}}>{role.permissions.length} permisos · {users.filter(u=>u.roleId===role.id).length} usuarios</div>
                  </div>
                  <Btn variant="ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>openEditRole(role)}>Editar permisos</Btn>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {Object.entries(permGroups).map(([group,perms])=>{
                    const active = perms.filter(p=>role.permissions.includes(p.id)).length;
                    if (active===0) return null;
                    return (
                      <span key={group} style={{fontSize:11,padding:"2px 8px",borderRadius:4,background:role.color+"22",color:role.color,border:`1px solid ${role.color}44`}}>
                        {group}: {active}/{perms.length}
                      </span>
                    );
                  })}
                </div>
              </Card>
            ))}
          </div>
        </div>
      )}

      {/* USER MODAL */}
      {showUserModal && (
        <Modal title={editUser?"EDITAR USUARIO":"NUEVO USUARIO"} onClose={()=>setShowUserModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <Input label="Nombre" value={userForm.name} onChange={e=>setUserForm({...userForm,name:e.target.value})} placeholder="Ej: Juan" />
            <Input label="PIN (4-6 dígitos)" type="password" value={userForm.pin} onChange={e=>setUserForm({...userForm,pin:e.target.value.replace(/\D/g,"").slice(0,6)})} placeholder="••••" />
            <Select label="Rol" value={userForm.roleId} onChange={e=>setUserForm({...userForm,roleId:e.target.value})}>
              {roles.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
            </Select>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setShowUserModal(false)}>Cancelar</Btn>
              <Btn onClick={saveUser}>{editUser?"Guardar":"Crear Usuario"}</Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* ROLE MODAL */}
      {showRoleModal && (
        <Modal title={editRole?"EDITAR ROL":"NUEVO ROL"} onClose={()=>setShowRoleModal(false)} wide>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:12,alignItems:"end"}}>
              <Input label="Nombre del rol" value={roleForm.name} onChange={e=>setRoleForm({...roleForm,name:e.target.value})} placeholder="Ej: Caja, Cocina..." />
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                <label style={{color:G.muted,fontSize:11,letterSpacing:1,textTransform:"uppercase"}}>Color</label>
                <div style={{display:"flex",gap:6}}>
                  {ROLE_COLORS.map(c=>(
                    <button key={c} onClick={()=>setRoleForm({...roleForm,color:c})}
                      style={{width:28,height:28,borderRadius:"50%",background:c,border:`3px solid ${roleForm.color===c?"#fff":"transparent"}`,cursor:"pointer"}}/>
                  ))}
                </div>
              </div>
            </div>

            {/* Permissions by group */}
            <div style={{background:G.surface,borderRadius:8,padding:14,maxHeight:380,overflowY:"auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
                <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1}}>Permisos</div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setRoleForm(prev=>({...prev,permissions:ALL_PERM_IDS}))} style={{fontSize:11,color:G.accent,background:"transparent",cursor:"pointer",fontFamily:G.font}}>Todos</button>
                  <button onClick={()=>setRoleForm(prev=>({...prev,permissions:[]}))} style={{fontSize:11,color:G.muted,background:"transparent",cursor:"pointer",fontFamily:G.font}}>Ninguno</button>
                </div>
              </div>
              {Object.entries(permGroups).map(([group,perms])=>(
                <div key={group} style={{marginBottom:14}}>
                  <div style={{color:G.accent,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>{group}</div>
                  {perms.map(p=>{
                    const active = roleForm.permissions.includes(p.id);
                    return (
                      <div key={p.id} onClick={()=>togglePerm(p.id)}
                        style={{display:"flex",alignItems:"center",gap:10,padding:"7px 8px",borderRadius:6,cursor:"pointer",marginBottom:3,background:active?G.accent+"11":"transparent"}}>
                        <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${active?G.accent:G.border}`,background:active?G.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          {active && <span style={{color:"#fff",fontSize:12,lineHeight:1}}>✓</span>}
                        </div>
                        <span style={{fontSize:13,color:active?G.text:G.muted}}>{p.label}</span>
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>

            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setShowRoleModal(false)}>Cancelar</Btn>
              <Btn onClick={saveRole}>{editRole?"Guardar cambios":"Crear Rol"}</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// MODULE: EXPORTAR REPORTES
// ══════════════════════════════════════════════════════════════════════════════
function ExportarModule({ extraTx, articles, stockMoves, preps, debts, clients, accounts, invoices, products }) {
  const [reportType, setReportType] = useState("resumen");
  const [period, setPeriod]         = useState("mes");
  const [preview, setPreview]       = useState(false);

  const stockMap  = computeStock(stockMoves);
  const now       = new Date();
  const thisMonth = now.toISOString().slice(0,7);

  const dateFrom = period==="hoy"   ? today()
    : period==="semana" ? new Date(now-7*86400000).toISOString().slice(0,10)
    : period==="mes"    ? `${thisMonth}-01`
    : "2000-01-01"; // todo

  const txPeriod  = extraTx.filter(t=>t.date>=dateFrom);
  const ingresos  = txPeriod.filter(t=>t.type==="ingreso").reduce((s,t)=>s+t.amount,0);
  const egresos   = txPeriod.filter(t=>t.type==="egreso" ).reduce((s,t)=>s+t.amount,0);

  // ── CSV export helper ────────────────────────────────────────────────────
  const downloadCSV = (rows, filename) => {
    const csv = rows.map(r=>r.map(c=>`"${String(c??'').replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a"); a.href=url; a.download=filename; a.click();
    URL.revokeObjectURL(url);
  };

  // ── Report data builders ─────────────────────────────────────────────────
  const buildVentasCSV = () => {
    const rows = [["Fecha","Descripción","Categoría","Cuenta","Monto"]];
    txPeriod.filter(t=>t.type==="ingreso").forEach(t=>{
      const acc = accounts.find(a=>a.id===t.accountId);
      rows.push([t.date, t.desc||"", t.category||"", acc?.name||"", t.amount]);
    });
    rows.push([]);
    rows.push(["TOTAL","","","",ingresos]);
    downloadCSV(rows, `ventas_${period}_${today()}.csv`);
  };

  const buildIngEgrCSV = () => {
    const rows = [["Fecha","Tipo","Descripción","Categoría","Cuenta","Monto"]];
    [...txPeriod].sort((a,b)=>b.date.localeCompare(a.date)).forEach(t=>{
      const acc = accounts.find(a=>a.id===t.accountId);
      rows.push([t.date, t.type==="ingreso"?"Ingreso":"Egreso", t.desc||"", t.category||"", acc?.name||"", t.type==="ingreso"?t.amount:-t.amount]);
    });
    rows.push([]);
    rows.push(["RESULTADO","","","","",ingresos-egresos]);
    downloadCSV(rows, `ingresos_egresos_${period}_${today()}.csv`);
  };

  const buildStockCSV = () => {
    const rows = [["Artículo","Categoría","Unidad","Stock Actual","Stock Mínimo","Alerta","Último Costo Unit.","Valor Stock"]];
    articles.filter(a=>!a.isPrepArticle).forEach(a=>{
      const stk  = stockMap[a.id]||0;
      const low  = a.minStock>0 && stk<=a.minStock;
      const lastCost = [...stockMoves].filter(m=>m.articleId===a.id&&m.type==="entrada"&&m.unitCost>0).sort((x,y)=>y.date.localeCompare(x.date))[0]?.unitCost||0;
      const cat  = STOCK_CATS.find(c=>c.id===a.category);
      rows.push([a.name, cat?.label||"", a.unit, stk, a.minStock, low?"⚠ BAJO":"OK", lastCost, stk*lastCost]);
    });
    downloadCSV(rows, `stock_${today()}.csv`);
  };

  const buildStockValorizadoCSV = () => {
    const rows = [["Artículo","Categoría","Unidad","Stock","Último Precio Compra","Valor Total"]];
    let total = 0;
    articles.filter(a=>!a.isPrepArticle).forEach(a=>{
      const stk      = stockMap[a.id]||0;
      const lastCost = [...stockMoves].filter(m=>m.articleId===a.id&&m.type==="entrada"&&m.unitCost>0).sort((x,y)=>y.date.localeCompare(x.date))[0]?.unitCost||0;
      const val      = stk*lastCost;
      total += val;
      const cat = STOCK_CATS.find(c=>c.id===a.category);
      rows.push([a.name, cat?.label||"", a.unit, stk, lastCost, val]);
    });
    rows.push([]);
    rows.push(["TOTAL VALORIZADO","","","","",total]);
    downloadCSV(rows, `stock_valorizado_${today()}.csv`);
  };

  const buildDeudasCSV = () => {
    const rows = [["Cliente","Teléfono","Pedido #","Fecha","Monto"]];
    debts.filter(d=>!d.paid).forEach(d=>{
      const cli = clients.find(c=>c.id===d.clientId);
      rows.push([d.client, cli?.phone||"", d.orderId, d.date, d.amount]);
    });
    const total = debts.filter(d=>!d.paid).reduce((s,d)=>s+d.amount,0);
    rows.push([]);
    rows.push(["TOTAL DEUDA","","","",total]);
    downloadCSV(rows, `deudas_clientes_${today()}.csv`);
  };

  const buildResumenCSV = () => {
    const alertasMP   = articles.filter(a=>!a.isPrepArticle&&a.minStock>0&&(stockMap[a.id]||0)<=a.minStock);
    const deudaTotal  = debts.filter(d=>!d.paid).reduce((s,d)=>s+d.amount,0);
    const stockValor  = articles.filter(a=>!a.isPrepArticle).reduce((s,a)=>{
      const stk = stockMap[a.id]||0;
      const lc  = [...stockMoves].filter(m=>m.articleId===a.id&&m.type==="entrada"&&m.unitCost>0).sort((x,y)=>y.date.localeCompare(x.date))[0]?.unitCost||0;
      return s+stk*lc;
    },0);
    const rows = [
      ["RESUMEN EJECUTIVO",`Período: ${period}`,`Generado: ${today()}`],
      [],
      ["FINANCIERO","",""],
      ["Ingresos del período","",ingresos],
      ["Egresos del período","",egresos],
      ["Resultado","",ingresos-egresos],
      [],
      ["STOCK","",""],
      ["Valor total del stock","",stockValor],
      ["Artículos con stock bajo","",alertasMP.length],
      [],
      ["CLIENTES","",""],
      ["Deuda total pendiente","",deudaTotal],
      ["Clientes con deuda","",clients.filter(c=>debts.some(d=>d.clientId===c.id&&!d.paid)).length],
    ];
    downloadCSV(rows, `resumen_ejecutivo_${today()}.csv`);
  };

  // ── PDF print helper ─────────────────────────────────────────────────────
  const printReport = (htmlContent, title) => {
    const win = window.open("","_blank","width=800,height=600");
    win.document.write(`<!DOCTYPE html><html><head>
      <meta charset="utf-8">
      <title>${title}</title>
      <style>
        body { font-family: Arial, sans-serif; font-size: 12px; color: #222; padding: 24px; }
        h1   { font-size: 22px; border-bottom: 2px solid #e8854a; padding-bottom: 8px; color: #e8854a; }
        h2   { font-size: 15px; margin-top: 20px; color: #444; }
        table{ width:100%; border-collapse:collapse; margin-top:10px; font-size:11px; }
        th   { background:#f5f5f5; border:1px solid #ddd; padding:5px 8px; text-align:left; font-weight:bold; }
        td   { border:1px solid #eee; padding:5px 8px; }
        tr:nth-child(even) td { background:#fafafa; }
        .total { font-weight:bold; background:#fff3e0 !important; }
        .alert { color:#e05252; font-weight:bold; }
        .ok    { color:#4caf7d; }
        .meta  { color:#888; font-size:11px; margin-bottom:16px; }
        @media print { button { display:none !important; } }
      </style>
    </head><body>
      <button onclick="window.print()" style="margin-bottom:16px;padding:8px 20px;background:#e8854a;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;">🖨 Imprimir / Guardar PDF</button>
      ${htmlContent}
    </body></html>`);
    win.document.close();
  };

  const buildVentasPDF = () => {
    const rows = txPeriod.filter(t=>t.type==="ingreso");
    const acc  = (id) => accounts.find(a=>a.id===id)?.name||"";
    printReport(`
      <h1>📊 Reporte de Ventas</h1>
      <div class="meta">Período: ${period} · Generado: ${today()}</div>
      <table>
        <tr><th>Fecha</th><th>Descripción</th><th>Categoría</th><th>Cuenta</th><th>Monto</th></tr>
        ${rows.map(t=>`<tr><td>${t.date}</td><td>${t.desc||""}</td><td>${t.category||""}</td><td>${acc(t.accountId)}</td><td>$${t.amount.toLocaleString("es-AR")}</td></tr>`).join("")}
        <tr class="total"><td colspan="4">TOTAL</td><td>$${ingresos.toLocaleString("es-AR")}</td></tr>
      </table>
    `, "Ventas");
  };

  const buildIngEgrPDF = () => {
    const rows = [...txPeriod].sort((a,b)=>b.date.localeCompare(a.date));
    printReport(`
      <h1>💰 Ingresos y Egresos</h1>
      <div class="meta">Período: ${period} · Generado: ${today()}</div>
      <table>
        <tr><th>Fecha</th><th>Tipo</th><th>Descripción</th><th>Categoría</th><th>Cuenta</th><th>Monto</th></tr>
        ${rows.map(t=>`<tr><td>${t.date}</td><td style="color:${t.type==="ingreso"?"#4caf7d":"#e05252"}">${t.type==="ingreso"?"↑ Ingreso":"↓ Egreso"}</td><td>${t.desc||""}</td><td>${t.category||""}</td><td>${accounts.find(a=>a.id===t.accountId)?.name||""}</td><td style="color:${t.type==="ingreso"?"#4caf7d":"#e05252"}">$${t.amount.toLocaleString("es-AR")}</td></tr>`).join("")}
        <tr class="total"><td colspan="5">RESULTADO</td><td style="color:${(ingresos-egresos)>=0?"#4caf7d":"#e05252"}">$${(ingresos-egresos).toLocaleString("es-AR")}</td></tr>
      </table>
    `, "Ingresos y Egresos");
  };

  const buildStockPDF = () => {
    const rows = articles.filter(a=>!a.isPrepArticle);
    printReport(`
      <h1>📦 Estado de Stock</h1>
      <div class="meta">Generado: ${today()}</div>
      <table>
        <tr><th>Artículo</th><th>Categoría</th><th>Unidad</th><th>Stock</th><th>Mínimo</th><th>Estado</th><th>Último costo</th><th>Valor</th></tr>
        ${rows.map(a=>{
          const stk=stockMap[a.id]||0;
          const low=a.minStock>0&&stk<=a.minStock;
          const lc=[...stockMoves].filter(m=>m.articleId===a.id&&m.type==="entrada"&&m.unitCost>0).sort((x,y)=>y.date.localeCompare(x.date))[0]?.unitCost||0;
          const cat=STOCK_CATS.find(c=>c.id===a.category);
          return `<tr><td>${a.name}</td><td>${cat?.label||""}</td><td>${a.unit}</td><td>${stk}</td><td>${a.minStock}</td><td class="${low?"alert":"ok"}">${low?"⚠ BAJO":"✓ OK"}</td><td>$${lc.toLocaleString("es-AR")}</td><td>$${(stk*lc).toLocaleString("es-AR")}</td></tr>`;
        }).join("")}
      </table>
    `, "Stock");
  };

  const buildDeudasPDF = () => {
    const pending = debts.filter(d=>!d.paid);
    const total   = pending.reduce((s,d)=>s+d.amount,0);
    printReport(`
      <h1>👥 Deudas de Clientes</h1>
      <div class="meta">Generado: ${today()}</div>
      <table>
        <tr><th>Cliente</th><th>Pedido #</th><th>Fecha</th><th>Monto</th></tr>
        ${pending.map(d=>`<tr><td>${d.client}</td><td>${d.orderId}</td><td>${d.date}</td><td>$${d.amount.toLocaleString("es-AR")}</td></tr>`).join("")}
        <tr class="total"><td colspan="3">TOTAL DEUDA</td><td>$${total.toLocaleString("es-AR")}</td></tr>
      </table>
    `, "Deudas");
  };

  const buildResumenPDF = () => {
    const alertasMP  = articles.filter(a=>!a.isPrepArticle&&a.minStock>0&&(stockMap[a.id]||0)<=a.minStock);
    const deudaTotal = debts.filter(d=>!d.paid).reduce((s,d)=>s+d.amount,0);
    const stockValor = articles.filter(a=>!a.isPrepArticle).reduce((s,a)=>{
      const stk=stockMap[a.id]||0;
      const lc=[...stockMoves].filter(m=>m.articleId===a.id&&m.type==="entrada"&&m.unitCost>0).sort((x,y)=>y.date.localeCompare(x.date))[0]?.unitCost||0;
      return s+stk*lc;
    },0);
    printReport(`
      <h1>🏠 Resumen Ejecutivo</h1>
      <div class="meta">Período: ${period} · Generado: ${today()}</div>
      <h2>💰 Financiero</h2>
      <table>
        <tr><th>Concepto</th><th>Monto</th></tr>
        <tr><td>Ingresos del período</td><td style="color:#4caf7d">$${ingresos.toLocaleString("es-AR")}</td></tr>
        <tr><td>Egresos del período</td><td style="color:#e05252">$${egresos.toLocaleString("es-AR")}</td></tr>
        <tr class="total"><td>Resultado</td><td style="color:${(ingresos-egresos)>=0?"#4caf7d":"#e05252"}">$${(ingresos-egresos).toLocaleString("es-AR")}</td></tr>
      </table>
      <h2>📦 Stock</h2>
      <table>
        <tr><th>Concepto</th><th>Valor</th></tr>
        <tr><td>Stock valorizado total</td><td>$${stockValor.toLocaleString("es-AR")}</td></tr>
        <tr><td>Artículos con stock bajo</td><td class="${alertasMP.length>0?"alert":"ok"}">${alertasMP.length}</td></tr>
        ${alertasMP.map(a=>`<tr><td style="padding-left:20px">↳ ${a.name}</td><td class="alert">${stockMap[a.id]||0} ${a.unit} (mín ${a.minStock})</td></tr>`).join("")}
      </table>
      <h2>👥 Clientes</h2>
      <table>
        <tr><th>Concepto</th><th>Valor</th></tr>
        <tr><td>Deuda total pendiente</td><td style="color:#e05252">$${deudaTotal.toLocaleString("es-AR")}</td></tr>
        <tr><td>Clientes con deuda</td><td>${clients.filter(c=>debts.some(d=>d.clientId===c.id&&!d.paid)).length}</td></tr>
      </table>
    `, "Resumen Ejecutivo");
  };

  // ── Report configs ───────────────────────────────────────────────────────
  const REPORTS = [
    { id:"resumen",    label:"Resumen Ejecutivo",      icon:"🏠", hasPeriod:true,  onPDF:buildResumenPDF,  onCSV:buildResumenCSV  },
    { id:"ventas",     label:"Ventas del período",     icon:"📊", hasPeriod:true,  onPDF:buildVentasPDF,   onCSV:buildVentasCSV   },
    { id:"ingegr",     label:"Ingresos y Egresos",     icon:"💰", hasPeriod:true,  onPDF:buildIngEgrPDF,   onCSV:buildIngEgrCSV   },
    { id:"stock",      label:"Estado de Stock",        icon:"📦", hasPeriod:false, onPDF:buildStockPDF,    onCSV:buildStockCSV    },
    { id:"stockval",   label:"Stock Valorizado",       icon:"💎", hasPeriod:false, onPDF:buildStockPDF,    onCSV:buildStockValorizadoCSV },
    { id:"deudas",     label:"Deudas de Clientes",     icon:"👥", hasPeriod:false, onPDF:buildDeudasPDF,   onCSV:buildDeudasCSV   },
  ];

  const selected = REPORTS.find(r=>r.id===reportType);

  return (
    <div className="fadeIn">
      <SectionTitle sub="Generá y exportá reportes en PDF o Excel">EXPORTAR REPORTES</SectionTitle>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10,marginBottom:28}}>
        {REPORTS.map(r=>(
          <button key={r.id} onClick={()=>setReportType(r.id)} style={{
            background:reportType===r.id?G.accent+"22":G.card,
            border:`1px solid ${reportType===r.id?G.accent:G.border}`,
            borderRadius:10, padding:"16px 14px", cursor:"pointer", fontFamily:G.font, textAlign:"left",
            transition:"all 0.15s",
          }}>
            <div style={{fontSize:24,marginBottom:6}}>{r.icon}</div>
            <div style={{fontSize:13,color:reportType===r.id?G.accent:G.text,fontWeight:500}}>{r.label}</div>
          </button>
        ))}
      </div>

      {selected && (
        <Card>
          <div style={{fontFamily:G.display,fontSize:24,letterSpacing:1,marginBottom:16}}>{selected.icon} {selected.label.toUpperCase()}</div>

          {selected.hasPeriod && (
            <div style={{marginBottom:20}}>
              <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Período</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {[["hoy","Hoy"],["semana","Última semana"],["mes","Este mes"],["todo","Todo"]].map(([val,label])=>(
                  <button key={val} onClick={()=>setPeriod(val)} style={{padding:"6px 16px",borderRadius:20,fontSize:12,fontFamily:G.font,cursor:"pointer",border:"1px solid",borderColor:period===val?G.accent:G.border,background:period===val?G.accent+"22":"transparent",color:period===val?G.accent:G.muted}}>{label}</button>
                ))}
              </div>
            </div>
          )}

          {/* Summary preview */}
          <div style={{background:G.surface,borderRadius:8,padding:14,marginBottom:20}}>
            <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Vista previa</div>
            {(reportType==="resumen"||reportType==="ventas"||reportType==="ingegr") && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
                <div><div style={{color:G.muted,fontSize:11}}>Ingresos</div><div style={{fontFamily:G.display,fontSize:20,color:G.green}}>${ingresos.toLocaleString("es-AR")}</div></div>
                <div><div style={{color:G.muted,fontSize:11}}>Egresos</div><div style={{fontFamily:G.display,fontSize:20,color:G.red}}>${egresos.toLocaleString("es-AR")}</div></div>
                <div><div style={{color:G.muted,fontSize:11}}>Resultado</div><div style={{fontFamily:G.display,fontSize:20,color:(ingresos-egresos)>=0?G.green:G.red}}>${(ingresos-egresos).toLocaleString("es-AR")}</div></div>
              </div>
            )}
            {reportType==="stock"&&<div style={{color:G.text,fontSize:13}}>{articles.filter(a=>!a.isPrepArticle).length} artículos · {articles.filter(a=>!a.isPrepArticle&&a.minStock>0&&(stockMap[a.id]||0)<=a.minStock).length} con stock bajo</div>}
            {reportType==="stockval"&&(()=>{
              const val=articles.filter(a=>!a.isPrepArticle).reduce((s,a)=>{const stk=stockMap[a.id]||0;const lc=[...stockMoves].filter(m=>m.articleId===a.id&&m.type==="entrada"&&m.unitCost>0).sort((x,y)=>y.date.localeCompare(x.date))[0]?.unitCost||0;return s+stk*lc;},0);
              return <div><div style={{color:G.muted,fontSize:11}}>Valor total del stock</div><div style={{fontFamily:G.display,fontSize:24,color:G.accent}}>${val.toLocaleString("es-AR")}</div></div>;
            })()}
            {reportType==="deudas"&&<div><div style={{color:G.muted,fontSize:11}}>Deuda total pendiente</div><div style={{fontFamily:G.display,fontSize:24,color:G.red}}>${debts.filter(d=>!d.paid).reduce((s,d)=>s+d.amount,0).toLocaleString("es-AR")}</div></div>}
          </div>

          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <Btn onClick={selected.onPDF} style={{display:"flex",alignItems:"center",gap:8}}>
              🖨 Exportar PDF
            </Btn>
            <Btn variant="success" onClick={selected.onCSV} style={{display:"flex",alignItems:"center",gap:8}}>
              📊 Exportar CSV / Excel
            </Btn>
          </div>
          <div style={{color:G.muted,fontSize:11,marginTop:10}}>
            El PDF se abre en una nueva pestaña — usá "Guardar como PDF" o compartilo por WhatsApp desde ahí.
            El CSV se puede abrir con Excel, Google Sheets o cualquier planilla.
          </div>
        </Card>
      )}
    </div>
  );
}
