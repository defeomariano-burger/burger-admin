// MODULE: EMPLEADOS
// ══════════════════════════════════════════════════════════════════════════════
const INITIAL_EMPLEADOS = [];

function EmpleadosModule({ accounts, addExpense }) {
  const [empleados, setEmpleados]     = useState(INITIAL_EMPLEADOS);
  const [turnos, setTurnos]           = useState([]);   // {id, empleadoId, date, entrada, salida, horasTrabajadas, manual}
  const [adelantos, setAdelantos]     = useState([]);   // {id, empleadoId, date, amount, note, repaid}
  const [pagos, setPagos]             = useState([]);   // {id, empleadoId, date, amount, period, accountId, extra}
  const [tab, setTab]                 = useState("resumen");
  const [selectedEmp, setSelectedEmp] = useState(null);

  // Modals
  const [showEmpModal,    setShowEmpModal]    = useState(false);
  const [showTurnoModal,  setShowTurnoModal]  = useState(false);
  const [showFichajeModal,setShowFichajeModal]= useState(false);
  const [showAdelantoModal,setShowAdelantoModal] = useState(false);
  const [showPagoModal,   setShowPagoModal]   = useState(false);
  const [editEmp, setEditEmp]                 = useState(null);

  // Forms
  const emptyEmpForm = {name:"",position:"",baseSalary:"",active:true};
  const [empForm, setEmpForm]       = useState(emptyEmpForm);
  const [turnoForm, setTurnoForm]   = useState({empleadoId:"",date:today(),entrada:"",salida:""});
  const [fichajeEmp, setFichajeEmp] = useState(null); // empleado doing fichaje
  const [adelantoForm, setAdelantoForm] = useState({empleadoId:"",amount:"",note:"",date:today()});
  const [pagoForm, setPagoForm]     = useState({empleadoId:"",amount:"",accountId:"AC1",period:"",extra:"0",date:today()});

  const thisMonth = new Date().toISOString().slice(0,7);

  // ── Helpers ──────────────────────────────────────────────────────────────
  const calcHoras = (entrada, salida) => {
    if (!entrada||!salida) return 0;
    const [eh,em]=entrada.split(":").map(Number);
    const [sh,sm]=salida.split(":").map(Number);
    const mins = (sh*60+sm)-(eh*60+em);
    return Math.max(0, mins/60);
  };

  const empTurnos     = (eid) => turnos.filter(t=>t.empleadoId===eid);
  const empTurnosMes  = (eid) => turnos.filter(t=>t.empleadoId===eid&&t.date.startsWith(thisMonth));
  const horasMes      = (eid) => empTurnosMes(eid).reduce((s,t)=>s+(t.horasTrabajadas||0),0);
  const diasMes       = (eid) => empTurnosMes(eid).length;
  const empAdelantos  = (eid) => adelantos.filter(a=>a.empleadoId===eid&&!a.repaid);
  const totalAdelantos= (eid) => empAdelantos(eid).reduce((s,a)=>s+a.amount,0);
  const empPagos      = (eid) => pagos.filter(p=>p.empleadoId===eid);

  // Turno abierto hoy (entrada sin salida)
  const turnoAbierto  = (eid) => turnos.find(t=>t.empleadoId===eid&&t.date===today()&&t.entrada&&!t.salida);

  // ── Fichaje automático ────────────────────────────────────────────────────
  const ficharEntrada = (emp) => {
    const hora = new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit",hour12:false});
    setTurnos(prev=>[...prev,{id:uid(),empleadoId:emp.id,date:today(),entrada:hora,salida:"",horasTrabajadas:0,manual:false}]);
    setShowFichajeModal(false);
  };
  const ficharSalida = (emp) => {
    const hora = new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit",hour12:false});
    setTurnos(prev=>prev.map(t=>{
      if (t.empleadoId===emp.id&&t.date===today()&&t.entrada&&!t.salida) {
        return {...t,salida:hora,horasTrabajadas:calcHoras(t.entrada,hora)};
      }
      return t;
    }));
    setShowFichajeModal(false);
  };

  // ── Save manual turno ────────────────────────────────────────────────────
  const saveTurno = () => {
    if (!turnoForm.empleadoId||!turnoForm.date||!turnoForm.entrada) return;
    const hs = calcHoras(turnoForm.entrada, turnoForm.salida);
    setTurnos(prev=>[...prev,{id:uid(),...turnoForm,horasTrabajadas:hs,manual:true}]);
    setTurnoForm({empleadoId:"",date:today(),entrada:"",salida:""});
    setShowTurnoModal(false);
  };

  // ── Save empleado ─────────────────────────────────────────────────────────
  const saveEmp = () => {
    if (!empForm.name) return;
    const data = {...empForm,baseSalary:parseFloat(empForm.baseSalary||0)};
    if (editEmp) setEmpleados(prev=>prev.map(e=>e.id===editEmp.id?{...e,...data}:e));
    else         setEmpleados(prev=>[...prev,{id:"E"+uid(),...data}]);
    setShowEmpModal(false);
  };

  // ── Save adelanto ─────────────────────────────────────────────────────────
  const saveAdelanto = () => {
    if (!adelantoForm.empleadoId||!adelantoForm.amount) return;
    const emp = empleados.find(e=>e.id===adelantoForm.empleadoId);
    setAdelantos(prev=>[...prev,{id:uid(),...adelantoForm,amount:parseFloat(adelantoForm.amount),repaid:false}]);
    addExpense({desc:`Adelanto — ${emp?.name}`,amount:parseFloat(adelantoForm.amount),category:"sueldos",date:adelantoForm.date,accountId:"AC1"});
    setAdelantoForm({empleadoId:"",amount:"",note:"",date:today()});
    setShowAdelantoModal(false);
  };

  // ── Save pago de sueldo ──────────────────────────────────────────────────
  const savePago = () => {
    if (!pagoForm.empleadoId||!pagoForm.amount) return;
    const emp = empleados.find(e=>e.id===pagoForm.empleadoId);
    const total = parseFloat(pagoForm.amount)+parseFloat(pagoForm.extra||0);
    setPagos(prev=>[...prev,{id:uid(),...pagoForm,amount:total,date:pagoForm.date}]);
    addExpense({desc:`Sueldo ${pagoForm.period||thisMonth} — ${emp?.name}`,amount:total,category:"sueldos",date:pagoForm.date,accountId:pagoForm.accountId});
    setShowPagoModal(false);
  };

  const openEmpModal = (emp=null) => { setEditEmp(emp); setEmpForm(emp?{name:emp.name,position:emp.position,baseSalary:String(emp.baseSalary),active:emp.active}:emptyEmpForm); setShowEmpModal(true); };

  // ── Horas extra (>8h/día promedio → horas extra) ─────────────────────────
  const horasExtra = (eid) => Math.max(0, horasMes(eid) - diasMes(eid)*8);

  return (
    <div className="fadeIn">
      <SectionTitle sub="Turnos, liquidaciones y adelantos">EMPLEADOS</SectionTitle>

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:24}}>
        <StatCard label="Empleados activos" value={empleados.filter(e=>e.active).length} color={G.accent} />
        <StatCard label="Turnos este mes"   value={turnos.filter(t=>t.date.startsWith(thisMonth)).length} color={G.yellow} />
        <StatCard label="Adelantos pendientes" value={fmt(adelantos.filter(a=>!a.repaid).reduce((s,a)=>s+a.amount,0))} color={adelantos.some(a=>!a.repaid)?G.red:G.green} />
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:20,borderBottom:`1px solid ${G.border}`}}>
        {["resumen","turnos","liquidacion","adelantos"].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{padding:"8px 16px",fontFamily:G.font,fontSize:13,cursor:"pointer",background:"transparent",border:"none",borderBottom:`2px solid ${tab===t?G.accent:"transparent"}`,color:tab===t?G.accent:G.muted,transition:"all 0.15s",textTransform:"capitalize"}}>{t}</button>
        ))}
      </div>

      {/* ── TAB: RESUMEN ── */}
      {tab==="resumen" && (
        <div>
          <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
            <Btn onClick={()=>openEmpModal()}>+ Nuevo Empleado</Btn>
            <Btn variant="success" onClick={()=>setShowFichajeModal(true)}>⏱ Fichar</Btn>
            <Btn variant="ghost"   onClick={()=>setShowTurnoModal(true)}>+ Turno manual</Btn>
            <Btn variant="warn"    onClick={()=>setShowAdelantoModal(true)}>💸 Adelanto</Btn>
            <Btn variant="ghost"   onClick={()=>setShowPagoModal(true)}>💰 Pagar sueldo</Btn>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {empleados.filter(e=>e.active).map(emp=>{
              const abierto = turnoAbierto(emp.id);
              const dias    = diasMes(emp.id);
              const horas   = horasMes(emp.id);
              const extra   = horasExtra(emp.id);
              const adel    = totalAdelantos(emp.id);
              return (
                <Card key={emp.id} style={{display:"flex",flexWrap:"wrap",gap:14,alignItems:"center"}}>
                  <div style={{width:42,height:42,borderRadius:"50%",background:G.accent+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>👷</div>
                  <div style={{flex:1,minWidth:160}}>
                    <div style={{fontWeight:500,fontSize:15,marginBottom:2}}>{emp.name}</div>
                    <div style={{color:G.muted,fontSize:12}}>{emp.position}</div>
                    {abierto && <div style={{color:G.green,fontSize:11,marginTop:2}}>🟢 Trabajando desde las {abierto.entrada}</div>}
                  </div>
                  <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                    <div style={{textAlign:"center"}}>
                      <div style={{color:G.muted,fontSize:11}}>Días este mes</div>
                      <div style={{fontFamily:G.display,fontSize:20,color:G.accent}}>{dias}</div>
                    </div>
                    <div style={{textAlign:"center"}}>
                      <div style={{color:G.muted,fontSize:11}}>Horas</div>
                      <div style={{fontFamily:G.display,fontSize:20,color:G.accent}}>{horas.toFixed(1)}h</div>
                    </div>
                    {extra>0 && <div style={{textAlign:"center"}}>
                      <div style={{color:G.muted,fontSize:11}}>Hs extra</div>
                      <div style={{fontFamily:G.display,fontSize:20,color:G.yellow}}>{extra.toFixed(1)}h</div>
                    </div>}
                    <div style={{textAlign:"center"}}>
                      <div style={{color:G.muted,fontSize:11}}>Sueldo base</div>
                      <div style={{fontFamily:G.display,fontSize:20,color:G.green}}>{fmt(emp.baseSalary)}</div>
                    </div>
                    {adel>0 && <div style={{textAlign:"center"}}>
                      <div style={{color:G.muted,fontSize:11}}>Adelantos</div>
                      <div style={{fontFamily:G.display,fontSize:20,color:G.red}}>{fmt(adel)}</div>
                    </div>}
                  </div>
                  <Btn variant="ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>openEmpModal(emp)}>Editar</Btn>
                </Card>
              );
            })}
            {empleados.filter(e=>e.active).length===0 && <div style={{color:G.muted,textAlign:"center",padding:40}}>No hay empleados activos</div>}
          </div>
        </div>
      )}

      {/* ── TAB: TURNOS ── */}
      {tab==="turnos" && (
        <div>
          <div style={{display:"flex",gap:10,marginBottom:16}}>
            <Btn variant="success" onClick={()=>setShowFichajeModal(true)}>⏱ Fichar entrada/salida</Btn>
            <Btn variant="ghost"   onClick={()=>setShowTurnoModal(true)}>+ Cargar manual</Btn>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {[...turnos].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,40).map(t=>{
              const emp = empleados.find(e=>e.id===t.empleadoId);
              const abierto = !t.salida;
              return (
                <Card key={t.id} style={{display:"flex",flexWrap:"wrap",gap:10,alignItems:"center",padding:"12px 16px",borderColor:abierto?G.green+"44":G.border}}>
                  <div style={{flex:1,minWidth:160}}>
                    <div style={{fontWeight:500,fontSize:13}}>{emp?.name}</div>
                    <div style={{color:G.muted,fontSize:11}}>{t.date} {t.manual&&"· manual"}</div>
                  </div>
                  <div style={{display:"flex",gap:16,alignItems:"center"}}>
                    <div style={{textAlign:"center"}}>
                      <div style={{color:G.muted,fontSize:10}}>Entrada</div>
                      <div style={{color:G.green,fontWeight:500}}>{t.entrada||"—"}</div>
                    </div>
                    <div style={{color:G.muted}}>→</div>
                    <div style={{textAlign:"center"}}>
                      <div style={{color:G.muted,fontSize:10}}>Salida</div>
                      <div style={{color:abierto?G.yellow:G.text,fontWeight:500}}>{t.salida||"En curso"}</div>
                    </div>
                    <div style={{textAlign:"center",minWidth:60}}>
                      <div style={{color:G.muted,fontSize:10}}>Horas</div>
                      <div style={{fontFamily:G.display,fontSize:18,color:G.accent}}>{t.horasTrabajadas?t.horasTrabajadas.toFixed(1)+"h":"—"}</div>
                    </div>
                  </div>
                </Card>
              );
            })}
            {turnos.length===0 && <div style={{color:G.muted,textAlign:"center",padding:40}}>No hay turnos registrados</div>}
          </div>
        </div>
      )}

      {/* ── TAB: LIQUIDACIÓN ── */}
      {tab==="liquidacion" && (
        <div>
          <div style={{color:G.muted,fontSize:12,marginBottom:16}}>Liquidación correspondiente a: <span style={{color:G.accent}}>{thisMonth}</span></div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {empleados.filter(e=>e.active).map(emp=>{
              const dias  = diasMes(emp.id);
              const horas = horasMes(emp.id);
              const extra = horasExtra(emp.id);
              const adel  = totalAdelantos(emp.id);
              const valorHoraExtra = (emp.baseSalary/160)*1.5;
              const montoExtra = extra * valorHoraExtra;
              const total = emp.baseSalary + montoExtra - adel;
              const yaPayado = pagos.some(p=>p.empleadoId===emp.id&&p.period===thisMonth);
              return (
                <Card key={emp.id}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
                    <div>
                      <div style={{fontWeight:500,fontSize:16}}>{emp.name}</div>
                      <div style={{color:G.muted,fontSize:12}}>{emp.position} · {dias} días · {horas.toFixed(1)}h trabajadas</div>
                    </div>
                    {yaPayado
                      ? <Badge label="PAGADO" type="green" />
                      : <Btn variant="success" style={{fontSize:12}} onClick={()=>{ setShowPagoModal(true); setPagoForm(f=>({...f,empleadoId:emp.id,amount:String(emp.baseSalary),period:thisMonth,extra:String(Math.round(montoExtra)),date:today()})); }}>Registrar pago</Btn>
                    }
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}}>
                    <div style={{background:G.surface,borderRadius:8,padding:12}}>
                      <div style={{color:G.muted,fontSize:11}}>Sueldo base</div>
                      <div style={{fontFamily:G.display,fontSize:20,color:G.green}}>{fmt(emp.baseSalary)}</div>
                    </div>
                    {extra>0 && <div style={{background:G.surface,borderRadius:8,padding:12}}>
                      <div style={{color:G.muted,fontSize:11}}>Horas extra ({extra.toFixed(1)}h × {fmt(valorHoraExtra)})</div>
                      <div style={{fontFamily:G.display,fontSize:20,color:G.yellow}}>{fmt(montoExtra)}</div>
                    </div>}
                    {adel>0 && <div style={{background:G.surface,borderRadius:8,padding:12}}>
                      <div style={{color:G.muted,fontSize:11}}>Descuento adelantos</div>
                      <div style={{fontFamily:G.display,fontSize:20,color:G.red}}>−{fmt(adel)}</div>
                    </div>}
                    <div style={{background:G.accent+"22",border:`1px solid ${G.accent}44`,borderRadius:8,padding:12}}>
                      <div style={{color:G.muted,fontSize:11}}>TOTAL A PAGAR</div>
                      <div style={{fontFamily:G.display,fontSize:24,color:G.accent}}>{fmt(total)}</div>
                    </div>
                  </div>
                  {/* Historial pagos */}
                  {empPagos(emp.id).length>0 && (
                    <div style={{marginTop:14,paddingTop:12,borderTop:`1px solid ${G.border}`}}>
                      <div style={{color:G.muted,fontSize:11,marginBottom:8}}>Historial de pagos</div>
                      {empPagos(emp.id).slice(0,3).map(p=>(
                        <div key={p.id} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderBottom:`1px solid ${G.border}`}}>
                          <span style={{color:G.muted}}>{p.date} · {p.period}</span>
                          <span style={{color:G.green,fontWeight:500}}>{fmt(p.amount)}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </Card>
              );
            })}
          </div>
        </div>
      )}

      {/* ── TAB: ADELANTOS ── */}
      {tab==="adelantos" && (
        <div>
          <div style={{marginBottom:16}}><Btn variant="warn" onClick={()=>setShowAdelantoModal(true)}>💸 Nuevo Adelanto</Btn></div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {adelantos.length===0 && <div style={{color:G.muted,textAlign:"center",padding:40}}>No hay adelantos registrados</div>}
            {[...adelantos].sort((a,b)=>b.date.localeCompare(a.date)).map(a=>{
              const emp = empleados.find(e=>e.id===a.empleadoId);
              return (
                <Card key={a.id} style={{display:"flex",flexWrap:"wrap",gap:10,alignItems:"center",opacity:a.repaid?0.5:1,borderColor:!a.repaid?G.red+"33":G.border}}>
                  <div style={{flex:1,minWidth:160}}>
                    <div style={{fontWeight:500}}>{emp?.name}</div>
                    <div style={{color:G.muted,fontSize:12}}>{a.date}{a.note&&` · ${a.note}`}</div>
                  </div>
                  <div style={{fontFamily:G.display,fontSize:22,color:a.repaid?G.muted:G.red}}>{fmt(a.amount)}</div>
                  {!a.repaid && (
                    <Btn variant="success" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>setAdelantos(prev=>prev.map(x=>x.id===a.id?{...x,repaid:true}:x))}>
                      ✓ Descontado
                    </Btn>
                  )}
                  {a.repaid && <Badge label="DESCONTADO" type="green" />}
                </Card>
              );
            })}
          </div>
        </div>
      )}

      {/* ── MODAL: FICHAJE ── */}
      {showFichajeModal && (
        <Modal title="FICHAR ENTRADA / SALIDA" onClose={()=>setShowFichajeModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{color:G.muted,fontSize:12,marginBottom:4}}>
              Hora actual: <span style={{color:G.accent,fontWeight:500}}>{new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"})}</span>
            </div>
            {empleados.filter(e=>e.active).map(emp=>{
              const abierto = turnoAbierto(emp.id);
              return (
                <div key={emp.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:G.surface,borderRadius:8,padding:"12px 14px"}}>
                  <div>
                    <div style={{fontWeight:500}}>{emp.name}</div>
                    <div style={{fontSize:12,color:abierto?G.green:G.muted}}>{abierto?`🟢 Desde ${abierto.entrada}`:"⚪ Sin turno abierto"}</div>
                  </div>
                  {!abierto
                    ? <Btn variant="success" style={{fontSize:12}} onClick={()=>ficharEntrada(emp)}>▶ Entrada</Btn>
                    : <Btn variant="danger"  style={{fontSize:12}} onClick={()=>ficharSalida(emp)}>⏹ Salida</Btn>
                  }
                </div>
              );
            })}
            <Btn variant="ghost" onClick={()=>setShowFichajeModal(false)}>Cerrar</Btn>
          </div>
        </Modal>
      )}

      {/* ── MODAL: TURNO MANUAL ── */}
      {showTurnoModal && (
        <Modal title="CARGAR TURNO MANUAL" onClose={()=>setShowTurnoModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <Select label="Empleado" value={turnoForm.empleadoId} onChange={e=>setTurnoForm({...turnoForm,empleadoId:e.target.value})}>
              <option value="">— Seleccionar —</option>
              {empleados.filter(e=>e.active).map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
            </Select>
            <Input label="Fecha" type="date" value={turnoForm.date} onChange={e=>setTurnoForm({...turnoForm,date:e.target.value})} />
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <Input label="Entrada" type="time" value={turnoForm.entrada} onChange={e=>setTurnoForm({...turnoForm,entrada:e.target.value})} />
              <Input label="Salida"  type="time" value={turnoForm.salida}  onChange={e=>setTurnoForm({...turnoForm,salida:e.target.value})}  />
            </div>
            {turnoForm.entrada&&turnoForm.salida && (
              <div style={{background:G.surface,padding:10,borderRadius:8,display:"flex",justifyContent:"space-between"}}>
                <span style={{color:G.muted}}>Horas trabajadas</span>
                <span style={{fontFamily:G.display,fontSize:20,color:G.accent}}>{calcHoras(turnoForm.entrada,turnoForm.salida).toFixed(1)}h</span>
              </div>
            )}
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setShowTurnoModal(false)}>Cancelar</Btn>
              <Btn onClick={saveTurno}>Guardar Turno</Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* ── MODAL: EMPLEADO ── */}
      {showEmpModal && (
        <Modal title={editEmp?"EDITAR EMPLEADO":"NUEVO EMPLEADO"} onClose={()=>setShowEmpModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <Input label="Nombre completo" value={empForm.name} onChange={e=>setEmpForm({...empForm,name:e.target.value})} placeholder="Ej: Juan García" />
            <Input label="Cargo / Puesto"  value={empForm.position} onChange={e=>setEmpForm({...empForm,position:e.target.value})} placeholder="Ej: Cocinero, Cajero..." />
            <Input label="Sueldo base ($)" type="number" value={empForm.baseSalary} onChange={e=>setEmpForm({...empForm,baseSalary:e.target.value})} placeholder="0" />
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setShowEmpModal(false)}>Cancelar</Btn>
              <Btn onClick={saveEmp}>{editEmp?"Guardar":"Crear Empleado"}</Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* ── MODAL: ADELANTO ── */}
      {showAdelantoModal && (
        <Modal title="REGISTRAR ADELANTO" onClose={()=>setShowAdelantoModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <Select label="Empleado" value={adelantoForm.empleadoId} onChange={e=>setAdelantoForm({...adelantoForm,empleadoId:e.target.value})}>
              <option value="">— Seleccionar —</option>
              {empleados.filter(e=>e.active).map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
            </Select>
            <Input label="Monto ($)" type="number" value={adelantoForm.amount} onChange={e=>setAdelantoForm({...adelantoForm,amount:e.target.value})} placeholder="0" />
            <Input label="Fecha" type="date" value={adelantoForm.date} onChange={e=>setAdelantoForm({...adelantoForm,date:e.target.value})} />
            <Input label="Nota (opcional)" value={adelantoForm.note} onChange={e=>setAdelantoForm({...adelantoForm,note:e.target.value})} placeholder="Ej: Para el alquiler..." />
            <div style={{color:G.muted,fontSize:11}}>El adelanto se registra como egreso en finanzas y se descuenta automáticamente en la liquidación.</div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setShowAdelantoModal(false)}>Cancelar</Btn>
              <Btn variant="warn" onClick={saveAdelanto}>Registrar Adelanto</Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* ── MODAL: PAGO SUELDO ── */}
      {showPagoModal && (
        <Modal title="PAGAR SUELDO" onClose={()=>setShowPagoModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <Select label="Empleado" value={pagoForm.empleadoId} onChange={e=>setPagoForm({...pagoForm,empleadoId:e.target.value})}>
              <option value="">— Seleccionar —</option>
              {empleados.filter(e=>e.active).map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
            </Select>
            <Input label="Período (mes)" value={pagoForm.period} onChange={e=>setPagoForm({...pagoForm,period:e.target.value})} placeholder={thisMonth} />
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <Input label="Sueldo base ($)"    type="number" value={pagoForm.amount} onChange={e=>setPagoForm({...pagoForm,amount:e.target.value})} placeholder="0" />
              <Input label="Horas extra + otros ($)" type="number" value={pagoForm.extra}  onChange={e=>setPagoForm({...pagoForm,extra:e.target.value})}  placeholder="0" />
            </div>
            {(parseFloat(pagoForm.amount||0)+parseFloat(pagoForm.extra||0))>0 && (
              <div style={{background:G.surface,borderRadius:8,padding:12,display:"flex",justifyContent:"space-between"}}>
                <span style={{color:G.muted}}>Total a pagar</span>
                <span style={{fontFamily:G.display,fontSize:22,color:G.accent}}>{fmt(parseFloat(pagoForm.amount||0)+parseFloat(pagoForm.extra||0))}</span>
              </div>
            )}
            <Select label="Pagar desde cuenta" value={pagoForm.accountId} onChange={e=>setPagoForm({...pagoForm,accountId:e.target.value})}>
              {accounts.map(a=><option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}
            </Select>
            <Input label="Fecha de pago" type="date" value={pagoForm.date} onChange={e=>setPagoForm({...pagoForm,date:e.target.value})} />
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>setShowPagoModal(false)}>Cancelar</Btn>
              <Btn variant="success" onClick={savePago}>✓ Confirmar Pago</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// MODULE: CONFIGURACIÓN (Theme editor)
// ══════════════════════════════════════════════════════════════════════════════
function ConfigModule({ theme, setTheme, onResetAll }) {
  const G   = useG();
  const cur = buildG({ ...DEFAULT_THEME, ...theme });

  const SwatchRow = ({ label, options, field, current }) => (
    <div style={{marginBottom:20}}>
      <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10,fontWeight:600}}>{label}</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {options.map(opt=>{
          const isActive = current===opt.id;
          const swatchColor = opt.value||opt.bg||opt.body;
          return (
            <button key={opt.id} onClick={()=>setTheme({[field]:opt.id})} style={{
              display:"flex",flexDirection:"column",alignItems:"center",gap:6,
              background:"transparent",border:"none",cursor:"pointer",padding:4,
            }}>
              <div style={{
                width:44,height:44,
                background: opt.value||opt.bg||"#ccc",
                border:`${isActive?"3px":"2px"} solid ${isActive?G.accent:G.border}`,
                boxShadow: isActive?G.shadow:"none",
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:18,
                fontFamily: opt.body||"inherit",
              }}>
                {opt.body && <span style={{fontFamily:opt.body,fontWeight:700,fontSize:14,color:opt.bg?"#1a1a1a":"#fff"}}>Aa</span>}
                {isActive && !opt.body && <span style={{color:"#fff",fontSize:18,textShadow:"0 1px 3px #0008"}}>✓</span>}
              </div>
              <div style={{fontSize:10,color:isActive?G.accent:G.muted,fontWeight:isActive?700:400,textAlign:"center",maxWidth:52}}>{opt.name}</div>
            </button>
          );
        })}
      </div>
    </div>
  );

  return (
    <div className="fadeIn">
      <div style={{marginBottom:24}}>
        <h2 style={{fontFamily:G.display,fontSize:36,letterSpacing:2,color:G.text,lineHeight:1,fontWeight:800}}>CONFIGURACIÓN</h2>
        <p style={{color:G.muted,fontSize:13,marginTop:4}}>Personalizá el aspecto de tu aplicación</p>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>

        {/* Left: controls */}
        <div>
          <div style={{background:G.card,border:`${G.borderW} solid ${G.border}`,padding:24,boxShadow:G.shadow}}>
            <SwatchRow label="Color de acento"  options={ACCENT_OPTIONS} field="accentId" current={theme.accentId||DEFAULT_THEME.accentId} />
            <SwatchRow label="Fondo"            options={BG_OPTIONS}     field="bgId"     current={theme.bgId||DEFAULT_THEME.bgId} />
            <SwatchRow label="Tipografía"       options={FONT_OPTIONS}   field="fontId"   current={theme.fontId||DEFAULT_THEME.fontId} />

            <div style={{borderTop:`${G.borderW} solid ${G.border}`,paddingTop:16,marginTop:8,display:"flex",gap:10,flexWrap:"wrap"}}>
              <button onClick={()=>setTheme({...DEFAULT_THEME})} style={{
                padding:"8px 16px",fontSize:12,fontFamily:G.font,cursor:"pointer",
                background:"transparent",border:`${G.borderW} solid ${G.border}`,color:G.muted,fontWeight:600,
              }}>Resetear colores</button>
              <button onClick={()=>{
                if(window.confirm("⚠️ ¿Estás seguro? Esto borra TODOS los datos — productos, pedidos, stock, clientes, todo. Esta acción no se puede deshacer.")) {
                  onResetAll();
                }
              }} style={{
                padding:"8px 16px",fontSize:12,fontFamily:G.font,cursor:"pointer",
                background:"#e6300022",border:`${G.borderW} solid #e63000`,color:"#e63000",fontWeight:700,
              }}>🗑 Borrar todos los datos</button>
            </div>
          </div>
        </div>

        {/* Right: live preview */}
        <div>
          <div style={{color:G.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10,fontWeight:600}}>Vista previa</div>
          <div style={{background:cur.card,border:`${G.borderW} solid ${cur.border}`,padding:20,boxShadow:cur.shadow,fontFamily:cur.font}}>

            <div style={{fontFamily:cur.display,fontSize:24,letterSpacing:2,color:cur.accent,fontWeight:800,marginBottom:16}}>BURGER ADMIN</div>

            {/* Mini stat cards */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
              {[{l:"Ventas",v:"$84.000",c:cur.green},{l:"Pedidos",v:"12",c:cur.accent}].map(s=>(
                <div key={s.l} style={{background:cur.surface,border:`2px solid ${cur.border}`,padding:"10px 12px",boxShadow:cur.shadow}}>
                  <div style={{fontSize:9,color:cur.muted,textTransform:"uppercase",letterSpacing:1,fontWeight:600}}>{s.l}</div>
                  <div style={{fontFamily:cur.display,fontSize:20,color:s.c,fontWeight:800}}>{s.v}</div>
                </div>
              ))}
            </div>

            {/* Mini order card */}
            <div style={{background:cur.surface,border:`2px solid ${cur.border}`,padding:"10px 12px",boxShadow:cur.shadow,marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontWeight:700,fontSize:13,color:cur.text}}>María González</div>
                  <div style={{fontSize:10,color:cur.muted}}>2x Hamburguesa Doble</div>
                </div>
                <div style={{fontFamily:cur.display,fontWeight:800,fontSize:18,color:cur.accent}}>$8.400</div>
              </div>
            </div>

            {/* Mini buttons */}
            <div style={{display:"flex",gap:8}}>
              <div style={{padding:"7px 14px",background:cur.accent,color:"#fff",fontSize:12,fontWeight:700,border:`2px solid ${cur.border}`,boxShadow:cur.shadow,cursor:"pointer"}}>+ Nuevo</div>
              <div style={{padding:"7px 14px",background:"transparent",color:cur.muted,fontSize:12,fontWeight:600,border:`2px solid ${cur.border}`,cursor:"pointer"}}>Ver todo</div>
              <div style={{padding:"7px 14px",background:cur.green+"22",color:cur.green,fontSize:12,fontWeight:700,border:`2px solid ${cur.green}`,cursor:"pointer"}}>✓ OK</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function ComingSoon({ name, icon }) {
  return (
    <div className="fadeIn" style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:400,gap:16}}>
      <div style={{fontSize:64}}>{icon}</div>
      <div style={{fontFamily:G.display,fontSize:48,letterSpacing:3,color:G.border}}>{name}</div>
      <div style={{color:G.muted,fontSize:14}}>Módulo en desarrollo · Próximamente disponible</div>
    </div>
  );
}

// Map module id → required permission to see it
const MODULE_PERM = {
  dashboard:  null,           // always visible
  pedidos:    "pedidos.ver",
  finanzas:   "finanzas.ver",
  caja:       "caja.ver",
  gastos:     "gastos.ver",
  reportes:   "reportes.ver",
  historial:  "reportes.ver",
  descuentos: "descuentos.admin",
  cuentas:    "cuentas.ver",
  clientes:   "clientes.ver",
  stock:      "stock.ver",
  productos:  "productos.ver",
  formulas:   "productos.ver",
  usuarios:   "usuarios.admin",
  exportar:   "reportes.ver",
  empleados:  "usuarios.admin",
  config:     null,
};

const INITIAL_ROLES = [
  {
    id:"R1", name:"Admin", color:"#e8854a",
    permissions: ALL_PERM_IDS,
  },
  {
    id:"R2", name:"Operador", color:"#4caf7d",
    permissions: ["pedidos.ver","pedidos.crear","pedidos.cobrar","pedidos.estado","caja.ver","caja.abrir","clientes.ver","clientes.cobrar","stock.ver"],
  },
  {
    id:"R3", name:"Encargado", color:"#4a90e2",
    permissions: ["pedidos.ver","pedidos.crear","pedidos.cobrar","pedidos.estado","finanzas.ver","finanzas.ingreso","caja.ver","caja.abrir","caja.cerrar","stock.ver","clientes.ver","clientes.cobrar","reportes.ver","gastos.ver","descuentos.admin"],
  },
];

const INITIAL_USERS = [
  { id:"U1", name:"Admin",   pin:"0000", roleId:"R1", active:true },
  { id:"U2", name:"Empleado",pin:"1234", roleId:"R2", active:true },
];

const NAV = [
  { id:"dashboard",  label:"Dashboard",    icon:"🏠" },
  { id:"pedidos",    label:"Pedidos",      icon:"🍔" },
  { id:"finanzas",   label:"Finanzas",     icon:"💰" },
  { id:"caja",       label:"Caja",         icon:"🏧" },
  { id:"gastos",     label:"Gastos Fijos", icon:"📅" },
  { id:"reportes",   label:"Reportes",     icon:"📊" },
  { id:"historial",  label:"Precios",      icon:"📈" },
  { id:"descuentos", label:"Descuentos",   icon:"🏷"  },
  { id:"cuentas",    label:"Cuentas",      icon:"🏦" },
  { id:"clientes",   label:"Clientes",     icon:"👥" },
  { id:"stock",      label:"Stock",        icon:"📦" },
  { id:"productos",  label:"Productos",    icon:"📋" },
  { id:"formulas",   label:"Fórmulas",     icon:"⚗️" },
  { id:"usuarios",   label:"Usuarios",     icon:"👤" },
  { id:"exportar",   label:"Exportar",     icon:"📤" },
  { id:"empleados",  label:"Empleados",    icon:"👷" },
  { id:"config",     label:"Configuración",icon:"⚙️" },
];

function App() {
  // ── Theme state ────────────────────────────────────────────────────────
  const [userThemes, setUserThemes] = useState({}); // keyed by userId
  const getTheme = (uid) => buildG({ ...DEFAULT_THEME, ...(userThemes[uid]||{}) });
  const setUserTheme = (uid, patch) => setUserThemes(prev=>({ ...prev, [uid]:{ ...(prev[uid]||DEFAULT_THEME), ...patch } }));

  // ── Auth state ─────────────────────────────────────────────────────────
  const [currentUser, setCurrentUser] = useState(null); // null = not logged in
  const [roles,  setRoles]  = useState(INITIAL_ROLES);
  const [users,  setUsers]  = useState(INITIAL_USERS);

  const currentRole = currentUser ? roles.find(r=>r.id===currentUser.roleId) : null;
  const can = (permId) => !permId || (currentRole?.permissions||[]).includes(permId);
  const canSee = (moduleId) => can(MODULE_PERM[moduleId]);

  // ── Navigation ─────────────────────────────────────────────────────────
  const defaultModule = currentRole?.id==="R1" ? "dashboard" : "pedidos";
  const [active,setActive]     = useState(defaultModule);
  const [sideOpen,setSideOpen] = useState(false);
  const [extraTx,setExtraTx]   = useState([]);

  const [articles,      setArticles]      = useState([...INITIAL_ARTICLES, ...INITIAL_PREP_ARTICLES]);
  const [suppliers,     setSuppliers]     = useState(INITIAL_SUPPLIERS);
  const [stockMoves,    setStockMoves]    = useState([...INITIAL_STOCK_MOVES, ...INITIAL_SUPPLY_MOVES]);
  const [invoices,      setInvoices]      = useState(INITIAL_INVOICES);
  const [recipes,       setRecipes]       = useState(INITIAL_RECIPES);
  const [products,      setProducts]      = useState(INITIAL_PRODUCTS);
  const [preps,         setPreps]         = useState(INITIAL_PREPS);
  const [accounts,      setAccounts]      = useState(INITIAL_ACCOUNTS);
  const [clients,       setClients]       = useState(INITIAL_CLIENTS);
  const [debts,         setDebts]         = useState([]);
  const [discounts,    setDiscounts]    = useState([]);

  const activeTheme = currentUser ? getTheme(currentUser.id) : buildG(DEFAULT_THEME);
  useEffect(()=>{ injectStyles(activeTheme); },[JSON.stringify(activeTheme)]);

  // ── Firebase persistence ───────────────────────────────────────────────
  const [fbReady, setFbReady] = useState(false);

  // Load all data from Firestore on mount
  useEffect(()=>{
    const load = async () => {
      try {
        const snap = await fsGet("app", "state");
        if (snap) {
          if (snap.articles)      setArticles(snap.articles);
          if (snap.suppliers)     setSuppliers(snap.suppliers);
          if (snap.stockMoves)    setStockMoves(snap.stockMoves);
          if (snap.invoices)      setInvoices(snap.invoices);
          if (snap.products)      setProducts(snap.products);
          if (snap.preps)         setPreps(snap.preps);
          if (snap.accounts)      setAccounts(snap.accounts);
          if (snap.clients)       setClients(snap.clients);
          if (snap.debts)         setDebts(snap.debts);
          if (snap.discounts)     setDiscounts(snap.discounts);
          if (snap.extraTx)       setExtraTx(snap.extraTx);
          if (snap.recipes)       setRecipes(snap.recipes);
          if (snap.users)         setUsers(snap.users);
          if (snap.roles)         setRoles(snap.roles);
          if (snap.userThemes)    setUserThemes(snap.userThemes);
        }
      } catch(e) { console.log("No saved data yet, starting fresh"); }
      setFbReady(true);
    };
    load();
  }, []);

  // Save to Firestore whenever data changes (debounced)
  useEffect(()=>{
    if (!fbReady) return;
    const timer = setTimeout(()=>{
      fsSet("app", "state", {
        articles, suppliers, stockMoves, invoices, products, preps,
        accounts, clients, debts, discounts, extraTx, users, roles, userThemes,
        recipes,
        _savedAt: new Date().toISOString(),
      });
    }, 2000); // 2 second debounce
    return () => clearTimeout(timer);
  }, [articles, suppliers, stockMoves, invoices, products, preps,
      accounts, clients, debts, discounts, extraTx, users, roles, userThemes, recipes, fbReady]);

  const addIncome      = (tx) => setExtraTx(prev=>[...prev,{...tx,id:uid(),type:"ingreso"}]);
  const addExpense     = (tx) => setExtraTx(prev=>[...prev,{...tx,id:uid(),type:"egreso"}]);
  const registerDebt   = (debt) => setDebts(prev=>[...prev,{...debt,id:uid(),paid:false}]);

  const resetAll = () => {
    setArticles([]);
    setSuppliers([]);
    setStockMoves([]);
    setInvoices([]);
    setProducts([]);
    setPreps([]);
    setAccounts(INITIAL_ACCOUNTS);  // keep default accounts
    setClients([]);
    setDebts([]);
    setDiscounts([]);
    setExtraTx([]);
    setRecipes([]);
    // keep users and roles
    // save to Firebase immediately
    fsSet("app", "state", {
      articles:[], suppliers:[], stockMoves:[], invoices:[],
      products:[], preps:[], accounts:INITIAL_ACCOUNTS,
      clients:[], debts:[], discounts:[], extraTx:[], recipes:[],
      users, roles, userThemes,
      _savedAt: new Date().toISOString(),
    });
  };
  const allTransactions = [...extraTx]; // used by accounts module

  // When a product is delivered, consume raw articles from its recipe
  // (preps are pre-made in stock, so we consume them as articles via the prep's articleId)
  const consumeStock = (product, qty, extraMoves=[]) => {
    const moves = [...extraMoves];
    if (product && product.productName !== "__supplies__") {
      const resolveIngredients = (ingredients, multiplier) => {
        ingredients.forEach(ing => {
          if (ing.type === "article") {
            moves.push({ id:uid(), articleId:ing.id, type:"salida", qty:ing.qty*multiplier*qty, unitCost:null, invoiceId:null, date:today(), note:`Pedido — ${product.name||product.productName} x${qty}` });
          } else if (ing.type === "prep") {
            const prep = preps.find(p=>p.id===ing.id);
            if (!prep) return;
            if (prep.articleId) {
              moves.push({ id:uid(), articleId:prep.articleId, type:"salida", qty:ing.qty*multiplier*qty, unitCost:null, invoiceId:null, date:today(), note:`Pedido — ${product.name||product.productName} x${qty}` });
            } else {
              resolveIngredients(prep.ingredients, (ing.qty/prep.yield)*multiplier);
            }
          }
        });
      };
      resolveIngredients(product.ingredients||[], 1);
    }
    if (moves.length>0) setStockMoves(prev=>[...prev,...moves]);
  };

  const stockMap   = computeStock(stockMoves);
  const alertCount = articles.filter(a=>(stockMap[a.id]||0)<=a.minStock).length;

  // Build legacy recipes array for OrdersModule menu (uses products list now)
  const legacyRecipes = recipes;

  const renderModule = () => {
    if (active==="pedidos")   return <OrdersModule onAddIncome={addIncome} onConsumeStock={(recipe,qty,extraMoves=[])=>{ if(recipe.productName==="__supplies__"){if(extraMoves.length>0)setStockMoves(prev=>[...prev,...extraMoves]);return;} const prod=products.find(p=>p.name===recipe.productName); if(prod) consumeStock(prod,qty,extraMoves); else { const r=recipes.find(r=>r.productName===recipe.productName); if(r) setStockMoves(prev=>[...prev,...r.ingredients.map(ing=>({id:uid(),articleId:ing.articleId,type:"salida",qty:ing.qty*qty,unitCost:null,invoiceId:null,date:today(),note:`Pedido — ${recipe.productName}`}))]); }}} onRegisterDebt={registerDebt} recipes={legacyRecipes} products={products} articles={articles} stockMoves={stockMoves} accounts={accounts} clients={clients} setClients={setClients} discounts={discounts} />;
    if (active==="finanzas")  return <FinanceModule extraTransactions={extraTx} accounts={accounts} />;
    if (active==="stock")     return <StockModule articles={articles} setArticles={setArticles} suppliers={suppliers} setSuppliers={setSuppliers} stockMoves={stockMoves} setStockMoves={setStockMoves} invoices={invoices} setInvoices={setInvoices} onAddExpense={addExpense} />;
    if (active==="productos") return <ProductsModule products={products} setProducts={setProducts} preps={preps} setPreps={setPreps} articles={articles} setArticles={setArticles} stockMoves={stockMoves} setStockMoves={setStockMoves} invoices={invoices} />;
    if (active==="clientes")  return <ClientsModule clients={clients} setClients={setClients} accounts={accounts} onAddIncome={addIncome} debts={debts} setDebts={setDebts} />;
    if (active==="cuentas")   return <AccountsModule accounts={accounts} setAccounts={setAccounts} transactions={extraTx} />;
    if (active==="caja")      return <CajaDiariaModule extraTx={extraTx} addExpense={addExpense} addIncome={addIncome} />;
    if (active==="gastos")    return <GastosFijosModule accounts={accounts} addExpense={addExpense} extraTx={extraTx} />;
    if (active==="reportes")  return <ReportesModule extraTx={extraTx} clients={clients} accounts={accounts} />;
    if (active==="historial") return <HistorialPreciosModule articles={articles} stockMoves={stockMoves} />;
    if (active==="descuentos")return <DescuentosModule discounts={discounts} setDiscounts={setDiscounts} />;
    if (active==="formulas")   return <FormulasModule preps={preps} setPreps={setPreps} articles={articles} setArticles={setArticles} stockMoves={stockMoves} setStockMoves={setStockMoves} invoices={invoices} />;
    if (active==="dashboard")  return <DashboardModule extraTx={extraTx} articles={articles} stockMoves={stockMoves} preps={preps} debts={debts} clients={clients} accounts={accounts} setActive={setActive} />;
    if (active==="usuarios")   return <UsuariosModule users={users} setUsers={setUsers} roles={roles} setRoles={setRoles} currentUser={currentUser} />;
    if (active==="exportar")   return <ExportarModule extraTx={extraTx} articles={articles} stockMoves={stockMoves} preps={preps} debts={debts} clients={clients} accounts={accounts} invoices={invoices} products={products} />;
    if (active==="empleados")  return <EmpleadosModule accounts={accounts} addExpense={addExpense} />;
    if (active==="config")      return <ConfigModule theme={userThemes[currentUser?.id]||DEFAULT_THEME} setTheme={patch=>setUserTheme(currentUser?.id,patch)} onResetAll={resetAll} />;
    const m = NAV.find(n=>n.id===active);
    return <ComingSoon name={m?.label?.toUpperCase()} icon={m?.icon} />;
  };

  // ── Loading screen while Firebase loads ─────────────────────────────────
  if (!fbReady) return (
    <ThemeCtx.Provider value={buildG(DEFAULT_THEME)}>
      <div style={{minHeight:"100vh",background:"#e8e0d0",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20,fontFamily:"'Space Grotesk',sans-serif"}}>
        <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:800,fontSize:42,letterSpacing:2,color:"#00a550"}}>BURGER</div>
        <div style={{fontWeight:600,fontSize:13,letterSpacing:4,color:"#555",marginTop:-16}}>ADMIN</div>
        <div style={{marginTop:24,display:"flex",gap:8}}>
          {[0,1,2].map(i=>(
            <div key={i} style={{width:10,height:10,borderRadius:"50%",background:"#00a550",animation:`pulse 1s ease ${i*0.2}s infinite`}}/>
          ))}
        </div>
        <div style={{color:"#888",fontSize:12}}>Cargando datos...</div>
      </div>
    </ThemeCtx.Provider>
  );

  // ── PIN Login screen ────────────────────────────────────────────────────
  if (!currentUser) return (
    <ThemeCtx.Provider value={buildG(DEFAULT_THEME)}>
      <LoginScreen users={users} roles={roles} onLogin={user=>{ setCurrentUser(user); setActive(roles.find(r=>r.id===user.roleId)?.id==="R1"?"dashboard":"pedidos"); }} />
    </ThemeCtx.Provider>
  );

  const visibleNav = NAV.filter(n=>canSee(n.id));
  // Override global G for this render
  Object.assign(G, activeTheme);

  return (
    <ThemeCtx.Provider value={activeTheme}>
    <div style={{display:"flex",minHeight:"100vh",background:activeTheme.bg}}>
      {sideOpen && <div onClick={()=>setSideOpen(false)} style={{position:"fixed",inset:0,background:"#000a",zIndex:9}} />}

      <aside style={{width:220,background:activeTheme.surface,borderRight:`3px solid ${activeTheme.border}`,display:"flex",flexDirection:"column",padding:"24px 0",position:"fixed",top:0,bottom:0,left:0,zIndex:10,transition:"transform 0.25s ease",transform:sideOpen?"translateX(0)":undefined,overflowY:"hidden"}}>
        <div style={{padding:"0 20px 24px",borderBottom:`3px solid ${activeTheme.border}`}}>
          <div style={{fontFamily:activeTheme.display,fontSize:24,letterSpacing:2,color:activeTheme.accent,lineHeight:1,fontWeight:800}}>BURGER</div>
          <div style={{fontFamily:activeTheme.font,fontSize:10,letterSpacing:4,color:activeTheme.muted,marginTop:2}}>ADMIN</div>
        </div>
        <nav style={{flex:1,padding:"16px 12px",display:"flex",flexDirection:"column",gap:4,overflowY:"auto"}}>
          {visibleNav.map(n=>(
            <button key={n.id} onClick={()=>{setActive(n.id);setSideOpen(false);}} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:8,textAlign:"left",fontFamily:G.font,fontSize:13,background:active===n.id?activeTheme.accent:"transparent",color:active===n.id?"#fff":activeTheme.text,border:`3px solid ${active===n.id?activeTheme.border:"transparent"}`,boxShadow:active===n.id?activeTheme.shadow:"none",fontWeight:active===n.id?700:500,transition:"all 0.15s",cursor:"pointer"}}>
              <span style={{fontSize:16}}>{n.icon}</span>
              <span style={{flex:1}}>{n.label}</span>
              {n.id==="stock" && alertCount>0 && (
                <span className="pulse" style={{background:G.red,color:"#fff",borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:"bold"}}>{alertCount}</span>
              )}
            </button>
          ))}
        </nav>
        {/* Current user + logout */}
        <div style={{padding:"12px 16px",borderTop:`1px solid ${G.border}`}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <div style={{width:30,height:30,borderRadius:"50%",background:(currentRole?.color||G.accent)+"33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>👤</div>
            <div>
              <div style={{fontSize:12,fontWeight:500,color:G.text}}>{currentUser.name}</div>
              <div style={{fontSize:10,color:currentRole?.color||G.muted}}>{currentRole?.name}</div>
            </div>
          </div>
          <button onClick={()=>{setCurrentUser(null);setActive("pedidos");}} style={{width:"100%",padding:"6px",borderRadius:6,fontSize:11,fontFamily:G.font,cursor:"pointer",background:G.red+"22",color:G.red,border:`1px solid ${G.red}44`}}>
            Cerrar sesión
          </button>
          <div style={{color:G.muted,fontSize:10,marginTop:6,textAlign:"center"}}>v2.1 · {new Date().getFullYear()}</div>
        </div>
      </aside>

      <main style={{marginLeft:220,flex:1,padding:"32px 28px",minHeight:"100vh",maxWidth:"100%",background:activeTheme.bg}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:28}}>
          <button onClick={()=>setSideOpen(!sideOpen)} style={{display:"none",background:"transparent",color:G.text,fontSize:20,border:`1px solid ${G.border}`,borderRadius:6,padding:"4px 10px"}} className="mobile-menu">☰</button>
          <div />
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{fontSize:10,color:activeTheme.green,opacity:0.7}}>● guardado</div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:13,color:activeTheme.text,fontWeight:600}}>{currentUser.name}</div>
              <div style={{fontSize:11,color:activeTheme.muted}}>{today()}</div>
            </div>
            <div style={{width:36,height:36,background:activeTheme.accent,border:`2px solid ${activeTheme.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,boxShadow:activeTheme.shadow}}>👤</div>
          </div>
        </div>
        {renderModule()}
      </main>

      <style>{`
        @media (max-width: 768px) {
          aside { transform: translateX(-100%); transition: transform 0.25s; }
          main  { margin-left: 0 !important; padding: 20px 16px !important; }
          .mobile-menu { display: flex !important; }
        }
      `}</style>
    </div>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
document.getElementById('loading').style.display='none';
</script>
</body>
</html>
